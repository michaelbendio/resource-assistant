// ============================================================
// PERSISTENCE
// ============================================================
// Storage split:
// - localStorage keeps the primary JSON snapshot.
// - IndexedDB keeps binary assets (PDF blobs) under namespaced string keys.
// - localStorage also keeps small UI state such as print selection, undo, and
//   seen update ids under separate keys.
// - Save Resource Package exports a ZIP with canonical JSON plus attached PDFs.
// - Merge Resources imports a package ZIP and resolves conflicts by
//   lastModified timestamps where possible.

function persist(){
  // Writes the canonical JSON snapshot used to restore app state on reload.
  if(DEBUG) assertInvariants("persist");
  data.appVersion = APP_VERSION;
  data.lastModified = nowISO();
  localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(data));
}

function openAssetsDB(){
  return new Promise((resolve, reject) => {
    if(typeof indexedDB === "undefined"){
      reject(new Error("Asset storage is unavailable in this browser."));
      return;
    }

    let settled = false;
    const timeoutId = setTimeout(() => {
      if(settled) return;
      settled = true;
      reject(new Error("Asset storage is unavailable right now. Reload the app and try again."));
    }, 4000);

    function finish(fn){
      return value => {
        if(settled) return;
        settled = true;
        clearTimeout(timeoutId);
        fn(value);
      };
    }

    let req;
    try{
      req = indexedDB.open(`${STORAGE_KEY_PREFIX}Assets`, 1);
    }catch(err){
      clearTimeout(timeoutId);
      reject(err);
      return;
    }

    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains("files")){
        db.createObjectStore("files");
      }
    };

    req.onsuccess = finish(() => resolve(req.result));
    req.onerror = finish(() => reject(req.error || new Error("Asset storage is unavailable in this browser.")));
    req.onblocked = finish(() => reject(new Error("Asset storage is blocked. Close other tabs and try again.")));
  });
}

async function saveAsset(key, blob){
  const db = await openAssetsDB();
  const tx = db.transaction("files", "readwrite");
  tx.objectStore("files").put(blob, key);

  return new Promise((resolve, reject) => {
    tx.oncomplete = () => {
      db.close();
      resolve();
    };
    tx.onerror = () => {
      db.close();
      reject(tx.error);
    };
    tx.onabort = () => {
      db.close();
      reject(tx.error);
    };
  });
}

async function loadAsset(key){
  const db = await openAssetsDB();
  const tx = db.transaction("files", "readonly");
  const req = tx.objectStore("files").get(key);

  return new Promise((resolve, reject) => {
    req.onsuccess = () => {
      db.close();
      resolve(req.result);
    };
    req.onerror = () => {
      db.close();
      reject(req.error);
    };
  });
}

function ensurePDFBlob(value){
  if(value instanceof Blob){
    return value.type === "application/pdf"
      ? value
      : new Blob([value], { type: "application/pdf" });
  }
  return new Blob([value], { type: "application/pdf" });
}

async function savePDF(key, blob){
  return saveAsset(key, ensurePDFBlob(blob));
}

async function getPDF(key){
  return loadAsset(key);
}

async function deleteAsset(key){
  const db = await openAssetsDB();
  const tx = db.transaction("files", "readwrite");
  tx.objectStore("files").delete(key);

  return new Promise((resolve, reject) => {
    tx.oncomplete = () => {
      db.close();
      resolve();
    };
    tx.onerror = () => {
      db.close();
      reject(tx.error);
    };
    tx.onabort = () => {
      db.close();
      reject(tx.error);
    };
  });
}

async function deletePDF(key){
  return deleteAsset(key);
}

async function openPDF(path){
  const pdfWindow = window.open("", "_blank");
  if(!pdfWindow){
    alert("Unable to open PDF window. Allow pop-ups and try again.");
    return;
  }
  pdfWindow.document.title = "Loading PDF...";
  pdfWindow.document.body.textContent = "Loading PDF...";
  try{
    const stored = await getPDF(path);
    if(!stored){
      pdfWindow.close();
      alert("PDF not found.");
      return;
    }
    const pdfBlob = ensurePDFBlob(stored);
    const url = URL.createObjectURL(pdfBlob);
    pdfWindow.location = url;
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  }catch(err){
    pdfWindow.close();
    alert("Unable to open PDF: " + err.message);
  }
}

function cloneDataObject(value){
  return JSON.parse(JSON.stringify(value || {}));
}

function getValidTimestamp(value){
  const timestamp = Date.parse(String(value || ""));
  return Number.isFinite(timestamp) ? timestamp : null;
}

function objectsDiffer(a, b){
  return JSON.stringify(a || {}) !== JSON.stringify(b || {});
}

function getSeenUpdateIds(){
  try{
    const parsed = JSON.parse(localStorage.getItem(UPDATE_SEEN_STORAGE_KEY) || "[]");
    return new Set(Array.isArray(parsed) ? parsed.map(String) : []);
  }catch(_err){
    return new Set();
  }
}

function saveSeenUpdateIds(seenSet){
  localStorage.setItem(UPDATE_SEEN_STORAGE_KEY, JSON.stringify(Array.from(seenSet)));
}

function normalizeChanges(packageData){
  if(!packageData || typeof packageData !== "object") return;
  const source = Array.isArray(packageData.changes) ? packageData.changes : [];
  const normalized = [];
  const seen = new Set();
  source.forEach((entry, index) => {
    if(!entry || typeof entry !== "object") return;
    const description = String(entry.description || "").trim();
    const type = entry.type === "category" ? "category" : "resource";
    const action = ["added", "updated", "removed"].includes(entry.action) ? entry.action : "updated";
    const timestamp = Date.parse(String(entry.timestamp || "")) ? String(entry.timestamp) : nowISO();
    const id = String(entry.id || `${type}:${entry.targetId || index}:${timestamp}`).trim();
    if(!id || seen.has(id)) return;
    seen.add(id);
    normalized.push({
      id,
      type,
      action,
      targetId: String(entry.targetId || ""),
      targetName: String(entry.targetName || "(Unnamed)").trim() || "(Unnamed)",
      description,
      timestamp,
      categoryIds: Array.isArray(entry.categoryIds) ? entry.categoryIds.map(String) : []
    });
  });
  packageData.changes = normalized;
}

function normalizePackageVersionValue(value){
  if(typeof value === "number" && Number.isFinite(value)) return value;
  if(typeof value === "string" && value.trim()){
    const asNumber = Number(value.trim());
    if(Number.isFinite(asNumber)) return asNumber;
  }
  return "Unknown";
}

function getNextPackageVersionValue(value){
  const normalized = normalizePackageVersionValue(value);
  if(typeof normalized === "number" && Number.isFinite(normalized)){
    return Math.max(1, Math.floor(normalized) + 1);
  }
  return 1;
}

function normalizeLastLoadedPackageInfo(packageData){
  if(!packageData || typeof packageData !== "object") return;
  const source = packageData.lastLoadedPackageInfo;
  if(!source || typeof source !== "object"){
    packageData.lastLoadedPackageInfo = null;
    return;
  }
  const changes = Array.isArray(source.changes)
    ? source.changes
      .map(entry => String(entry || "").trim())
      .filter(Boolean)
    : [];
  packageData.lastLoadedPackageInfo = {
    packageVersion: normalizePackageVersionValue(source.packageVersion),
    loadedAt: Date.parse(String(source.loadedAt || "")) ? String(source.loadedAt) : nowISO(),
    changes
  };
}

function createChangeEntry(type, action, targetId, targetName, description, options = {}){
  const cleanDescription = String(description || "").trim();
  const timestamp = nowISO();
  return {
    id: `${type || "change"}:${targetId || "unknown"}:${timestamp}:${Math.random().toString(16).slice(2,8)}`,
    type: type === "category" ? "category" : "resource",
    action: ["added", "updated", "removed"].includes(action) ? action : "updated",
    targetId: String(targetId || ""),
    targetName: String(targetName || "(Unnamed)").trim() || "(Unnamed)",
    description: cleanDescription,
    timestamp,
    categoryIds: Array.isArray(options.categoryIds) ? options.categoryIds.map(String) : []
  };
}

function addChangeEntry(changeEntry){
  if(!changeEntry) return;
  normalizeChanges(data);
  data.changes.push(changeEntry);
}

function mergeChanges(localChanges, incomingChanges){
  const merged = [];
  const seen = new Set();
  [localChanges, incomingChanges].forEach(list => {
    (Array.isArray(list) ? list : []).forEach(entry => {
      const id = String(entry && entry.id || "");
      if(!id || seen.has(id)) return;
      seen.add(id);
      merged.push(cloneDataObject(entry));
    });
  });
  return merged;
}

function getRecentChanges(){
  normalizeChanges(data);
  return data.changes.slice().sort((a,b)=>String(b.timestamp||"").localeCompare(String(a.timestamp||"")));
}

function markChangesViewed(changeIds){
  const seen = getSeenUpdateIds();
  (Array.isArray(changeIds) ? changeIds : []).forEach(id => {
    if(id) seen.add(String(id));
  });
  saveSeenUpdateIds(seen);
}

function getChangesForResource(resourceId, { unseenOnly = false } = {}){
  const seen = getSeenUpdateIds();
  return getRecentChanges().filter(entry => {
    return entry.type === "resource" &&
      String(entry.targetId || "") === String(resourceId || "") &&
      (!unseenOnly || !seen.has(String(entry.id)));
  });
}

function getCategoryIdsForChange(entry){
  if(!entry) return [];
  if(Array.isArray(entry.categoryIds) && entry.categoryIds.length) return entry.categoryIds.slice();
  if(entry.type === "category") return entry.targetId ? [String(entry.targetId)] : [];
  const res = data.resources.find(r => String(r && r.id || "") === String(entry.targetId || ""));
  return Array.isArray(res && res.categories) ? res.categories.slice() : [];
}

function formatChangeEntryHTML(entry){
  const dateText = formatDateOnly(entry && entry.timestamp);
  const detail = `${entry && entry.type ? entry.type : ""} ${entry && entry.action ? entry.action : ""}`.trim();
  const description = String(entry && entry.description || "").trim();
  return `<strong>${escapeHTML(entry.targetName || "(Unnamed)")}</strong><div>${escapeHTML(dateText)}: ${escapeHTML(detail)}</div>${description ? `<div>${escapeHTML(description)}</div>` : ""}`;
}

function formatPackageChangeSummary(entry){
  const targetName = String(entry && entry.targetName || "(Unnamed)").trim() || "(Unnamed)";
  const description = String(entry && entry.description || "").trim();
  const fallback = `${entry && entry.type ? entry.type : ""} ${entry && entry.action ? entry.action : ""}`.trim();
  return `${targetName} - ${description || fallback || "updated"}`;
}

function buildPackageMergeSummary(summary){
  if(!summary || typeof summary !== "object") return [];
  const entries = [];
  [
    { names:summary.resourceNamesAdded, label:"Resource added" },
    { names:summary.resourceNamesUpdated, label:"Resource updated" },
    { names:summary.categoryNamesAdded, label:"Category added" },
    { names:summary.categoryNamesUpdated, label:"Category updated" }
  ].forEach(group => {
    (Array.isArray(group.names) ? group.names : []).forEach(name => {
      const cleanName = String(name || "").trim();
      if(cleanName) entries.push(`${cleanName} - ${group.label}`);
    });
  });
  return entries;
}

function chooseMergeObject(localItem, incomingItem){
  // Package merging is conservative: keep local data unless the incoming item is
  // clearly newer, and fall back to incoming data only when no timestamps can
  // establish a winner.
  if(!localItem && incomingItem) return { item:incomingItem, changed:true };
  if(localItem && !incomingItem) return { item:localItem, changed:false };

  const localTime = getValidTimestamp(localItem.lastModified);
  const incomingTime = getValidTimestamp(incomingItem.lastModified);
  const differs = objectsDiffer(localItem, incomingItem);

  if(localTime !== null && incomingTime !== null){
    return incomingTime > localTime
      ? { item:incomingItem, changed:differs }
      : { item:localItem, changed:false };
  }
  if(localTime === null && incomingTime !== null) return { item:incomingItem, changed:differs };
  if(localTime !== null && incomingTime === null) return { item:localItem, changed:false };
  return differs
    ? { item:incomingItem, changed:true }
    : { item:localItem, changed:false };
}

function mergeItemsById(localItems, incomingItems, options = {}){
  // Categories and resources both merge by stable id. The counters/names returned
  // here are only for user-facing "what changed" summaries after import.
  const localList = Array.isArray(localItems) ? localItems : [];
  const incomingList = Array.isArray(incomingItems) ? incomingItems : [];
  const incomingById = new Map(incomingList.map(item => [String(item && item.id || ""), item]).filter(([id]) => id));
  const seen = new Set();
  const merged = [];
  const addedNames = [];
  const updatedNames = [];
  let added = 0;
  let updated = 0;

  localList.forEach(localItem => {
    const id = String(localItem && localItem.id || "");
    if(!id) return;
    const incomingItem = incomingById.get(id);
    const choice = chooseMergeObject(localItem, incomingItem);
    merged.push(cloneDataObject(choice.item));
    seen.add(id);
    if(incomingItem && choice.item === incomingItem && choice.changed){
      updated += 1;
      updatedNames.push(String(incomingItem.name || incomingItem.title || id));
    }
  });

  incomingList.forEach(incomingItem => {
    const id = String(incomingItem && incomingItem.id || "");
    if(!id || seen.has(id)) return;
    merged.push(cloneDataObject(incomingItem));
    seen.add(id);
    added += 1;
    addedNames.push(String(incomingItem.name || incomingItem.title || id));
  });

  return { merged, added, updated, addedNames, updatedNames };
}

function normalizePackageData(nextData){
  if(!nextData || typeof nextData !== "object") nextData = {};
  nextData.resourcePackageSchemaVersion = RESOURCE_PACKAGE_SCHEMA_VERSION;
  if(!Array.isArray(nextData.categories)) nextData.categories = [];
  if(!Array.isArray(nextData.resources)) nextData.resources = [];
  normalizeDataInformationShape(nextData);
  normalizeDataPDFShape(nextData);
  normalizeLegacyPackageShape(nextData);
  normalizeLegacyTagsShape(nextData);
  normalizeDataForGroupsShape(nextData);
  normalizeDataCategoryFilterShape(nextData);
  normalizeDataVerifiedOnShape(nextData);
  normalizeChanges(nextData);
  nextData.packageVersion = normalizePackageVersionValue(nextData.packageVersion);
  normalizeLastLoadedPackageInfo(nextData);
  return nextData;
}

function buildResourcePackageData(sourceData){
  // Resource packages are intentionally smaller than local app state. Do not add
  // UI-only fields such as lastLoadedPackageInfo, undo, or selected filters here.
  const source = normalizePackageData(cloneDataObject(sourceData || {}));
  return {
    resourcePackageSchemaVersion: RESOURCE_PACKAGE_SCHEMA_VERSION,
    appVersion: APP_VERSION,
    packageVersion: source.packageVersion,
    lastModified: source.lastModified || nowISO(),
    categories: source.categories,
    forGroups: source.forGroups,
    resources: source.resources,
    changes: source.changes
  };
}

function collectLegacyPackageFieldErrors(packageData){
  // Legacy TSO packages are accepted and normalized during import. Keep this
  // hook for fields that cannot be translated safely in the future.
  const errors = [];
  if(!packageData || typeof packageData !== "object") return errors;
  return errors;
}

function mergeResourcePackages(localData, incomingData){
  // Merge into cloned normalized objects so a failed import cannot partially
  // mutate the user's current data.
  const local = normalizePackageData(cloneDataObject(localData));
  const incoming = normalizePackageData(cloneDataObject(incomingData));
  const categoryMerge = mergeItemsById(local.categories, incoming.categories, { kind:"categories" });
  const resourceMerge = mergeItemsById(local.resources, incoming.resources, { kind:"resources" });
  const mergedData = {
    ...local,
    ...incoming,
    categories: categoryMerge.merged,
    resources: resourceMerge.merged,
    changes: mergeChanges(local.changes, incoming.changes),
    forGroups: normalizeTaxonomyLabels([...(local.forGroups || []), ...(incoming.forGroups || [])]),
    resourcePackageSchemaVersion: RESOURCE_PACKAGE_SCHEMA_VERSION
  };
  normalizePackageData(mergedData);
  return {
    mergedData,
    summary: {
      categoriesAdded: categoryMerge.added,
      categoriesUpdated: categoryMerge.updated,
      resourcesAdded: resourceMerge.added,
      resourcesUpdated: resourceMerge.updated,
      categoryNamesAdded: categoryMerge.addedNames,
      categoryNamesUpdated: categoryMerge.updatedNames,
      resourceNamesAdded: resourceMerge.addedNames,
      resourceNamesUpdated: resourceMerge.updatedNames
    }
  };
}

async function mergeZipAssets(zip, mergedData){
  const pdfKeys = collectPDFPathsFromResources(mergedData.resources);
  const missing = [];

  for(const key of pdfKeys){
    const entry = zip.file(key);
    if(entry && key.toLowerCase().endsWith(".pdf")){
      const blob = await entry.async("blob");
      await savePDF(key, blob);
    }else{
      let existing = null;
      try{
        existing = await getPDF(key);
      }catch(_err){}
      if(!existing) missing.push(key);
    }
  }
  return missing;
}

function applyMergedData(mergedData){
  normalizePackageData(mergedData);
  data = mergedData;
  persist();
  safeRender();
}

async function beginResourcePackageSave(){
  // Request a save target up front so browsers can honor the user gesture.
  const suggestedName = "tso-resource-package.zip";
  if(typeof window.showSaveFilePicker === "function"){
    const handle = await window.showSaveFilePicker({
      id: "tso-resources",
      startIn: "downloads",
      suggestedName,
      types: [{
        description: "TSO resource package",
        accept: {
          "application/zip": [".zip"]
        }
      }]
    });
    return { kind:"file-handle", handle, suggestedName };
  }
  return { kind:"download", suggestedName };
}

function downloadResourcePackageBlob(fileName, blob){
  const cleanFileName = fileName || "tso-resource-package.zip";
  const downloadBlob = blob.type === "application/octet-stream"
    ? blob
    : new Blob([blob], { type:"application/octet-stream" });
  const url = URL.createObjectURL(downloadBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = cleanFileName;
  a.type = "application/json";
  a.rel = "noopener";
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function saveResourcePackageBlob(target, blob){
  const fileName = target && target.suggestedName ? target.suggestedName : getResourcePackageFilename();
  if(target && target.kind === "file-handle" && target.handle){
    const writable = await target.handle.createWritable();
    try{
      await writable.write(blob);
      await writable.close();
    }catch(err){
      try{
        await writable.abort();
      }catch(_err){}
      throw err;
    }
    return;
  }

  downloadResourcePackageBlob(fileName, blob);
}

async function exportPackage(){
  // Exports package ZIP: tso-resources.json + any referenced PDF blobs.
  if(!commitPendingEditsIfChanged()) return;

  if(typeof JSZip === "undefined"){
    alert("ZIP support is unavailable. Reload the app and try again.");
    return;
  }

  let previousPackageVersion;
  let packageVersionBumped = false;
  try{
    const saveTarget = await beginResourcePackageSave();
    const zip = new JSZip();
    normalizePackageData(data);
    previousPackageVersion = data.packageVersion;
    data.packageVersion = getNextPackageVersionValue(data.packageVersion);
    packageVersionBumped = true;

    const packageData = buildResourcePackageData(data);
    zip.file("tso-resources.json", JSON.stringify(packageData, null, 2));

    const pdfKeys = collectPDFPathsFromResources(packageData.resources);
    for(const key of pdfKeys){
      const blob = await getPDF(key);
      if(blob){
        zip.file(key, blob);
      }
    }

    const blob = await zip.generateAsync({ type: "blob" });
    await saveResourcePackageBlob(saveTarget, blob);
    persist();
    showToast("Resource package saved");
  }catch(err){
    if(err && err.name === "AbortError") return;
    if(packageVersionBumped) data.packageVersion = previousPackageVersion;
    alert("Save failed: " + err.message);
  }
}

function beginMergeImportPackage(){
  // Opens a package ZIP picker for merge-based resource reload.
  if(!commitPendingEditsIfChanged()) return;

  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".zip";
  input.style.display = "none";
  input.onchange = mergeImportPackage;
  document.body.appendChild(input);
  input.value = "";
  input.click();
}

function validateImportData(imported){
  // Validates imported resource package JSON before merging current data.
  const errors = [];
  const warnings = [];

  if(!imported || typeof imported !== "object"){
    return { ok:false, errors:["File is not a valid JSON object"], warnings:[] };
  }

  if(!Array.isArray(imported.categories)){
    errors.push("Missing or invalid 'categories' array");
  }

  if(!Array.isArray(imported.resources)){
    errors.push("Missing or invalid 'resources' array");
  }

  if(imported.resourcePackageSchemaVersion != null && imported.resourcePackageSchemaVersion !== RESOURCE_PACKAGE_SCHEMA_VERSION){
    errors.push(`Unsupported resource package schema. Expected ${RESOURCE_PACKAGE_SCHEMA_VERSION}.`);
  }

  collectLegacyPackageFieldErrors(imported).forEach(error => errors.push(error));

  const categoryIds = new Set();
  (Array.isArray(imported.categories) ? imported.categories : []).forEach((c, i) => {
    if(!c.id) errors.push(`Category at index ${i} is missing id`);
    if(!c.label) warnings.push(`Category '${c.id || i}' missing label`);
    if(c.id){
      if(categoryIds.has(c.id)){
        errors.push(`Duplicate category id '${c.id}'`);
      }
      categoryIds.add(c.id);
    }
  });

  const resourceIds = new Set();
  (Array.isArray(imported.resources) ? imported.resources : []).forEach((r, i) => {
    if(!r.id) errors.push(`Resource at index ${i} missing id`);
    if(!r.name) warnings.push(`Resource '${r.id || i}' missing name`);

    if(r.id){
      if(resourceIds.has(r.id)){
        errors.push(`Duplicate resource id '${r.id}'`);
      }
      resourceIds.add(r.id);
    }

    if(Array.isArray(r.categories)){
      r.categories.forEach(catId => {
        if(!categoryIds.has(catId)){
          warnings.push(`Resource '${r.id}' references unknown category '${catId}'`);
        }
      });
    }
    if("pdfs" in r && !Array.isArray(r.pdfs)){
      errors.push(`Resource '${r.id || i}' has invalid 'pdfs' value`);
    }
    (Array.isArray(r.pdfs) ? r.pdfs : []).forEach((pdf, pdfIndex) => {
      if(!pdf || typeof pdf !== "object"){
        errors.push(`Resource '${r.id || i}' PDF ${pdfIndex} must be an object`);
        return;
      }
      if(!pdf.path) errors.push(`Resource '${r.id || i}' PDF ${pdfIndex} is missing path`);
    });
  });

  return {
    ok: errors.length === 0,
    errors,
    warnings
  };
}

async function mergeImportPackage(event){
  // Imports package ZIP, validates JSON, merges data, then stores referenced PDFs.
  if(!commitPendingEditsIfChanged()){
    event.target.remove();
    return;
  }

  const file = event.target.files && event.target.files[0];
  if(!file){
    event.target.remove();
    return;
  }

  try{
    if(typeof JSZip === "undefined"){
      throw new Error("ZIP support is unavailable. Reload the app and try again.");
    }
    const zip = await JSZip.loadAsync(file);
    const jsonFile = zip.file("tso-resources.json");
    if(!jsonFile){
      alert("Package missing tso-resources.json");
      return;
    }

    const jsonText = await jsonFile.async("string");
    const imported = JSON.parse(jsonText);

    const report = validateImportData(imported);
    if(!report.ok){
      alert(
        "Load failed due to errors:\n\n" +
        report.errors.join("\n")
      );
      return;
    }
    normalizePackageData(imported);
    const importedChangeIds = new Set((imported.changes || []).map(entry => String(entry && entry.id || "")).filter(Boolean));
    const importedPackageVersion = normalizePackageVersionValue(imported.packageVersion);

    const localResourcesWithPdf = ((data && data.resources) || [])
      .map(r => ({ resource:r, paths:collectPDFPathsFromResource(r) }))
      .filter(item => item.paths.length);
    const { mergedData, summary:mergeSummary } = mergeResourcePackages(data, imported);
    const mergedById = new Map((mergedData.resources || []).map(r => [String(r && r.id || ""), r]));
    const resourcesWithPdf = localResourcesWithPdf
      .filter(item => {
        const mergedResource = mergedById.get(String(item.resource && item.resource.id || ""));
        const mergedPaths = new Set(collectPDFPathsFromResource(mergedResource));
        return item.paths.some(path => !mergedPaths.has(path));
      })
      .map(item => item.resource.name);

    const missingPdfPaths = await mergeZipAssets(zip, mergedData);
    applyMergedData(mergedData);
    const loadedChanges = getRecentChanges().filter(entry => importedChangeIds.has(String(entry.id || "")));
    const loadedChangeSummaries = loadedChanges.length
      ? loadedChanges.map(formatPackageChangeSummary)
      : buildPackageMergeSummary(mergeSummary);
    data.lastLoadedPackageInfo = {
      packageVersion: importedPackageVersion,
      loadedAt: nowISO(),
      changes: loadedChangeSummaries
    };
    normalizeLastLoadedPackageInfo(data);
    data.changes = [];
    persist();
    if(loadedChangeSummaries.length){
      pendingRecentUpdates = [];
      recentUpdateDetail = null;
      showUpdateInfo = true;
      showRecentChangeLog = false;
      view = "recent-updates";
      safeRender();
    }
    const warningBlocks = [];
    if(resourcesWithPdf.length > 0){
      warningBlocks.push(
        "The following PDFs were not preserved:\n\n" +
        resourcesWithPdf.map(name => `• ${name}`).join("\n")
      );
    }
    if(missingPdfPaths.length > 0){
      warningBlocks.push(
        "The package referenced PDF files that were not found in the zip:\n\n" +
        missingPdfPaths.map(path => `• ${path}`).join("\n")
      );
    }
    if(warningBlocks.length){
      alert(warningBlocks.join("\n\n"));
    }
    showToast("Resource package merged. You can delete the package zip when you are done.");
  }catch(e){
    alert("Load failed: " + e.message);
  }finally{
    // allow re-import of same filename
    event.target.value = "";
    event.target.remove();
  }
}

/* =========================
   Admin UI
========================= */
// The functions below support both user search and admin-only "referenced by"
// inspection. A resource can be referenced by long list-style resources, so
// matching uses normalized token phrases instead of raw substring checks.

function getReferenceCategoryEntries(resource){
  const categoryIds = Array.isArray(resource && resource.categories)
    ? resource.categories.map(id => String(id || "")).filter(Boolean)
    : [];
  const categoryIdSet = new Set(categoryIds);
  const entries = [];
  const seen = new Set();

  (Array.isArray(data.categories) ? data.categories : [])
    .slice()
    .sort(compareCategoriesByLabel)
    .forEach((cat, index) => {
      const id = String(cat && cat.id || "");
      if(!categoryIdSet.has(id)) return;
      const label = String(cat && cat.label || id || "Uncategorized");
      const key = label.toLowerCase();
      if(seen.has(key)) return;
      seen.add(key);
      entries.push({ label, order:index });
    });

  categoryIds.forEach(id => {
    if(entries.some(entry => entry.label === id)) return;
    if((data.categories || []).some(cat => String(cat && cat.id || "") === id)) return;
    const key = id.toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    entries.push({ label:id, order:9999 });
  });

  if(!entries.length){
    entries.push({ label:"Uncategorized", order:9999 });
  }

  return entries;
}

function normalizeReferenceSearchText(value){
  return String(value || "")
    .toLowerCase()
    .normalize("NFKD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, " ")
    .trim()
    .replace(/\s+/g, " ");
}

function getReferenceTokens(value){
  const normalized = normalizeReferenceSearchText(value);
  return normalized ? normalized.split(" ") : [];
}

function textContainsTokenPhrase(text, phrase){
  const needleTokens = getReferenceTokens(phrase);
  const haystackTokens = getReferenceTokens(text);
  if(!needleTokens.length || haystackTokens.length < needleTokens.length) return false;

  for(let i = 0; i <= haystackTokens.length - needleTokens.length; i += 1){
    let matched = true;
    for(let j = 0; j < needleTokens.length; j += 1){
      if(haystackTokens[i + j] !== needleTokens[j]){
        matched = false;
        break;
      }
    }
    if(matched) return true;
  }
  return false;
}

function isReferenceNameSearchable(resourceName){
  const rawName = String(resourceName || "").trim();
  if(!rawName) return false;
  if(rawName.length >= 4) return true;
  if(/\s/.test(rawName)) return true;
  return /[A-Z]/.test(rawName) && rawName === rawName.toUpperCase();
}

function informationTextReferencesName(informationText, resourceName){
  if(!isReferenceNameSearchable(resourceName)) return false;
  return textContainsTokenPhrase(informationText, resourceName);
}

function getReferenceSnippet(informationText, resourceName){
  const text = String(informationText || "").replace(/\s+/g, " ").trim();
  if(!text) return "";

  const lowerText = text.toLowerCase();
  const lowerName = String(resourceName || "").toLowerCase();
  const directIndex = lowerName ? lowerText.indexOf(lowerName) : -1;
  const center = directIndex >= 0 ? directIndex : 0;
  const start = Math.max(0, center - 70);
  const end = Math.min(text.length, center + Math.max(lowerName.length, 1) + 90);
  const prefix = start > 0 ? "... " : "";
  const suffix = end < text.length ? " ..." : "";
  return `${prefix}${text.slice(start, end)}${suffix}`;
}

function getResourceCategoryEntriesForSearch(resource){
  const categoryIds = Array.isArray(resource && resource.categories)
    ? resource.categories.map(id => String(id || "")).filter(Boolean)
    : [];
  const categoryIdSet = new Set(categoryIds);
  const entries = [];
  const seen = new Set();

  (Array.isArray(data.categories) ? data.categories : [])
    .slice()
    .sort(compareCategoriesByLabel)
    .forEach((cat, index) => {
      const id = String(cat && cat.id || "");
      if(!categoryIdSet.has(id) || seen.has(id)) return;
      seen.add(id);
      entries.push({
        id,
        label:String(cat && cat.label || id || "Uncategorized"),
        order:index
      });
    });

  categoryIds.forEach(id => {
    if(seen.has(id)) return;
    seen.add(id);
    entries.push({ id, label:id, order:9999 });
  });

  if(resourceMatchesListsHeuristic(resource) && !seen.has(LISTS_CATEGORY_ID)){
    seen.add(LISTS_CATEGORY_ID);
    entries.push({ id:LISTS_CATEGORY_ID, label:"Lists", order:9998 });
  }

  return entries;
}

function addSearchResult(groupMap, groups, category, resource, options = {}){
  if(!category || !category.id || !resource) return;
  const groupKey = String(category.id);
  if(!groupMap.has(groupKey)){
    const group = { categoryId:category.id, categoryLabel:category.label, categoryOrder:category.order, items:[], seen:new Set() };
    groupMap.set(groupKey, group);
    groups.push(group);
  }
  const group = groupMap.get(groupKey);
  const resourceId = String(resource.id || "");
  if(group.seen.has(resourceId)) return;
  group.seen.add(resourceId);
  group.items.push({
    resourceId,
    resourceName:String(resource.name || "(Unnamed resource)"),
    snippet:String(options.snippet || "")
  });
}

function addTaxonomySearchResults(groupMap, groups, cleanQuery, resources){
  const queryHasTokens = !!getReferenceTokens(cleanQuery).length;
  if(!queryHasTokens) return;

  const resourceList = Array.isArray(resources) ? resources : [];
  const categoryEntries = (Array.isArray(data.categories) ? data.categories : [])
    .slice()
    .sort(compareCategoriesByLabel)
    .map((category, order) => ({ category, order }));
  if(getListsResources().length){
    categoryEntries.push({ category:{ id:LISTS_CATEGORY_ID, label:"Lists", filters:[] }, order:9998 });
  }

  categoryEntries.forEach(({ category:sourceCategory, order }) => {
    const categoryId = String(sourceCategory && sourceCategory.id || "");
    if(!categoryId) return;
    const categoryLabel = String(sourceCategory && sourceCategory.label || categoryId);
    const searchCategory = { id:categoryId, label:categoryLabel, order };
    const categoryResources = isListsCategory(categoryId)
      ? resourceList.filter(resourceMatchesListsHeuristic)
      : resourceList.filter(resource => Array.isArray(resource && resource.categories) && resource.categories.includes(categoryId));

    if(textContainsTokenPhrase(categoryLabel, cleanQuery)){
      categoryResources.forEach(resource => {
        addSearchResult(groupMap, groups, searchCategory, resource, { snippet:`Category: ${categoryLabel}` });
      });
    }

    normalizeCategoryFilters(sourceCategory && sourceCategory.filters).forEach(filter => {
      if(!textContainsTokenPhrase(filter, cleanQuery)) return;
      categoryResources
        .filter(resource => getResourceCategoryFilterKeys(resource, categoryId).has(makeCategorySpecificFilterKey(filter)))
        .forEach(resource => {
          addSearchResult(groupMap, groups, searchCategory, resource, { snippet:`Type: ${filter}` });
        });
    });
  });

  normalizeTaxonomyLabels(data.forGroups).forEach(group => {
    if(!textContainsTokenPhrase(group, cleanQuery)) return;
    const groupKey = makeForGroupFilterKey(group);
    resourceList
      .filter(resource => getResourceForGroupFilterKeys(resource).has(groupKey))
      .forEach(resource => {
        getResourceCategoryEntriesForSearch(resource).forEach(category => {
          addSearchResult(groupMap, groups, category, resource, { snippet:`For: ${group}` });
        });
      });
  });
}

function buildSearchResults(query){
  const cleanQuery = String(query || "").trim();
  const empty = { query:cleanQuery, mode:"none", groups:[] };
  if(!getReferenceTokens(cleanQuery).length) return empty;

  const resources = Array.isArray(data.resources) ? data.resources : [];
  let groups = [];
  let groupMap = new Map();

  resources.forEach(resource => {
    if(!textContainsTokenPhrase(resource && resource.name, cleanQuery)) return;
    getResourceCategoryEntriesForSearch(resource).forEach(category => {
      addSearchResult(groupMap, groups, category, resource);
    });
  });

  if(groups.length){
    return { query:cleanQuery, mode:"name", groups:sortSearchResultGroups(groups) };
  }

  groups = [];
  groupMap = new Map();
  addTaxonomySearchResults(groupMap, groups, cleanQuery, resources);
  if(groups.length){
    return { query:cleanQuery, mode:"taxonomy", groups:sortSearchResultGroups(groups) };
  }

  groups = [];
  groupMap = new Map();
  resources.forEach(resource => {
    if(!textContainsTokenPhrase(resource && resource.informationText, cleanQuery)) return;
    getResourceCategoryEntriesForSearch(resource).forEach(category => {
      addSearchResult(groupMap, groups, category, resource, {
        snippet:getReferenceSnippet(resource && resource.informationText, cleanQuery)
      });
    });
  });

  return { query:cleanQuery, mode:groups.length ? "information" : "none", groups:sortSearchResultGroups(groups) };
}

function sortSearchResultGroups(groups){
  return (Array.isArray(groups) ? groups : [])
    .map(group => ({
      ...group,
      items:group.items.slice().sort((a,b)=>a.resourceName.localeCompare(b.resourceName, undefined, { sensitivity:"base" }))
    }))
    .sort((a, b) => {
      if(a.categoryOrder !== b.categoryOrder) return a.categoryOrder - b.categoryOrder;
      return a.categoryLabel.localeCompare(b.categoryLabel, undefined, { sensitivity:"base" });
    });
}

function resourceIsListStyle(resource){

function findReferencingLists(resourceOrName){
  const targetId = resourceOrName && typeof resourceOrName === "object"
    ? String(resourceOrName.id || "")
    : "";
  const resourceName = resourceOrName && typeof resourceOrName === "object"
    ? resourceOrName.name
    : resourceOrName;
  const needle = String(resourceName || "").trim();
  if(!isReferenceNameSearchable(needle)) return [];

  const matches = [];
  const seen = new Set();
  (Array.isArray(data.resources) ? data.resources : []).forEach(resource => {
    const resourceId = String(resource && resource.id || "");
    if(targetId && resourceId === targetId) return;
    if(!resourceIsListStyle(resource)) return;
    const informationText = String(resource && resource.informationText || "");
    if(!informationTextReferencesName(informationText, needle)) return;

    const listName = String(resource && resource.name || "(Unnamed list)");
    const key = String(resource && resource.id || listName).toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    const categoryEntries = getReferenceCategoryEntries(resource);
    matches.push({
      categoryLabels: categoryEntries.map(category => category.label),
      categoryOrder: Math.min(...categoryEntries.map(category => category.order)),
      listName,
      snippet: getReferenceSnippet(informationText, needle)
    });
  });

  return matches.sort((a, b) => {
    if(a.categoryOrder !== b.categoryOrder) return a.categoryOrder - b.categoryOrder;
    return a.listName.localeCompare(b.listName, undefined, { sensitivity:"base" });
  });
}

function showReferenceModal(resourceName, matches){
  const modal = getReferenceModal();

  const bodyHTML = matchItems.length
    ? matchItems.map(match => {
      const categoryLabels = Array.isArray(match && match.categoryLabels) && match.categoryLabels.length
        ? match.categoryLabels
        : ["Uncategorized"];
      return `
        <div class="reference-match">
          <div class="reference-match-name">${escapeHTML(match && match.listName || "(Unnamed list)")}</div>
          <div class="reference-match-categories">Categories: ${escapeHTML(categoryLabels.join(", "))}</div>
          ${match && match.snippet ? `<div class="reference-match-snippet">${escapeHTML(match.snippet)}</div>` : ""}
        </div>
      `;
    }).join("")
    : `<p class="reference-empty">No list resources reference this resource.</p>`;

function resourceEditorDraft(){

function validateResourceName(draft, idx){
  // Prevent empty names and duplicates before applying/persisting resource edits.
  const name = String(draft && draft.name || "").trim();
  if(!name){
    return { valid:false, message:"Name is required." };
  }
  const lower = name.toLowerCase();
  const duplicate = data.resources.some((r, i) => i !== idx && String(r && r.name || "").trim().toLowerCase() === lower);
  if(duplicate){
    return { valid:false, message:"Another resource already uses this name." };
  }
  return { valid:true, message:"" };
}

function normalizeCategoryName(name){
  return String(name || "").trim().toLowerCase();
}

function compareCategoriesByLabel(a, b){
  const labelA = String(a && a.label || "");
  const labelB = String(b && b.label || "");
  return labelA.localeCompare(labelB, undefined, { sensitivity:"base" });
}

function getAlphabeticalCategoryPairs(){
  return (Array.isArray(data.categories) ? data.categories : [])
    .map((c,i)=>({c,i}))
    .sort((a,b)=>{
      const labelCompare = compareCategoriesByLabel(a.c, b.c);
      return labelCompare || a.i - b.i;
    });
}

function categoryNameExists(name, excludeId){
  const normalizedName = normalizeCategoryName(name);
  if(!normalizedName) return false;
  return (Array.isArray(data.categories) ? data.categories : []).some(cat => {
    if(excludeId && String(cat && cat.id || "") === String(excludeId)) return false;
    return normalizeCategoryName(cat && cat.label) === normalizedName;
  });
}

function validateCategoryDraft(draft){
  if(categoryNameExists(draft && draft.label, draft && draft.id)){
    return { valid:false, message:"Category already exists." };
  }
  return { valid:true, message:"" };
}

function applyResourceDraft(idx, draft){
  // Apply validated resource draft into canonical data model. The editor stores
  // empty text fields as empty strings, but taxonomy fields are always arrays or
  // objects so package export stays predictable.
  const res = data.resources[idx];
  if(!res) return;
  res.name = draft.name || res.name;
  res.phone = draft.phone;
  res.address = draft.address;
  res.website = draft.website;
  res.hours = draft.hours;
  res.description = draft.description;
  res.informationText = draft.informationText;
  const verifiedValidation = validateVerifiedOnInput(draft.verifiedOn);
  res.verifiedOn = verifiedValidation.valid ? verifiedValidation.normalized : null;
  if("reviewedOn" in res) delete res.reviewedOn;
  if("verifiedDate" in res) delete res.verifiedDate;
  res.categories = draft.categories;
  res.categoryFilters = draft.categoryFilters || {};
  res.forGroups = normalizeTaxonomyLabels(draft.forGroups);
  res.lastModified = nowISO();
  refreshAdminCategoryResourceList();
}

  document.body.appendChild(modal);

  };

function confirmBlankUpdateDescription(draft){
  if(String(draft && draft.updateDescription || "").trim()) return true;
  if(allowBlankUpdateDescriptionOnce){
    allowBlankUpdateDescriptionOnce = false;
    return true;
  }
  promptBlankUpdateDescription();
  return false;
}

function commitPendingEditsIfChanged(){
  // Editor commit pattern:
  // UI fields -> draft snapshot -> validation -> apply canonical update -> persist.
  // This runs before view/tab changes and before package save/import. Returning
  // false blocks navigation so the admin can correct invalid or undescribed edits.
  if(!editing) return true;

  let nextSnapshot = "";
  if(editing.kind === "category"){
    nextSnapshot = snapshotCategoryEditor();
    if(!nextSnapshot) return true;
    const draft = JSON.parse(nextSnapshot);
    const validation = validateCategoryDraft(draft);
    showCategoryEditorWarning(validation.message);
    if(!validation.valid){
      const labelInput = document.getElementById("cat_label");
      if(labelInput) labelInput.focus();
      return false;
    }
    if(nextSnapshot !== editorSnapshot){
      if(!confirmBlankUpdateDescription(draft)) return false;
      const action = newCategoryIds.has(draft.id) ? "added" : "updated";
      applyCategoryDraft(editing.idx, draft);
      addChangeEntry(createChangeEntry("category", action, draft.id, draft.label || "(Unnamed category)", draft.updateDescription));
      newCategoryIds.delete(draft.id);
      persist();
      editorSnapshot = nextSnapshot;
    }
    return true;
  }

  if(editing.kind === "resource"){
    nextSnapshot = snapshotResourceEditor();
    if(!nextSnapshot) return true;
    const draft = JSON.parse(nextSnapshot);
    const validation = validateResourceName(draft, editing.idx);
    const verifiedValidation = validateVerifiedOnInput(draft.verifiedOn);
    showResourceNameWarning(validation.message);
    showResourceVerifiedWarning(verifiedValidation.message);
    if(!validation.valid){
      const nameInput = document.getElementById("res_name");
      if(nameInput) nameInput.focus();
      return false;
    }
    if(!verifiedValidation.valid){
      const verifiedInput = document.getElementById("res_verified_on");
      if(verifiedInput) verifiedInput.focus();
      return false;
    }
    if(nextSnapshot !== editorSnapshot){
      if(!confirmBlankUpdateDescription(draft)) return false;
      const resource = data.resources[editing.idx];
      const resourceId = resource && resource.id ? resource.id : "";
      const action = newResourceIds.has(resourceId) ? "added" : "updated";
      applyResourceDraft(editing.idx, draft);
      const saved = data.resources[editing.idx];
      addChangeEntry(createChangeEntry("resource", action, saved && saved.id, draft.name || "(Unnamed resource)", draft.updateDescription, { categoryIds:draft.categories }));
      if(saved && saved.id) newResourceIds.delete(saved.id);
      persist();
      editorSnapshot = nextSnapshot;
      if(saved && saved.id) selectedResourceId = saved.id;
    }
    return true;
  }

  if(editing.kind === "forGroups"){
    nextSnapshot = snapshotForGroupsEditor();
    if(!nextSnapshot) return true;
    const draft = JSON.parse(nextSnapshot);
    const validation = validateForGroupsDraft(draft);
    if(!validation.valid) return false;
    if(nextSnapshot !== editorSnapshot){
      applyForGroupsDraft(draft);
      persist();
      editorSnapshot = nextSnapshot;
    }
    return true;
  }
  return true;
}

    <div class="admin-panel category-admin-panel">
      <div class="category-admin-layout">
        <div class="admin-box">
          <h3 class="admin-panel-title">Categories</h3>
          <div class="admin-action-row" style="margin-bottom:8px;">
            <button class="button" onclick="newCategory()">New</button>
            <button class="button danger" onclick="deleteCategory()">Delete</button>
          </div>
          <div id="catSelect" class="resource-button-listbox" role="listbox" tabindex="0" aria-label="Categories"></div>
        </div>
        <div class="admin-box" id="catEditor"></div>
      </div>
    </div>
  `;

  const sel = document.getElementById("catSelect");

  // Sort for display, but keep option value = real index.
  const pairs = getAlphabeticalCategoryPairs();

  populateCategoryBrowseOptions(sel, pairs);

  sel.addEventListener("click", event => {
    const btn = event.target.closest(".resource-listbox-option");
    if(!btn || !sel.contains(btn)) return;
    if(!commitPendingEditsIfChanged()) return;
    setCategoryBrowseSelection(sel, btn.dataset.categoryIndex || "");
    editCategory(parseInt(selectedCategoryIndex,10));
  });
  sel.addEventListener("dblclick", event => {
    if(!event.target.closest(".resource-listbox-option")) return;
    const labelInput = document.getElementById("cat_label");
    if(labelInput){
      labelInput.focus();
      labelInput.select();
    }
  });
  sel.onkeydown = (e) => {
    if(e.key === "Enter"){
      e.preventDefault();
      const labelInput = document.getElementById("cat_label");
      if(labelInput){
        labelInput.focus();
        labelInput.select();
      }
      return;
    }
    if(e.key === "Delete"){
      e.preventDefault();
      deleteCategory();
      return;
    }
    if(["ArrowDown", "ArrowUp", "Home", "End"].includes(e.key)){
      e.preventDefault();
      if(!commitPendingEditsIfChanged()) return;
      moveCategoryBrowseSelection(sel, e.key);
      editCategory(parseInt(selectedCategoryIndex,10));
    }
  };

  if(pairs.length && pairs.some(({i}) => String(i) === selectedCategoryIndex)){
    setCategoryBrowseSelection(sel, selectedCategoryIndex);
    editCategory(parseInt(selectedCategoryIndex,10));
  }else if(pairs.length){
    setCategoryBrowseSelection(sel, String(pairs[0].i));
    editCategory(parseInt(selectedCategoryIndex,10));
  }else{
    editing = null;
    editorSnapshot = "";
    selectedCategoryIndex = "";
    renderAdminCategoryResourceList("");
  }

}

function populateCategoryBrowseOptions(sel, pairs){
  if(!sel) return;
  sel.innerHTML = "";
  pairs.forEach(({c,i}) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "resource-listbox-option";
    btn.setAttribute("role", "option");
    btn.setAttribute("aria-selected", "false");
    btn.tabIndex = -1;
    btn.dataset.categoryIndex = String(i);
    btn.dataset.categoryId = String(c.id || "");
    btn.textContent = c.label || "";
    sel.appendChild(btn);
  });
}

function setCategoryBrowseSelection(sel, categoryIndex){
  const idx = categoryIndex == null ? "" : String(categoryIndex);
  selectedCategoryIndex = idx;
  if(!sel) return;
  sel.dataset.selectedCategoryIndex = idx;
  Array.from(sel.querySelectorAll(".resource-listbox-option")).forEach((btn, index) => {
    const selected = btn.dataset.categoryIndex === idx;
    btn.setAttribute("aria-selected", selected ? "true" : "false");
    if(!btn.id) btn.id = `catOption_${index}`;
    if(selected){
      sel.dataset.selectedCategoryId = btn.dataset.categoryId || "";
      sel.setAttribute("aria-activedescendant", btn.id);
      btn.scrollIntoView({ block:"nearest" });
    }
  });
}

function getCategoryIndexFromBrowseSelection(sel){
  const selectedButton = sel ? sel.querySelector('.resource-listbox-option[aria-selected="true"]') : null;
  const selectedCategoryId = selectedButton && selectedButton.dataset.categoryId
    ? selectedButton.dataset.categoryId
    : (sel && sel.dataset.selectedCategoryId ? sel.dataset.selectedCategoryId : "");
  if(selectedCategoryId){
    const idxById = getCategoryIndexById(selectedCategoryId);
    if(idxById !== -1) return idxById;
  }
  const selectedIndex = selectedCategoryIndex !== ""
    ? selectedCategoryIndex
    : (sel && sel.dataset.selectedCategoryIndex != null ? sel.dataset.selectedCategoryIndex : "");
  if(selectedIndex === "") return -1;
  const idx = parseInt(selectedIndex, 10);
  return Number.isInteger(idx) ? idx : -1;
}

function moveCategoryBrowseSelection(sel, key){
  if(!sel) return;
  const options = Array.from(sel.querySelectorAll(".resource-listbox-option"));
  if(!options.length) return;
  const current = options.findIndex(btn => btn.dataset.categoryIndex === selectedCategoryIndex);
  let next = current === -1 ? 0 : current;
  if(key === "ArrowDown") next = Math.min(next + 1, options.length - 1);
  if(key === "ArrowUp") next = Math.max(next - 1, 0);
  if(key === "Home") next = 0;
  if(key === "End") next = options.length - 1;
  setCategoryBrowseSelection(sel, options[next].dataset.categoryIndex);
}

function newCategory(){
  if(!commitPendingEditsIfChanged()) return;
  const newIndex = data.categories.length;
  const categoryId = generateResourceId();

  data.categories.push({
    id: categoryId,
    label: "",
    active: true,
    lastModified: nowISO(),
    filters: []
  });

  persist();
  newCategoryIds.add(categoryId);
  adminTab = "categories";
  selectedCategoryIndex = String(newIndex);
  safeRenderAdmin();
  const labelInput = document.getElementById("cat_label");
  if(labelInput) labelInput.focus();
}

function cancelCategoryEdit(){
  if(!editing || editing.kind !== "category") return;
  const cat = data.categories[editing.idx];
  if(cat && newCategoryIds.has(cat.id)){
    data.categories.splice(editing.idx, 1);
    newCategoryIds.delete(cat.id);
    delete selectedCategoryFilters[cat.id];
    selectedCategoryIndex = "";
    editing = null;
    persist();
    safeRenderAdmin();
    return;
  }
  editCategory(editing.idx);
}

function getCategoryDeleteChangeDescription(description){
  return String(description || "").trim() || "Deleted category.";
}

function closeCategoryDeletePrompt(){
  const modal = document.getElementById("categoryDeletePrompt");
  if(modal) modal.remove();
}

function promptCategoryDeleteDescription(cat, onSubmit){
  closeCategoryDeletePrompt();
  const modal = document.createElement("div");
  modal.id = "categoryDeletePrompt";
  modal.className = "reference-modal";
  modal.innerHTML = `
    <div class="reference-modal-panel" role="dialog" aria-modal="true" aria-labelledby="categoryDeletePromptTitle" aria-describedby="categoryDeletePromptSubtitle">
      <div class="reference-modal-header">
        <div>
          <div id="categoryDeletePromptTitle" class="reference-modal-title">Delete Category</div>
          <div id="categoryDeletePromptSubtitle" class="reference-modal-subtitle">${escapeHTML(cat.label || "(unnamed)")}</div>
        </div>
      </div>
      <div class="reference-modal-body">
        <label>Describe this update (optional)<br>
          <textarea id="category_delete_description" class="big" style="min-height:90px;"></textarea>
        </label>
        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
          <button class="button" type="button" id="categoryDeleteCancelBtn">Cancel</button>
          <button class="button danger" type="button" id="categoryDeleteConfirmBtn">Delete</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  const input = document.getElementById("category_delete_description");
  const cancelBtn = document.getElementById("categoryDeleteCancelBtn");
  const confirmBtn = document.getElementById("categoryDeleteConfirmBtn");
  const submit = () => {
    const description = input ? input.value : "";
    closeCategoryDeletePrompt();
    onSubmit(description);
  };
  if(cancelBtn) cancelBtn.onclick = closeCategoryDeletePrompt;
  if(confirmBtn) confirmBtn.onclick = submit;
  modal.addEventListener("click", event => {
    if(event.target === modal) closeCategoryDeletePrompt();
  });
  modal.addEventListener("keydown", event => {
    if(event.key === "Escape"){
      event.preventDefault();
      closeCategoryDeletePrompt();
    }
    if((event.ctrlKey || event.metaKey) && event.key === "Enter"){
      event.preventDefault();
      submit();
    }
  });
  if(input) input.focus();
}

function completeCategoryDelete(categoryId, updateDescription){
  const idx = data.categories.findIndex(cat => String(cat && cat.id || "") === String(categoryId || ""));
  const cat = data.categories[idx];
  if(!cat) return;
  const changeDescription = getCategoryDeleteChangeDescription(updateDescription);
  setUndoSnapshot(`deleted category "${cat.label}"`);

  // remove category from resources too
  data.resources.forEach(r=>{
    if(Array.isArray(r.categories)){
      r.categories = r.categories.filter(id => id !== cat.id);
    }
    if(r.categoryFilters && typeof r.categoryFilters === "object"){
      delete r.categoryFilters[cat.id];
    }
  });

  data.categories.splice(idx,1);
  delete selectedCategoryFilters[cat.id];
  addChangeEntry(createChangeEntry("category", "removed", cat.id, cat.label || "(Unnamed category)", changeDescription));
  newCategoryIds.delete(cat.id);
  selectedCategoryIndex = "";
  persist();
  showChangeLog();
}

function deleteCategory(){
  const sel = document.getElementById("catSelect");
  if(!sel) return;

  const idx = getCategoryIndexFromBrowseSelection(sel);
  if(idx === -1) return;
  const cat = data.categories[idx];
  if(!cat) return;
  if((!editing || editing.kind !== "category" || editing.idx !== idx) && !commitPendingEditsIfChanged()) return;

  const confirmDelete = confirm(buildAdminDeleteConfirmation("category", cat.label || "(unnamed)"));
  if(!confirmDelete) return;
  promptCategoryDeleteDescription(cat, description => {
    completeCategoryDelete(cat.id, description);
  });
}

function closeCategoryEditor(){

  const sel = document.getElementById("catSelect");

}

function editCategory(idx){
  const cat = data.categories[idx];
  const editor = document.getElementById("catEditor");
  if(!cat || !editor) return;
  selectedCategoryIndex = String(idx);
  cat.filters = normalizeCategoryFilters(cat.filters);

  editor.innerHTML = `
    <h3>Edit Category</h3>

    <label>Label<br>
      <input id="cat_label" value="${escapeHTML(cat.label || "")}">
    </label>
    <div id="cat_editor_warning" style="display:none; color:#aa0000; margin-top:4px;"></div><br>

    <label>Describe this update (optional)<br>
      <textarea id="cat_update_description" class="big" style="min-height:60px;"></textarea>
    </label><br><br>
    <hr style="margin:18px 0 12px; border:0; border-top:1px solid #ddd;">
    <div class="category-editor-layout">
      <div>
        <h4 style="margin:0 0 8px;">Types</h4>
        <p class="admin-note">Add specific types for this category.</p>
        <div class="admin-action-row" style="margin-bottom:8px;">
          <button class="button" type="button" id="cat_filter_new_btn">New</button>
          <button class="button danger" type="button" id="cat_filter_delete_btn">Delete</button>
        </div>
        <div id="catFilterRows"></div>
      </div>
      <div id="adminCategoryResourceList" style="display:none;"></div>
    </div>
  `;
  renderAdminCategoryResourceList(cat && cat.id ? cat.id : "");
  renderCategoryFilterRows(cat.filters);

  editing = { kind: "category", idx };
  editorSnapshot = snapshotCategoryEditor();

  const labelInput = document.getElementById("cat_label");
  const updateInput = document.getElementById("cat_update_description");
  const newFilterBtn = document.getElementById("cat_filter_new_btn");
  const deleteFilterBtn = document.getElementById("cat_filter_delete_btn");
  function validateCategoryEditorState(){
    const draft = categoryEditorDraft();
    if(!draft){
      showCategoryEditorWarning("");
      updateCategoryEditorActionBar();
      const doneBtn = document.getElementById("cat_done_btn");
      if(doneBtn) doneBtn.disabled = false;
      return;
    }
    const validation = validateCategoryDraft(draft);
    showCategoryEditorWarning(validation.message);
    updateCategoryEditorActionBar();
    const doneBtn = document.getElementById("cat_done_btn");
    if(doneBtn) doneBtn.disabled = !validation.valid;
  }
  if(labelInput) labelInput.addEventListener("input", validateCategoryEditorState);
  if(updateInput) updateInput.addEventListener("input", validateCategoryEditorState);
  if(newFilterBtn){
    newFilterBtn.addEventListener("click", () => {
      addCategoryFilterRow("");
      validateCategoryEditorState();
      const rows = Array.from(document.querySelectorAll(".catFilterInput"));
      const last = rows[rows.length - 1];
      if(last) last.focus();
    });
  }
  if(deleteFilterBtn){
    deleteFilterBtn.addEventListener("click", () => {
      const selected = Array.from(document.querySelectorAll(".catFilterSelect:checked"));
      selected.forEach(checkbox => {
        const row = checkbox.closest(".category-filter-row");
        if(row) row.remove();
      });
      if(selected.length) validateCategoryEditorState();
    });
  }
  validateCategoryEditorState();
}

function addCategoryFilterRow(value){
  const list = document.getElementById("catFilterRows");
  if(!list) return;
  const row = document.createElement("div");
  row.className = "category-filter-row";
  row.innerHTML = `
    <input type="checkbox" class="catFilterSelect" aria-label="Select filter">
    <input type="text" class="catFilterInput" value="${escapeHTML(value || "")}" aria-label="Category filter">
  `;
  const input = row.querySelector(".catFilterInput");
  if(input){
    input.addEventListener("input", () => {
      const doneBtn = document.getElementById("cat_done_btn");
      const draft = categoryEditorDraft();
      if(doneBtn && draft) doneBtn.disabled = !validateCategoryDraft(draft).valid;
      updateCategoryEditorActionBar();
    });
  }
  list.appendChild(row);
}

function renderCategoryFilterRows(filters){
  const list = document.getElementById("catFilterRows");
  if(!list) return;
  list.innerHTML = "";
  normalizeCategoryFilters(filters).forEach(filter => addCategoryFilterRow(filter));
}

function renderAdminResources(container){
  // Resource management view (browse list, edit mode, and For groups).
  if(adminResourceEditMode && !selectedResourceId && data.resources[0] && data.resources[0].id){
    selectedResourceId = data.resources[0].id;
  }

  if(!adminResourceEditMode){
    container.innerHTML += `
      <div class="admin-panel">
        <div class="admin-box">
          <h3 class="admin-panel-title">Resources</h3>
      <div class="resource-browse-wrap">
        <label class="admin-option-row" style="display:block;">
          <input type="checkbox" id="resSortShowVerified">
          Show verified dates
        </label>
            <div class="resource-browse-actions admin-action-row" style="margin-top:12px;">
              <button class="button" onclick="newResource()">New</button>
              <button class="button danger" onclick="deleteResource()">Delete</button>
              <span class="spacer"></span>
              <button class="button primary" onclick="openResourceEditor()">Edit</button>
            </div>
        <div id="resSelect" class="resource-button-listbox" role="listbox" tabindex="0" aria-label="Resources"></div>
          </div>
        </div>
      </div>
    `;

    const sel = document.getElementById("resSelect");
    const sortToggle = document.getElementById("resSortShowVerified");
    if(sortToggle){
      sortToggle.checked = adminShowVerifiedDates;
      sortToggle.onchange = () => {
        adminShowVerifiedDates = !!sortToggle.checked;
        populateResourceBrowseOptions(sel, selectedResourceId);
      };
    }

    populateResourceBrowseOptions(sel, selectedResourceId);
    sel.addEventListener("click", event => handleAdminResourceBrowseClick(event, sel));
    sel.addEventListener("dblclick", event => {
      if(!event.target.closest(".resource-listbox-option")) return;
      openResourceEditor();
    });
    sel.onkeydown = (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        openResourceEditor();
        return;
      }
      if(e.key === "Delete"){
        e.preventDefault();
        deleteResource();
        return;
      }
      if(["ArrowDown", "ArrowUp", "Home", "End"].includes(e.key)){
        e.preventDefault();
        moveResourceBrowseSelection(sel, e.key);
      }
    };

    editing = null;
    editorSnapshot = "";
    return;
  }

  const idx = getResourceIndexById(selectedResourceId);
  if(idx === -1){
    adminResourceEditMode = false;
    safeRenderAdmin();

  }

  container.innerHTML += `
    <div class="admin-panel">
      <div class="admin-box">
        <h3 style="margin:0;">Edit Resource</h3>
        <div id="resEditor" style="margin-top:12px;"></div>
      </div>
