<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="tso-storage-id" content="">
<title>&lt;New&gt; TSO Resources</title>

<!-- ===== APP CSS START ===== -->
<style>
:root {
  --page-gutter: clamp(28px, 4vw, 44px);
  --topbar-sticky-offset: 0px;
}
body { font-family: -apple-system, sans-serif; margin:0; padding:0; font-size:18px; line-height:1.45; }
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px var(--page-gutter);
  background:#003366;
  color:white;
  position:sticky;
  top:0;
  z-index:50;
}

.topbar .title {
  font-size:20px;
  font-weight:600;
}

.topbar .tabs {
  display:flex;
  gap:24px;
}

.topbar .tabs span,
.topbar .tabs button {
  cursor:pointer;
  opacity:.9;
}

.topbar .tabs span:hover,
.topbar .tabs button:hover {
  opacity:1;
}

.hidden { display:none; }
.search-panel {
  padding:10px var(--page-gutter);
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.search-panel.hidden { display:none; }
#appView, #adminView {
  padding-left:var(--page-gutter);
  padding-right:var(--page-gutter);
}
.search-panel input { flex:1; min-width:220px; max-width:520px; box-sizing:border-box; }
.search-results-title { font-weight:bold; margin:0 0 12px; }
.search-result-group { margin:0 0 16px; }
.search-result-group-title { font-weight:bold; margin-bottom:4px; }
.search-result-list { margin:0; padding-left:22px; }
.search-result-item { margin:0 0 6px; }
.search-result-button {
  border:0;
  padding:0;
  background:transparent;
  color:#003366;
  font:inherit;
  text-align:left;
  cursor:pointer;
}
.search-result-button:hover { text-decoration:underline; }
.search-result-snippet { color:#555; font-size:14px; margin-top:2px; }
.grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); }
.category-card, .resource-card { border:1px solid #ddd; padding:12px; border-radius:6px; background:white; }
.resource-card { position:relative; }
.print-selection-toggle { position:absolute; left:8px; top:8px; cursor:pointer; font-size:18px; border:0; background:transparent; padding:0; line-height:1; }
.resource-main { margin-left:24px; }
.resource-details.collapsed { display:none; }
.resource-info-separator { border:0; border-top:1px solid #ccc; margin:10px 0; }
.pdf-attachments-list { margin:6px 0 8px; display:grid; gap:6px; }
.pdf-attachment-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.button { padding:10px 14px; margin:4px 0; cursor:pointer; }
button,
input,
select,
textarea {
  font-size: 18px;
}
.button.primary { background:#003366; color:white; }
.button.secondary { background:#f7f7f7; color:#333; border:1px solid #bbb; }
.button.danger { background:#aa0000; color:white; }
.topbar .help-button { color:white; border:0; outline:0; border-radius:4px; background:transparent; padding:2px 8px; font:inherit; }
.topbar .tabs span.admin-flash {
  background:#aa0000;
  color:white;
  border-radius:4px;
  padding:2px 8px;
  opacity:1;
}
.red-tip { margin:0 0 12px; padding:10px 12px; border:2px solid #aa0000; border-radius:6px; background:#fff5f5; color:#aa0000; font-size:11px; font-weight:bold; }
.red-tip.new-admin-tip { font-size:20px; line-height:1.35; }
.category-print-banner { margin:0 0 12px; padding:9px 12px; border:1px solid #c8d6e6; border-left:4px solid #003366; border-radius:6px; background:#f7fbff; color:#1f2d3d; font-size:16px; line-height:1.35; }
.print-empty-instruction { color:#aa0000; }
textarea.big { width:100%; min-height:80px; }
textarea.information-editor { min-height:320px; resize:vertical; }
.information-control-block { margin:10px 0 12px; }
.information-control-header {
  margin-bottom:8px;
  padding:10px 12px;
  border:1px solid #ddd;
  border-radius:6px;
  background:#f7f7f7;
}
.information-hint { font-size:16px; color:#555; margin-top:6px; }
.information-preview-toggle { margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.information-control-header .information-preview-toggle { margin-top:0; }
.information-control-header .information-hint { margin-bottom:0; }
.information-preview-toggle .button.primary { box-shadow:0 0 0 2px rgba(0,51,102,0.18); }
.information-preview-box {
  margin-top:8px;
  border:1px solid #ddd;
  border-radius:6px;
  padding:10px;
  background:#fff;
}
.information-rendered ul { margin:6px 0; padding-left:1.15em; }
.information-rendered .information-line { margin:0; }
.information-rendered .information-blank { min-height:1.1em; }
.information-rendered hr { border:0; border-top:1px solid #ccc; margin:10px 0; }
.print-list-flyer {
  border:1px solid #ddd;
  border-radius:6px;
  padding:16px;
  margin:18px 0 0;
  background:#fff;
}
.print-list-flyer h2 { margin:0 0 12px; }
.print-list-field { margin:0 0 10px; }
.print-resource-separator { border:0; border-top:1px solid #aaa; margin:14px 0; }
.admin-panel { display:flex; gap:20px; }
.admin-box { flex:1; border:1px solid #ddd; padding:12px; }
.category-grid { display:grid; gap:6px; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
.verified-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.verified-value { font-weight:600; }
.verified-edit { display:none; margin-top:6px; }
.verified-edit.active { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.resource-browse-wrap { width:min(860px,100%); }
.resource-listbox { width:100%; box-sizing:border-box; }
.resource-button-listbox {
  width:100%;
  height:25em;
  box-sizing:border-box;
  margin-top:8px;
  overflow:auto;
  border:1px solid #999;
  background:#fff;
}
.resource-listbox-option {
  display:block;
  width:100%;
  box-sizing:border-box;
  border:0;
  border-radius:0;
  margin:0;
  padding:1px 4px;
  background:#fff;
  color:#000;
  font:inherit;
  line-height:1.25;
  text-align:left;
}
.resource-listbox-option:hover,
.resource-listbox-option[aria-selected="true"] {
  background:#d0d0d0;
}
.resource-listbox-option:focus {
  outline:2px solid #003366;
  outline-offset:-2px;
}
.resource-browse-actions { margin-top:8px; display:flex; gap:8px; align-items:center; width:100%; }
.resource-browse-actions .spacer { flex:1; }
.admin-panel-title { margin:0 0 4px; }
.admin-toolbar {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:20px;
}
.admin-toolbar-actions {
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.admin-toolbar-help {
  flex:0 0 auto;
}
.admin-toolbar-reference-actions {
  margin-left:auto;
  display:flex;
  gap:8px;
  align-items:center;
  flex:0 0 auto;
}
.admin-mode-bar {
  position:sticky;
  top:var(--topbar-sticky-offset);
  z-index:19;
  background:#fff;
  border-bottom:1px solid #ddd;
  display:flex;
  gap:8px;
  align-items:center;
  overflow-x:auto;
  white-space:nowrap;
  padding:4px 0;
  margin-bottom:10px;
}
.admin-nav-tabs {
  display:flex;
  gap:8px;
  align-items:center;
  flex:0 0 auto;
}
.admin-mode-bar .button { flex:0 0 auto; }
.admin-sticky-bar {
  position:sticky;
  top:0;
  z-index:20;
  background:#fff;
  border-bottom:1px solid #ddd;
  padding:8px 0;
  margin-bottom:12px;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  overflow-x:auto;
  white-space:nowrap;
}
.admin-sticky-package-actions,
.admin-sticky-reference-actions,
.admin-sticky-editor-actions {
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:nowrap;
}
.admin-sticky-reference-actions { margin-left:auto; justify-content:flex-end; }
.admin-sticky-editor-actions { margin-left:auto; justify-content:flex-end; }
.admin-action-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.admin-option-row { margin:0; }
.admin-option-row + .admin-action-row { margin-top:12px; }
.admin-note { margin:0 0 10px; line-height:1.4; }
.admin-detail-list { margin:8px 0 0 18px; padding:0; }
.admin-detail-list li { margin:4px 0; }
.resource-editor-grid {
  display:grid;
  gap:10px;
  grid-template-columns:repeat(3, minmax(0, 1fr));
}
.resource-editor-grid .span-2 { grid-column:span 2; }
.resource-editor-grid label input,
.resource-editor-grid label textarea { width:100%; box-sizing:border-box; }
.resource-info-guidance { margin:6px 0 10px; }
.resource-info-section { margin-top:8px; }
.resource-info-section-label { display:block; font-weight:bold; margin-bottom:3px; }
.resource-info-section textarea,
.resource-info-additional textarea { width:100%; box-sizing:border-box; overflow:hidden; resize:none; }
.resource-info-additional { margin-top:10px; }
.resource-info-rendered .resource-info-section { margin-top:0; }
.resource-info-rendered .resource-info-section + .resource-info-section,
.resource-info-rendered .resource-info-additional-rendered { margin-top:6px; }
#res_name { text-align:left; width:100%; box-sizing:border-box; }
.verified-warning { color:#aa0000; font-size:13px; margin-top:4px; min-height:1.1em; }
.reload-resources-wrap { margin-top:16px; text-align:right; }
.reload-resources-wrap .button { font-size:14px; padding:7px 10px; }
.app-toast {
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:10001;
  max-width:360px;
  padding:12px 14px;
  border:1px solid #c8d6e5;
  border-radius:6px;
  background:#f7fbff;
  color:#1f2d3d;
  box-shadow:0 2px 10px rgba(0,0,0,.14);
  font-size:14px;
  line-height:1.35;
  white-space:pre-line;
}
.app-toast.hidden { display:none; }
.app-toast.important {
  max-width:460px;
  border:2px solid #b45309;
  background:#fff7ed;
  color:#7c2d12;
  font-weight:bold;
}
.category-admin-panel { display:block; }
.category-admin-layout { display:grid; grid-template-columns:minmax(260px, 360px) minmax(0, 1fr); gap:20px; align-items:start; }
.category-editor-layout { display:grid; grid-template-columns:minmax(0, 1fr) minmax(0, 1fr); gap:20px; align-items:start; }
.category-filter-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.category-filter-row input[type="text"] { flex:1; min-width:0; }
.resource-category-option { margin:0 0 8px; }
.resource-category-filter-list { margin:4px 0 8px 28px; }
.resource-category-filter-list label { display:block; margin:2px 0; }
.editor-sticky-bar { position:sticky; bottom:0; background:#fff; border-top:1px solid #ddd; padding:10px 0 0; margin-top:12px; display:flex; gap:8px; justify-content:flex-end; z-index:5; }
.for-group-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.for-group-row.selected { background:#eef4ff; outline:2px solid #99b8e8; outline-offset:2px; }
.for-group-row input[type="text"] { flex:1; min-width:0; }

.reference-modal {
  position:fixed;
  inset:0;
  z-index:10002;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
  box-sizing:border-box;
  background:rgba(0,0,0,.45);
}
.reference-modal.hidden { display:none; }
.reference-modal-panel {
  width:min(720px,100%);
  max-height:min(82vh,720px);
  display:flex;
  flex-direction:column;
  background:white;
  border:1px solid #c8d6e5;
  border-radius:6px;
  box-shadow:0 8px 28px rgba(0,0,0,.22);
}
.reference-modal-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  padding:16px 18px;
  border-bottom:1px solid #dde6ef;
}
.reference-modal-title { font-size:20px; font-weight:bold; }
.reference-modal-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
.reference-modal-subtitle { margin-top:2px; color:#555; }
.reference-modal-body {
  padding:16px 18px 18px;
  overflow:auto;
}
.reference-group { margin-top:14px; }
.reference-group:first-child { margin-top:0; }
.reference-group-title { font-weight:bold; margin-bottom:6px; }
.reference-list { margin:0; padding-left:22px; }
.reference-match { margin-bottom:10px; }
.reference-match:last-child { margin-bottom:0; }
.reference-match-name { font-weight:bold; }
.reference-match-categories { color:#555; font-size:14px; }
.reference-match-snippet { margin-top:3px; color:#333; font-size:14px; }
.reference-empty { margin:0; color:#555; }
.admin-help-content .admin-help-setup {
  margin:0 0 14px;
  padding:12px 14px;
  border:1px solid #c8d6e5;
  border-left:4px solid #003366;
  border-radius:6px;
  background:#f7fbff;
}
.admin-help-content h3 { margin:0 0 8px; }
.admin-help-content details {
  border:1px solid #dde6ef;
  border-radius:6px;
  margin-top:8px;
  background:#fff;
}
.admin-help-content summary {
  cursor:pointer;
  font-weight:bold;
  padding:10px 12px;
}
.admin-help-content .admin-help-section-body {
  border-top:1px solid #dde6ef;
  padding:10px 12px 12px;
}
.admin-help-content p { margin:0 0 10px; }
.admin-help-content p:last-child { margin-bottom:0; }
.admin-help-content ol,
.admin-help-content ul { margin:8px 0 0 22px; padding:0; }
.admin-help-content li { margin:4px 0; }
.admin-training-actions { margin:10px 0 12px; }
.admin-training-sample {
  white-space:pre-wrap;
  border:1px solid #dde6ef;
  border-radius:6px;
  padding:10px 12px;
  background:#f7fbff;
  font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size:15px;
}
.admin-setup-panel label { display:block; font-weight:bold; margin-bottom:10px; }
.admin-setup-panel input { width:100%; box-sizing:border-box; margin-top:4px; }
.admin-setup-note { color:#555; font-size:16px; margin:6px 0 12px; }
.admin-setup-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:12px; }
.setup-mockup {
  border:1px solid #dde6ef;
  border-radius:6px;
  padding:12px;
  margin-top:10px;
  background:#fafcff;
}
.setup-mockup-grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-bottom:10px;
}
.setup-mockup-category,
.setup-mockup-resource {
  border:1px solid #c8d6e5;
  border-radius:6px;
  background:white;
  padding:8px 10px;
}
.setup-mockup-category { font-weight:bold; color:#003366; text-align:center; }
.setup-mockup-resource strong { display:block; margin-bottom:4px; }

/* Print modal */
#printModal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  justify-content:center;
  align-items:center;
}
#printModal.hidden { display:none; }
#printContentWrapper {
  background:white;
  padding:20px;
  max-height:90%;
  overflow:auto;
  width:800px;
}
@media print {
  @page {
    margin: 0.75in;
  }

  body {
    background: white;
  }

  body > *:not(#printModal):not(#referenceModal) {
    display: none !important;
  }

  #printModal {
    position: static;
    inset: auto;
    background: transparent;
    display: block;
  }

  #printContentWrapper {
    position: static;
    left: auto;
    top: auto;
    width: auto;
    max-height: none;
    overflow: visible;
    padding: 0;
    margin: 0;
    background: transparent;
    font-size: 11pt;
    line-height: 1.3;
  }

  #printContentWrapper button {
    display: none !important;
  }

  #referenceModal {
    position: static;
    inset: auto;
    display: block;
    padding: 0;
    background: transparent;
  }

  #referenceModal.hidden {
    display: none !important;
  }

  .reference-modal-panel {
    width: auto;
    max-height: none;
    display: block;
    border: none;
    border-radius: 0;
    box-shadow: none;
    background: transparent;
  }

  .reference-modal-header {
    padding: 0 0 12pt;
    margin-bottom: 12pt;
    border-bottom: 1px solid #aaa;
  }

  .reference-modal-title {
    font-size: 16pt;
  }

  .reference-modal-body {
    padding: 0;
    overflow: visible;
    font-size: 11pt;
    line-height: 1.35;
  }

  .reference-modal-close {
    display: none !important;
  }

  .reference-modal-actions {
    display: none !important;
  }

  .admin-help-setup {
    display: none !important;
  }

  .admin-training-actions {
    display: none !important;
  }

  body.admin-help-printing .admin-training-section {
    display: none !important;
  }

  body.admin-training-printing .admin-help-content > :not(.admin-training-section) {
    display: none !important;
  }

  .resource-card {
    border: none;
    padding: 0;
    margin-bottom: 11pt;
    break-inside: avoid;
    page-break-inside: avoid;
    background: transparent;
  }

  .resource-card ul {
    margin-top: 4pt;
    margin-bottom: 4pt;
    padding-left: 14pt;
  }

  .print-resource-separator {
    border: 0;
    border-top: 1px solid #999;
    margin: 10pt 0;
  }

  .print-list-flyer {
    border: none;
    border-radius: 0;
    padding: 0;
    margin: 0;
    background: transparent;
  }

  .print-list-flyer-page-break {
    break-before: page;
    page-break-before: always;
  }

  .print-disabled {
    display: none !important;
  }
}
</style>
<!-- ===== APP CSS END ===== -->
</head>

<body>
<!--
  File orientation:
  1) HTML containers for the app shell, modal panels, and main view roots.
  2) Embedded seed JSON data for first-load fallback.
  3) JavaScript logic organized by section banners.
-->

<div id="appErrorBanner" style="display:none; position:fixed; top:0; left:0; right:0; background:#ffd9d9; border-bottom:2px solid #c00; z-index:9999; padding:10px; font-size:16px;">
  <strong>&lt;New&gt; TSO Resources error</strong>
  <pre id="appErrorDetails" style="white-space:pre-wrap;"></pre>
  <button class="button" id="appErrorCopy">Copy</button>
  <button class="button" id="appErrorDismiss">Dismiss</button>
</div>

<div class="topbar">
  <div class="title" id="appTitle">&lt;New&gt; TSO Resources</div>
  <div class="tabs">
    <span id="tabSearch" role="button" aria-label="Search" title="Search">&#128269;</span>
    <span id="tabCategories">Categories</span>
    <span id="tabPrintSelection" role="button" aria-label="Print Preview">🖨️ (0)</span>
    <button id="helpButton" class="help-button" type="button">Help</button>
    <span id="tabAdmin">Admin</span>
  </div>
</div>

<div id="searchPanel" class="search-panel hidden">
  <input id="searchInput" type="search" placeholder="Search resources">
  <button class="button primary" id="searchButton" type="button">Search</button>
  <button class="button" id="searchCancelButton" type="button">Cancel</button>
</div>

<div id="appView"></div>
<div id="adminView" class="hidden"></div>

<div id="selfTestPanel" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#f5f5f5; border-top:2px solid #888; padding:10px; font-size:14px; max-height:250px; overflow:auto;">
  <strong>TSO Self Tests</strong>
  <div id="selfTestResults"></div>
  <button class="button" id="selfTestClose">Close</button>
</div>

<div id="printModal" class="hidden">
  <div id="printContentWrapper">
    <button class="button" id="printCloseBtn" onclick="closePrintPreview()">Close</button>
    <button class="button primary" id="printActionBtn" onclick="doPrint()">Print</button>
    <button class="button" id="printNextBtn" onclick="nextPrintStep()">Next</button>
    <div id="printProgress" style="margin:10px 0 12px; font-size:14px; color:#555;"></div>
    <div id="printContent"></div>
  </div>
</div>

<script>
/* ============================================================
TSO RESOURCE ASSISTANT — SECTION INDEX
This file is intentionally organized into stable sections.
Agents must modify only the relevant section.

SECTION ORDER

UTILITIES
DATA NORMALIZATION
STATE
SAFETY HARNESS
SELF TESTS
RENDERING — GENERAL
RENDERING — RESOURCES
RENDERING — CATEGORIES
UNDO SYSTEM
PRINT SELECTION
PRINT WORKFLOW
EVENT HANDLERS
ADMIN MODE
PERSISTENCE AND RESOURCE PACKAGES
SEARCH AND REFERENCE LOOKUPS
ADMIN EDITORS

SUBSYSTEMS

PrintWorkflow
  Step-by-step printing system.
  Responsible for building the print queue, rendering steps,
  and handling Print / Next / Close actions.

AGENT EDITING RULES

1. Locate the correct section before editing.
2. Do not move section banners.
3. Do not duplicate rendering logic across sections.
4. Prefer minimal diffs rather than rewriting blocks.
============================================================ */

// ============================================================
// UTILITIES
// ============================================================

function nowISO(){ return new Date().toISOString(); }
function escapeHTML(str){ return (str||"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[m])); }
function displayContactValue(value){
  const trimmed = typeof value === "string" ? value.trim() : "";
  return /^none$/i.test(trimmed) ? "" : trimmed;
}
function normalizeWebsiteURL(url){
  const trimmed = typeof url === "string" ? url.trim() : "";
  if(!trimmed) return "";
  if(/^https?:\/\//i.test(trimmed)) return trimmed;
  return `https://${trimmed}`;
}
function generateResourceId(){
  const bytes = new Uint8Array(16);
  crypto.getRandomValues(bytes);
  return Array.from(bytes)
    .map(b => b.toString(16).padStart(2,"0"))
    .join("");
}
function filenameFromPath(path){
  const clean = String(path || "").split(/[?#]/)[0];
  return clean.split("/").filter(Boolean).pop() || "";
}
function safePDFFileName(name){
  const fallback = "attachment.pdf";
  const base = filenameFromPath(name) || fallback;
  const safe = base.replace(/[^A-Za-z0-9._-]+/g, "-").replace(/^-+|-+$/g, "") || fallback;
  return /\.pdf$/i.test(safe) ? safe : `${safe}.pdf`;
}
function stablePDFIdFromPath(path, fallback = "pdf"){
  const text = String(path || fallback);
  let hash = 2166136261;
  for(let i = 0; i < text.length; i += 1){
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return `pdf-${(hash >>> 0).toString(16)}`;
}
function pdfNameFromPath(path){
  return filenameFromPath(path) || "PDF";
}
function buildPDFStoragePath(resourceId, attachmentId, fileName){
  return `pdfs/${encodeURIComponent(resourceId || "resource")}/${attachmentId}-${safePDFFileName(fileName)}`;
}
function showToast(message, options = {}){
  let toast = document.getElementById("appToast");
  if(!toast){
    toast = document.createElement("div");
    toast.id = "appToast";
    toast.className = "app-toast hidden";
    toast.setAttribute("role", "status");
    toast.setAttribute("aria-live", "polite");
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.classList.toggle("important", !!options.important);
  toast.classList.remove("hidden");
  if(showToast.timer) clearTimeout(showToast.timer);
  if(options.sticky){
    showToast.timer = null;
  }else{
    showToast.timer = setTimeout(() => {
      toast.classList.add("hidden");
      toast.classList.remove("important");
    }, 4500);
  }
}

// ============================================================
// DATA NORMALIZATION
// ============================================================
// Data can come from three places: embedded seed JSON, localStorage, and imported
// resource package JSON files. These helpers convert older or partial records into
// the canonical shapes expected by rendering, admin editing, persistence, and
// package merging.

function normalizeResourceInformation(r){
  if(!r || typeof r !== "object") return false;
  if(typeof r.informationText !== "string" || !r.informationText.trim()){
    r.informationText = typeof r.servicesText === "string" ? r.servicesText : "";
  }
  if("servicesText" in r) delete r.servicesText;
  return false;
}

function normalizeResourceVerifiedOn(r){
  // Canonical: verifiedOn in MM/YY (or null). Legacy aliases are consumed then removed.
  if(!r || typeof r !== "object") return;
  const preferred = coerceVerifiedOnToMMYY(r.verifiedOn);
  if(preferred){
    r.verifiedOn = preferred;
  }else{
    const legacyReviewed = coerceVerifiedOnToMMYY(r.reviewedOn);
    const legacyVerifiedDate = coerceVerifiedOnToMMYY(r.verifiedDate);
    r.verifiedOn = legacyReviewed || legacyVerifiedDate || null;
  }
  if("reviewedOn" in r) delete r.reviewedOn;
  if("verifiedDate" in r) delete r.verifiedDate;
}

function normalizeResourcePDFs(r){
  // Canonical: pdfs array of { id, name, path }. Legacy pdf path is preserved.
  if(!r || typeof r !== "object") return;
  const attachments = [];
  const seenPaths = new Set();

  if(Array.isArray(r.pdfs)){
    r.pdfs.forEach((pdf, index) => {
      if(!pdf || typeof pdf !== "object") return;
      const path = typeof pdf.path === "string" ? pdf.path.trim() : "";
      if(!path || seenPaths.has(path)) return;
      seenPaths.add(path);
      const id = String(pdf.id || "").trim() || stablePDFIdFromPath(`${path}:${index}`);
      attachments.push({
        id,
        name: String(pdf.name || pdfNameFromPath(path)).trim() || "PDF",
        path
      });
    });
  }

  const legacyPath = typeof r.pdf === "string" ? r.pdf.trim() : "";
  if(legacyPath && !seenPaths.has(legacyPath)){
    attachments.push({
      id: stablePDFIdFromPath(legacyPath),
      name: pdfNameFromPath(legacyPath),
      path: legacyPath
    });
  }

  r.pdfs = attachments;
  if(typeof r.pdf !== "string" && "pdf" in r) delete r.pdf;
}

function normalizeDataPDFShape(nextData){
  if(!nextData || !Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(normalizeResourcePDFs);
}

function getResourcePDFs(resource){
  normalizeResourcePDFs(resource);
  return Array.isArray(resource && resource.pdfs) ? resource.pdfs : [];
}

function collectPDFPathsFromResource(resource, { includeLegacy = true } = {}){
  if(!resource || typeof resource !== "object") return [];
  const paths = [];
  const seen = new Set();
  getResourcePDFs(resource).forEach(pdf => {
    const path = typeof pdf.path === "string" ? pdf.path.trim() : "";
    if(!path || seen.has(path)) return;
    seen.add(path);
    paths.push(path);
  });
  if(includeLegacy && typeof resource.pdf === "string"){
    const legacyPath = resource.pdf.trim();
    if(legacyPath && !seen.has(legacyPath)) paths.push(legacyPath);
  }
  return paths;
}

function collectPDFPathsFromResources(resources){
  const paths = [];
  const seen = new Set();
  (Array.isArray(resources) ? resources : []).forEach(resource => {
    collectPDFPathsFromResource(resource).forEach(path => {
      if(seen.has(path)) return;
      seen.add(path);
      paths.push(path);
    });
  });
  return paths;
}

function removePDFAttachmentFromResource(resource, pdfId){
  if(!resource || typeof resource !== "object") return null;
  normalizeResourcePDFs(resource);
  const removed = resource.pdfs.find(pdf => pdf.id === pdfId);
  if(!removed) return null;
  resource.pdfs = resource.pdfs.filter(pdf => pdf.id !== pdfId);
  if(typeof resource.pdf === "string" && resource.pdf.trim() === removed.path){
    delete resource.pdf;
  }
  return removed;
}

function isPDFPathReferencedInResources(resources, path){
  const key = String(path || "").trim();
  if(!key) return false;
  return (Array.isArray(resources) ? resources : []).some(resource => collectPDFPathsFromResource(resource).includes(key));
}

function isPDFPathReferenced(path){
  return isPDFPathReferencedInResources(data.resources || [], path);
}

}

function formatMMYYFromDate(d){
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${yy}`;
}

function formatDateOnly(isoString){
  if(!isoString) return "(none)";
  const date = new Date(isoString);
  if(Number.isNaN(date.getTime())) return String(isoString);
  return date.toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" });
}

function formatDateTimeUTC(isoString){
  if(!isoString) return "(none)";
  const date = new Date(isoString);
  if(Number.isNaN(date.getTime())) return String(isoString);
  const month = date.toLocaleString(undefined, { month:"long", timeZone:"UTC" });
  const day = date.getUTCDate();
  const year = date.getUTCFullYear();
  const hour = date.getUTCHours();
  const minute = String(date.getUTCMinutes()).padStart(2, "0");
  return `${month} ${day}, ${year}, ${hour}:${minute} UTC`;
}

function parseMMYYToMonthIndex(mmyy){
  const match = String(mmyy || "").trim().match(/^(0[1-9]|1[0-2])\/(\d{2})$/);
  if(!match) return null;
  const month = Number(match[1]);
  const yy = Number(match[2]);
  const year = 2000 + yy;
  return year * 12 + (month - 1);
}

function isValidMMYY(value){
  return parseMMYYToMonthIndex(value) !== null;
}

function formatVerifiedOnForDisplay(verifiedOn){
  return isValidMMYY(verifiedOn) ? String(verifiedOn).trim() : "----";
}

function parseLegacyVerifiedOnToMMYY(raw){
  const text = String(raw || "").trim();
  if(!text) return null;

  const mmyy = text.match(/^(\d{1,2})[\/\-](\d{2})$/);
  if(mmyy){
    const month = Number(mmyy[1]);
    const yy = Number(mmyy[2]);
    if(month >= 1 && month <= 12) return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
  }

  const withYear = text.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2}|\d{4})$/);
  if(withYear){
    const month = Number(withYear[1]);
    const yearRaw = withYear[3];
    if(month >= 1 && month <= 12){
      const yy = yearRaw.length === 4 ? Number(yearRaw.slice(-2)) : Number(yearRaw);
      return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
    }
  }

  const compact = text.match(/^(\d{2})(\d{2})(\d{2})$/);
  if(compact){
    const month = Number(compact[1]);
    const yy = Number(compact[3]);
    if(month >= 1 && month <= 12) return `${compact[1]}/${String(yy).padStart(2,"0")}`;
  }

  if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
    const isoDate = new Date(`${text}T00:00:00`);
    if(!Number.isNaN(isoDate.getTime())) return formatMMYYFromDate(isoDate);
  }

  const parsed = new Date(text);
  if(!Number.isNaN(parsed.getTime())) return formatMMYYFromDate(parsed);
  return null;
}

function coerceVerifiedOnToMMYY(value){
  if(value == null) return null;
  const text = String(value).trim();
  if(!text) return null;
  if(isValidMMYY(text)) return text;
  const parsed = parseLegacyVerifiedOnToMMYY(text);
  return parsed && isValidMMYY(parsed) ? parsed : null;
}

function validateVerifiedOnInput(value){
  const text = String(value || "").trim();
  if(!text) return { valid:true, normalized:null, message:"" };
  if(!isValidMMYY(text)){
    return { valid:false, normalized:null, message:"Use MM/YY (MM 01-12)." };
  }
  return { valid:true, normalized:text, message:"" };
}

function compareResourcesByName(a, b){
  return String((a && a.name) || "").localeCompare(String((b && b.name) || ""), undefined, { sensitivity:"base" });
}

function getAdminResourceBrowseList(){
  const resources = data.resources.slice();
  if(!adminShowVerifiedDates){
    return resources.sort(compareResourcesByName);
  }
  return resources.sort((a, b) => {
    const aMonth = parseMMYYToMonthIndex(a.verifiedOn);
    const bMonth = parseMMYYToMonthIndex(b.verifiedOn);
    const aVerified = aMonth !== null;
    const bVerified = bMonth !== null;
    if(aVerified !== bVerified) return aVerified ? -1 : 1;
    if(aVerified && bVerified && aMonth !== bMonth) return aMonth - bMonth;
    return compareResourcesByName(a, b);
  });
}

function canonicalizeTaxonomyLabel(label){
  return String(label || "").trim();
}

function normalizeTaxonomyLabels(labels){
  const normalized = [];
  const seen = new Set();
  const source = Array.isArray(labels)
    ? labels
    : (typeof labels === "string" ? labels.split(/[,\n]/) : []);

  source.forEach(rawLabel => {
    if(typeof rawLabel !== "string" && typeof rawLabel !== "number") return;
    const label = canonicalizeTaxonomyLabel(rawLabel);
    if(!label) return;
    const key = label.toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    normalized.push(label);
  });
  return normalized;
}

function normalizeLegacyTagsShape(nextData){
  if(!nextData || typeof nextData !== "object") return;

  });
}

function normalizeDataCategoryFilterShape(nextData){
  if(!nextData || typeof nextData !== "object") return;

    nextData.categories.forEach(category => {
      if(!category || typeof category !== "object") return;
      category.filters = normalizeCategoryFilters(category.filters);
    });
  }
  if(!Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(resource => {
    const source = resource && typeof resource.categoryFilters === "object" && !Array.isArray(resource.categoryFilters)
      ? resource.categoryFilters
      : {};
    const normalized = {};
    Object.keys(source).forEach(categoryId => {
      const filters = normalizeCategoryFilters(source[categoryId]);
      if(filters.length) normalized[categoryId] = filters;
    });
    resource.categoryFilters = normalized;
  });
}

function normalizeDataForGroupsShape(nextData){
  if(!nextData || typeof nextData !== "object") return;
  nextData.forGroups = normalizeTaxonomyLabels(nextData.forGroups)
    .sort((a,b)=>a.localeCompare(b, undefined, { sensitivity:"base" }));
  if(!Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(resource => {
    if(!resource || typeof resource !== "object") return;
    resource.forGroups = normalizeTaxonomyLabels(resource.forGroups);
  });
}

const INFORMATION_ADDITIONAL_LABEL = "Additional text:";

// Resource Information is stored as plain text. Strip the old editor heading
// when a resource still has it so the saved text remains plain.
function trimOuterBlankLines(lines){
  const next = lines.slice();
  while(next.length && next[0].trim() === "") next.shift();
  while(next.length && next[next.length - 1].trim() === "") next.pop();
  return next;
}

function parseInformationText(text){
  const lines = String(text || "").replace(/\r\n?/g, "\n").split("\n");
  const stripped = lines.filter(line => line.trim() !== INFORMATION_ADDITIONAL_LABEL);
  return { additional:trimOuterBlankLines(stripped).join("\n") };
}

function composeInformationText(draft){
  return String(draft && draft.additional || "").trim();
}

function applyInformationMarkup(escapedText){
  return escapedText
    .replace(/__\*\*([^_\n][\s\S]*?)\*\*__/g, "<strong><u>$1</u></strong>")
    .replace(/\*\*__([^*\n][\s\S]*?)__\*\*/g, "<strong><u>$1</u></strong>")
    .replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>")
    .replace(/__([^_\n]+?)__/g, "<u>$1</u>");
}

function renderInformationMarkupHTML(text){
  const normalized = String(text || "").replace(/\r\n?/g, "\n");
  const lines = normalized.split("\n");
  const out = [];
  let listItems = [];

  function flushList(){
    if(!listItems.length) return;
    out.push(`<ul>${listItems.join("")}</ul>`);
    listItems = [];
  }

  lines.forEach(line => {
    const trimmed = line.trim();
    const isDivider = trimmed === "---";
    const bulletMatch = line.match(/^\s*(?:\*|-|•)\s+(.*)$/);

    if(isDivider){
      flushList();
      out.push("<hr>");
      return;
    }

    if(bulletMatch){
      const bulletText = applyInformationMarkup(escapeHTML(bulletMatch[1]));
      listItems.push(`<li>${bulletText}</li>`);
      return;
    }

    flushList();
    if(line === ""){
      out.push('<div class="information-line information-blank">&nbsp;</div>');
      return;
    }
    out.push(`<div class="information-line">${applyInformationMarkup(escapeHTML(line))}</div>`);
  });

  flushList();
  return out.join("");
}

function renderInformationHTML(text){
  return renderInformationMarkupHTML(composeInformationText(parseInformationText(text)));
}

// SAFETY HARNESS
// ============================================================
// Catch runtime errors and (when debug is enabled) enforce invariants to prevent

function showAppError(context, err){
  const banner = document.getElementById("appErrorBanner");
  const details = document.getElementById("appErrorDetails");
  if(!banner || !details) return;

  const message = err && err.message ? String(err.message) : String(err || "Unknown error");
  const stack = err && err.stack ? String(err.stack) : "";
  const timestamp = new Date().toISOString();
  details.textContent = [
    `Context: ${context}`,
    `Message: ${message}`,
    `Timestamp: ${timestamp}`,
    stack ? `Stack:\n${stack}` : ""
  ].filter(Boolean).join("\n");
  banner.style.display = "block";
}

function safeCall(label, fn){
  try{
    return fn();
  }catch(err){
    showAppError(label, err);
    return undefined;
  }
}

function assertInvariants(context = "invariant check"){
  if(!data || !Array.isArray(data.resources)) throw new Error(`${context}: data.resources must be an array`);
  if(!Array.isArray(data.categories)) throw new Error(`${context}: data.categories must be an array`);
  if(!Array.isArray(printSelection)) throw new Error(`${context}: printSelection must be an array`);

  const ids = new Set();
  data.resources.forEach((resource, idx) => {
    const id = String(resource && resource.id || "");
    if(!id) throw new Error(`${context}: resource at index ${idx} is missing id`);
    if(ids.has(id)) throw new Error(`${context}: duplicate resource id '${id}'`);
    ids.add(id);

    if(!Array.isArray(resource.forGroups)) throw new Error(`${context}: resource '${id}' forGroups must be an array`);
    const resourceForGroupKeys = new Set();
    resource.forGroups.forEach(group => {
      if(typeof group !== "string" || group !== group.trim() || !group){
        throw new Error(`${context}: resource '${id}' has invalid For group '${group}'`);
      }
      const key = group.toLowerCase();
      if(resourceForGroupKeys.has(key)){
        throw new Error(`${context}: resource '${id}' has duplicate For group '${group}'`);
      }
      resourceForGroupKeys.add(key);
    });

    if(resource.verifiedOn != null && !isValidMMYY(resource.verifiedOn)){
      throw new Error(`${context}: resource '${id}' verifiedOn must be MM/YY or null`);
    }
  });

  const resourceIds = new Set(data.resources.map(r => String(r && r.id || "")));
  const badPrintSelection = printSelection.find(id => !resourceIds.has(String(id || "")));
  if(badPrintSelection) throw new Error(`${context}: print selection '${badPrintSelection}' does not reference a valid resource`);
}

function safeRender(label = "render"){
  return safeCall(label, () => {
    if(DEBUG) assertInvariants(`${label} pre`);
    const result = render();
    if(DEBUG) assertInvariants(`${label} post`);
    return result;
  });
}

function safeRenderAdmin(label = "renderAdmin"){

    try{
      await navigator.clipboard.writeText(details.textContent || "");
    }catch(_err){
      // ignore clipboard failures
    }
  };
}

// ============================================================
// SELF TESTS
// ============================================================
// In-browser smoke tests for high-risk flows (create/delete/undo/For groups/
// information/import/export/sorting). Run with Ctrl+Shift+T while the page is
// open; use ?debug when you also want invariant checks before/after rendering.
// Tests temporarily replace global state and then restore it, so each test must
// save every global it mutates in a finally block.

function runSelfTests(){
  const tests = [];

  tests.push({
    name: "CHANGE LOG NORMALIZATION",
    fn: () => {
      const sample = {};
      normalizeChanges(sample);
      if(!Array.isArray(sample.changes)) throw new Error("changes should normalize to array");
    }
  });

  tests.push({
    name: "PACKAGE VERSION FALLBACK",
    fn: () => {
      if(normalizePackageVersionValue(undefined) !== "Unknown") throw new Error("missing packageVersion should fallback");
      if(normalizePackageVersionValue("") !== "Unknown") throw new Error("blank packageVersion should fallback");
      if(normalizePackageVersionValue(12) !== 12) throw new Error("numeric packageVersion should be preserved");
      if(normalizePackageVersionValue("13") !== 13) throw new Error("string numeric packageVersion should normalize to number");
    }
  });

  tests.push({
    name: "STORAGE KEYS USE META ID THEN HTML FILENAME",
    fn: () => {
      const meta = document.querySelector('meta[name="tso-storage-id"]');
      const previousContent = meta ? meta.getAttribute("content") : null;
      try{
        if(meta) meta.setAttribute("content", "");
        if(getStorageKeyPrefix("new.html") !== "new") throw new Error("new.html should use new storage prefix");
        if(getStorageKeyPrefix("albuquerque.html") !== "albuquerque") throw new Error("albuquerque.html should use albuquerque storage prefix");
        if(getStorageKeyPrefix("provo.html") !== "provo") throw new Error("provo.html should use provo storage prefix");
        if(getStorageKeyPrefix("boise-north.html") !== "boiseNorth") throw new Error("hyphenated filenames should use camel-case storage prefix");
        if(meta){
          meta.setAttribute("content", "provo");
          if(getStorageKeyPrefix("backup-copy.html") !== "provo") throw new Error("configured storage id should override filename");
          meta.setAttribute("content", "Boise North");
          if(getStorageKeyPrefix("backup-copy.html") !== "boiseNorth") throw new Error("configured storage id should normalize like filenames");
        }
        if(DATA_STORAGE_KEY !== `${STORAGE_KEY_PREFIX}Data`) throw new Error("data storage key should use current storage prefix");
        if(STARTUP_STATE_STORAGE_KEYS.includes(TSO_NAME_STORAGE_KEY)){
          throw new Error("startup reset should not clear the scoped TSO name");
        }
      }finally{
        if(meta) meta.setAttribute("content", previousContent || "");
      }
    }
  });

  tests.push({
    name: "STARTUP RESET CLEARS UI STATE BUT KEEPS DATA AND NAME",
    fn: () => {
      const previousStartupValues = STARTUP_STATE_STORAGE_KEYS.map(key => [key, localStorage.getItem(key)]);
      const previousTsoNameValue = localStorage.getItem(TSO_NAME_STORAGE_KEY);
      const previousDataValue = localStorage.getItem(DATA_STORAGE_KEY);
      const previousSessionValue = sessionStorage.getItem("newSelfTestSessionValue");
      try{
        STARTUP_STATE_STORAGE_KEYS.forEach(key => localStorage.setItem(key, "stale"));
        localStorage.setItem(TSO_NAME_STORAGE_KEY, "Keep Name");
        localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify({ resources:[{ id:"keep-resource" }] }));
        sessionStorage.setItem("newSelfTestSessionValue", "stale");
        runStartupStateReset("provo.html");
        const unclearedKey = STARTUP_STATE_STORAGE_KEYS.find(key => localStorage.getItem(key) !== null);
        if(unclearedKey) throw new Error(`startup reset did not clear ${unclearedKey}`);
        if(localStorage.getItem(TSO_NAME_STORAGE_KEY) !== "Keep Name"){
          throw new Error("startup reset should keep TSO name");
        }
        if(!/keep-resource/.test(localStorage.getItem(DATA_STORAGE_KEY) || "")){
          throw new Error("startup reset should keep saved resources");
        }
        if(sessionStorage.getItem("newSelfTestSessionValue") !== null){
          throw new Error("startup reset did not clear sessionStorage");
        }
      }finally{
        previousStartupValues.forEach(([key, value]) => {
          if(value === null) localStorage.removeItem(key);
          else localStorage.setItem(key, value);
        });
        if(previousTsoNameValue === null) localStorage.removeItem(TSO_NAME_STORAGE_KEY);
        else localStorage.setItem(TSO_NAME_STORAGE_KEY, previousTsoNameValue);
        if(previousDataValue === null) localStorage.removeItem(DATA_STORAGE_KEY);
        else localStorage.setItem(DATA_STORAGE_KEY, previousDataValue);
        if(previousSessionValue === null) sessionStorage.removeItem("newSelfTestSessionValue");
        else sessionStorage.setItem("newSelfTestSessionValue", previousSessionValue);
      }
    }
  });

        if(!listsGroup || listsGroup.items[0].resourceId !== "list") throw new Error("Lists search returned wrong resources");
      }finally{
        data = previousData;
        view = previousView;
        currentCategory = previousCategory;
        selectedCategoryFilters = previousFilters;
      }
    }
  });

  tests.push({
    name: "CATEGORY FILTERS AND FOR GROUPS ARE RESOURCE OWNED",
    fn: () => {
      const previousData = data;
      try{
        data = {
          categories:[
            { id:"employment", label:"Employment", filters:["Career Training"] },
            { id:"education", label:"Education", filters:["GED"] }
          ],
          forGroups:["Veterans"],
          resources:[
            { id:"shared", name:"Shared Training", categories:["employment","education"], categoryFilters:{ employment:["Career Training"] }, forGroups:["Veterans"] },
            { id:"ged", name:"GED", categories:["education"], categoryFilters:{ education:["GED"] }, forGroups:[] }
          ]
        };
        const employmentOptions = getCategoryFilterOptions("employment").map(option => option.label);
        const educationOptions = getCategoryFilterOptions("education").map(option => option.label);
        if(!employmentOptions.includes("Career Training") || !employmentOptions.includes("Veterans")){
          throw new Error("employment category did not include category and For filters");
        }
        if(!educationOptions.includes("GED") || !educationOptions.includes("Veterans")){
          throw new Error("education category did not include category and For filters");
        }
        const matching = filterResourcesBySelectedCategoryFilters(getCategoryResources("education"), "education", [
          makeForGroupFilterKey("Veterans"),
          makeCategorySpecificFilterKey("GED")
        ]).map(r => r.id);
        if(!matching.includes("shared") || !matching.includes("ged")){
          throw new Error("OR category filtering missed expected education resources");
        }
      }finally{
        data = previousData;
      }
    }
  });

  tests.push({
    name: "VERIFIED DATE VALIDATION",
    fn: () => {
      data.resources.forEach(resource => {
        const value = resource.verifiedOn;
        if(value != null && !isValidMMYY(value)){
          throw new Error(`invalid verifiedOn '${value}' on resource '${resource.id}'`);
        }
      });
    }
  });

  tests.push({
    name: "RESOURCE SORTING",
    fn: () => {
      const sorted = data.resources.slice().sort((a, b) => {
        const aMonth = parseMMYYToMonthIndex(a.verifiedOn);
        const bMonth = parseMMYYToMonthIndex(b.verifiedOn);
        const aVerified = aMonth !== null;
        const bVerified = bMonth !== null;
        if(aVerified !== bVerified) return aVerified ? -1 : 1;
        if(aVerified && bVerified && aMonth !== bMonth) return aMonth - bMonth;
        return compareResourcesByName(a, b);
      });
      for(let i = 1; i < sorted.length; i += 1){
        const prev = sorted[i - 1];
        const curr = sorted[i];
        const prevMonth = parseMMYYToMonthIndex(prev.verifiedOn);
        const currMonth = parseMMYYToMonthIndex(curr.verifiedOn);
        if(prevMonth === null && currMonth !== null){
          throw new Error("unverified resource appears before verified resource");
        }
      }
    }
  });

  tests.push({
    name: "INFORMATION RENDERER",
    fn: () => {
      const html = renderInformationHTML("One\n\n* bullet\n---\n**bold**");
      if(typeof html !== "string" || !html.length) throw new Error("renderer returned empty output");
      const host = document.createElement("div");
      try{
        host.className = "information-rendered";
        host.innerHTML = html;
        document.body.appendChild(host);
        const ul = host.querySelector("ul");
        if(!ul) throw new Error("renderer did not create a list");
        const style = getComputedStyle(ul);
        if(style.marginLeft !== "0px") throw new Error(`list margin should be flush, got ${style.marginLeft}`);
      }finally{
        host.remove();
      }
    }
  });

  tests.push({
    name: "INFORMATION TEXT PRESERVATION",
    fn: () => {
      const resource = { informationText:"**bold**\n* bullet\n---" };
      normalizeResourceInformation(resource);
      if(resource.informationText !== "**bold**\n* bullet\n---"){
        throw new Error("informationText was not preserved");
      }
    }
  });

  tests.push({
    name: "INFORMATION TEXTAREA AUTO FIT",
    fn: () => {
      const textarea = document.createElement("textarea");
      try{
        textarea.className = "big resource-info-input";
        textarea.style.width = "240px";
        textarea.value = Array(12).fill("Line of resource information").join("\n");
        document.body.appendChild(textarea);
        fitTextareaToText(textarea);
        if(textarea.clientHeight < textarea.scrollHeight){
          throw new Error("textarea did not expand to fit content");
        }
      }finally{
        textarea.remove();
      }
    }
  });

  tests.push({
    name: "MISSING INFORMATION TEXT IS CANONICAL",
    fn: () => {
      const resource = {};
      normalizeResourceInformation(resource);
      if(resource.informationText !== ""){
        throw new Error("missing informationText was not normalized to empty string");
      }
    }
  });

  tests.push({
    name: "LEGACY VERIFIED DATE MIGRATION",
    fn: () => {
      const resource = { reviewedOn:"03/25", verifiedDate:"2025-02-14" };
      normalizeResourceVerifiedOn(resource);
      if(resource.verifiedOn !== "03/25"){
        throw new Error(`expected 03/25 from reviewedOn, got '${resource.verifiedOn}'`);
      }
      if("reviewedOn" in resource){
        throw new Error("legacy reviewedOn key was not removed after migration");
      }
      if("verifiedDate" in resource){
        throw new Error("legacy verifiedDate key was not removed after migration");
      }
      const legacyDateResource = { verifiedOn:null, verifiedDate:"2025-02-14" };
      normalizeResourceVerifiedOn(legacyDateResource);
      if(legacyDateResource.verifiedOn !== "02/25"){
        throw new Error(`expected 02/25 from verifiedDate, got '${legacyDateResource.verifiedOn}'`);
      }
      const canonicalResource = { verifiedOn:"04/25", reviewedOn:"03/25" };
      normalizeResourceVerifiedOn(canonicalResource);
      if(canonicalResource.verifiedOn !== "04/25"){
        throw new Error(`expected canonical verifiedOn to win, got '${canonicalResource.verifiedOn}'`);
      }
    }
  });

  const results = tests.map(test => {
    try{
      test.fn();
      return { ok:true, name:test.name, message:"" };
    }catch(err){
      return { ok:false, name:test.name, message:(err && err.message) ? err.message : String(err) };
    }
  });

  const panel = document.getElementById("selfTestPanel");
  const resultsEl = document.getElementById("selfTestResults");
  if(panel && resultsEl){
    resultsEl.innerHTML = "";
    results.forEach(result => {
      const row = document.createElement("div");
      row.textContent = result.ok
        ? `✔ PASS ${result.name}`
        : `✖ FAIL ${result.name}: ${result.message}`;
      resultsEl.appendChild(row);
    });
    panel.style.display = "block";
  }

  return results;
}

const appTitle = document.getElementById("appTitle");
const topbar = document.querySelector(".topbar");
const TOPBAR_ADMIN_SWIPE_MIN_X = 80;
const TOPBAR_ADMIN_SWIPE_MAX_Y = 45;
const TOPBAR_ADMIN_SWIPE_MAX_MS = 1000;
let topbarAdminSwipeStart = null;
let topbarAdminSwipeHandled = false;

function updateStickyHeaderOffset(){
  const height = topbar ? topbar.getBoundingClientRect().height : 0;
  document.documentElement.style.setProperty("--topbar-sticky-offset", `${Math.ceil(height)}px`);
}

window.addEventListener("resize", updateStickyHeaderOffset);

function isTopbarAdminLeftSwipe(start, end){
  if(!start || !end) return false;
  const dx = start.x - end.x;
  const dy = Math.abs(end.y - start.y);
  const elapsed = Math.max(0, end.time - start.time);
  return dx >= TOPBAR_ADMIN_SWIPE_MIN_X
    && dy <= TOPBAR_ADMIN_SWIPE_MAX_Y
    && elapsed <= TOPBAR_ADMIN_SWIPE_MAX_MS;
}

function toggleAdminModeFromTopbarSwipe(){
  const shouldShowAdmin = !isAdminVisible;
  setAdminVisibility(shouldShowAdmin);
  safeRender();
  if(shouldShowAdmin) flashAdminButton();
  return true;
}

function handleTopbarAdminSwipeStart(event){
  if(!event || !event.changedTouches || event.changedTouches.length !== 1) return;
  const touch = event.changedTouches[0];
  topbarAdminSwipeStart = {
    x: touch.clientX,
    y: touch.clientY,
    time: Date.now()
  };
}

function handleTopbarAdminSwipeEnd(event){
  if(!topbarAdminSwipeStart || !event || !event.changedTouches || event.changedTouches.length !== 1) return;
  const touch = event.changedTouches[0];
  const swipeEnd = {
    x: touch.clientX,
    y: touch.clientY,
    time: Date.now()
  };
  const shouldEnableAdmin = isTopbarAdminLeftSwipe(topbarAdminSwipeStart, swipeEnd);
  topbarAdminSwipeStart = null;
  if(!shouldEnableAdmin) return;
  topbarAdminSwipeHandled = true;
  window.setTimeout(() => {
    topbarAdminSwipeHandled = false;
  }, 700);
  event.preventDefault();
  event.stopPropagation();
  toggleAdminModeFromTopbarSwipe();
}

function getTsoNameFromHtmlFileName(fileName){
  return String(fileName || "")
    .replace(/\.html?$/i, "")
    .split(/[-_\s]+/)
    .filter(Boolean)
    .map(part => part.charAt(0).toUpperCase() + part.slice(1))
    .join(" ");
}

function getTsoName(){
  const storedName = String(localStorage.getItem(TSO_NAME_STORAGE_KEY) || "").trim();
  if(storedName) return storedName;
  if(isNewTemplateFile()) return "";
  return getTsoNameFromHtmlFileName(getCurrentHtmlFileName());
}

function slugifyFileStem(value, fallback){
  const cleaned = String(value || "")
    .toLowerCase()
    .replace(/&/g, " and ")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
  return cleaned || fallback;
}

function getResourcePackageFilename(){
  const baseName = getTsoName() || (isNewTemplateFile() ? "tso" : getTsoNameFromHtmlFileName(getCurrentHtmlFileName()));
  const stem = slugifyFileStem(baseName, "tso");
  return stem === "tso" ? DEFAULT_RESOURCE_PACKAGE_FILENAME : `${stem}-resources.json`;
}

  const tsoName = getTsoName();

function getUnseenUpdates(){
  const seen = getSeenUpdateIds();
  return getRecentChanges().filter(entry => !seen.has(String(entry.id)));
}

function getCategoryUpdateMap(){
  const map = new Map();
  getUnseenUpdates().forEach(entry => {
    getCategoryIdsForChange(entry).forEach(catId => {
      if(!map.has(catId)) map.set(catId, []);
      map.get(catId).push(entry);
    });
  });
  return map;
}

// Resource cards are shared across category lists, print previews, and admin
// reference checks. Keep resource-card behavior here so all surfaces agree on
// print toggles, details expansion, and information formatting.

function buildResourceCard(res,{expanded=false,showDescription=false,showPrintToggle=true}={}){
  // Shared DOM builder used by category view, print-selection view, and print previews.
  normalizeResourceInformation(res);
  normalizeResourcePDFs(res);

  const card=document.createElement("div");
  card.className="resource-card";
  card.addEventListener("click", event => {
    handleAdminListReferenceInspection(event, res);
  }, true);

  if(showPrintToggle){
    const toggle=document.createElement("button");
    toggle.type = "button";
    toggle.className="print-selection-toggle";
    toggle.setAttribute("aria-label", isSelectedForPrinting(res.id) ? "Disable printing for this resource" : "Enable printing for this resource");
    toggle.textContent=getPrintSelectionIcon(res.id);
    toggle.onclick=e=>{e.stopPropagation(); togglePrintSelection(res.id);};
    card.appendChild(toggle);
  }

  const main=document.createElement("div");
  main.className="resource-main";
  main.innerHTML=`<strong>${res.name}</strong>`;
  if(showDescription && res.description) main.innerHTML+=`<div>${escapeHTML(res.description)}</div>`;

  const details=document.createElement("div");
  details.className="resource-details "+(expanded?"expanded":"collapsed");

  let html="";
  const pdfs = getResourcePDFs(res);
  const phone = displayContactValue(res.phone);
  const address = displayContactValue(res.address);
  const website = displayContactValue(res.website);
  const hours = displayContactValue(res.hours);
  const websiteURL = normalizeWebsiteURL(website);
  if(phone) html+=`<div><strong>Phone:</strong> <a href="tel:${escapeHTML(phone)}">${escapeHTML(phone)}</a></div>`;
  if(address) html+=`<div><strong>Address:</strong> ${escapeHTML(address)}</div>`;
  if(websiteURL) html+=`<div><strong>Website:</strong> <a href="${websiteURL}" target="_blank">${escapeHTML(website)}</a></div>`;
  if(hours) html+=`<div><strong>Hours:</strong> ${escapeHTML(hours)}</div>`;
  if(pdfs.length === 1){
    const label = pdfs[0].name && pdfs[0].name !== "PDF" ? pdfs[0].name : "Open PDF";
    html+=`<div><button type="button" class="button resource-pdf-button" data-pdf-index="0">${escapeHTML(label)}</button></div>`;
  }
  if(pdfs.length > 1){
    html+=`<div><strong>PDFs:</strong><div class="pdf-attachments-list">`;
    pdfs.forEach((pdf, index) => {
      html+=`<button type="button" class="button resource-pdf-button" data-pdf-index="${index}">${escapeHTML(pdf.name || "PDF")}</button>`;
    });
    html+=`</div></div>`;
  }
  if(res.informationText) html+=`<hr class="resource-info-separator"><div class="information-rendered resource-info-rendered">${renderInformationHTML(res.informationText)}</div>`;

  details.innerHTML=html;
  details.querySelectorAll(".resource-pdf-button").forEach(btn => {
    btn.onclick = async e => {
      e.stopPropagation();
      const index = Number(btn.dataset.pdfIndex);
      const pdf = pdfs[index];
      if(pdf && pdf.path) await openPDF(pdf.path);
    };
  });
  main.appendChild(details);
  card.appendChild(main);
  return card;
}

// Category view helpers handle category filters and For-group filters within the selected category.
// Filters are transient UI state; they are not saved into the resource package.

function getSelectedCategoryFilters(categoryId){
  return Array.isArray(selectedCategoryFilters[categoryId]) ? selectedCategoryFilters[categoryId] : [];
}

function setSelectedCategoryFilters(categoryId, filterKeys){
  const cleaned = normalizeTaxonomyLabels(filterKeys);
  if(cleaned.length){
    selectedCategoryFilters[categoryId] = cleaned;
  }else{
    delete selectedCategoryFilters[categoryId];
  }
}

function clearAllCategoryFilters(shouldRender = true){
  selectedCategoryFilters = {};
  if(shouldRender && view === "category") safeRender();
}

function makeCategorySpecificFilterKey(filter){
  return `filter:${canonicalizeTaxonomyLabel(filter).toLowerCase()}`;
}

function makeForGroupFilterKey(group){
  return `for:${canonicalizeTaxonomyLabel(group).toLowerCase()}`;
}

function getCategoryFilterOptions(categoryId){
  const cat = (Array.isArray(data.categories) ? data.categories : []).find(category => category && category.id === categoryId);
  const options = [];
  const resources = getCategoryResources(categoryId);
  const usedCategoryFilterKeys = new Set();
  const usedForGroupKeys = new Set();

  resources.forEach(resource => {
    getResourceCategoryFilterKeys(resource, categoryId).forEach(key => usedCategoryFilterKeys.add(key));
    getResourceForGroupFilterKeys(resource).forEach(key => usedForGroupKeys.add(key));
  });

  normalizeCategoryFilters(cat && cat.filters).forEach(filter => {
    const key = makeCategorySpecificFilterKey(filter);
    if(usedCategoryFilterKeys.has(key)){
      options.push({ key, label:filter, kind:"filter" });
    }
  });
  normalizeTaxonomyLabels(data.forGroups).forEach(group => {
    const key = makeForGroupFilterKey(group);
    if(usedForGroupKeys.has(key)){
      options.push({ key, label:group, kind:"for" });
    }
  });
  return options;
}

function getResourceCategoryFilterKeys(resource, categoryId){
  return new Set(normalizeCategoryFilters(resource && resource.categoryFilters && resource.categoryFilters[categoryId])
    .map(makeCategorySpecificFilterKey));
}

function getResourceForGroupFilterKeys(resource){
  return new Set(normalizeTaxonomyLabels(resource && resource.forGroups).map(makeForGroupFilterKey));
}

function countSelectedCategoryFilterMatches(resource, categoryId, activeFilterKeys){
  if(!activeFilterKeys.size) return 0;
  const resourceKeys = new Set([
    ...getResourceCategoryFilterKeys(resource, categoryId),
    ...getResourceForGroupFilterKeys(resource)
  ]);
  let count = 0;
  activeFilterKeys.forEach(key => {
    if(resourceKeys.has(key)) count += 1;
  });
  return count;
}

function resourceMatchesSelectedCategoryFilters(resource, categoryId, selectedFilterKeys){
  const activeFilterKeys = new Set(normalizeTaxonomyLabels(selectedFilterKeys));
  return !activeFilterKeys.size || countSelectedCategoryFilterMatches(resource, categoryId, activeFilterKeys) > 0;
}

function filterResourcesBySelectedCategoryFilters(resources, categoryId, selectedFilterKeys){
  const activeFilterKeys = new Set(normalizeTaxonomyLabels(selectedFilterKeys));
  return (Array.isArray(resources) ? resources : [])
    .filter(resource => resourceMatchesSelectedCategoryFilters(resource, categoryId, selectedFilterKeys))
    .sort((a, b) => {
      if(activeFilterKeys.size){
        const matchDiff = countSelectedCategoryFilterMatches(b, categoryId, activeFilterKeys) - countSelectedCategoryFilterMatches(a, categoryId, activeFilterKeys);
        if(matchDiff) return matchDiff;
      }
      return compareResourcesByName(a, b);
    });
}

function resourceMatchesListsHeuristic(resource){
  return !String(resource && resource.phone || "").trim()
    && !String(resource && resource.website || "").trim()
    && !String(resource && resource.hours || "").trim();
}

function getListsResources(){
  return (Array.isArray(data.resources) ? data.resources : [])
    .filter(resourceMatchesListsHeuristic);
}

function isListsCategory(categoryId){
  return String(categoryId || "") === LISTS_CATEGORY_ID;
}

function getCategoryResources(categoryId){
  if(isListsCategory(categoryId)) return getListsResources();
  return (Array.isArray(data.resources) ? data.resources : [])
    .filter(r => Array.isArray(r.categories) && r.categories.includes(categoryId));
}

// UNDO SYSTEM
// ============================================================
// Undo is intentionally narrow: destructive admin deletes save one complete data
// snapshot in localStorage. Restoring that snapshot is simpler and safer than
// trying to reverse individual category, resource, or For-group mutations.

function getUndoSnapshot(){
  try{
    const raw = localStorage.getItem(UNDO_STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || typeof parsed !== "object") return null;
    if(!parsed.dataSnapshot || typeof parsed.message !== "string") return null;
    return parsed;
  }catch(_err){
    return null;
  }
}

function clearUndoSnapshot(){
  localStorage.removeItem(UNDO_STORAGE_KEY);
}

function setUndoSnapshot(message){
  localStorage.setItem(UNDO_STORAGE_KEY, JSON.stringify({
    dataSnapshot: JSON.parse(JSON.stringify(data)),
    message: String(message || "")
  }));
}

function undoLastDeletion(){
  const snapshot = getUndoSnapshot();
  if(!snapshot || !snapshot.dataSnapshot) return;
      data = snapshot.dataSnapshot;
      normalizeDataInformationShape(data);
      normalizeDataPDFShape(data);
      normalizeLegacyPackageShape(data);
      normalizeLegacyTagsShape(data);
      normalizeDataVerifiedOnShape(data);
      normalizeChanges(data);
  clearUndoSnapshot();
  persist();
  safeRender();
}

function renderCategoryFilterControls(categoryFilterOptions, activeFilters){
  if(!categoryFilterOptions.length) return;
  const filterArea = document.createElement("div");
  filterArea.style.marginBottom = "12px";

  appendCategoryFilterGroup(filterArea, "Type", categoryFilterOptions.filter(option => option.kind === "filter"), activeFilters);
  appendCategoryFilterGroup(filterArea, "For", categoryFilterOptions.filter(option => option.kind === "for"), activeFilters);

  appView.appendChild(filterArea);
}

function renderCategoryPrintInstruction(){
  const printInstruction = document.createElement("div");
  printInstruction.className = "category-print-banner";
  printInstruction.textContent = getCategoryPrintInstructionText();
  appView.appendChild(printInstruction);
}

function renderCategoryResourceCard(res){
  let expanded = String(res && res.id || "") === String(expandedSearchResourceId || "");
  const card = buildResourceCard(res, { expanded, showDescription:true });
  const resourceUpdates = getChangesForResource(res.id, { unseenOnly:true });
  if(resourceUpdates.length){
    const badge = document.createElement("button");
    badge.className = "button secondary";
    badge.textContent = resourceUpdates.some(u => u.action === "added") ? "New" : "Updated";
    badge.onclick = e => {
      e.stopPropagation();
      openRecentUpdates(resourceUpdates);
    };
    card.prepend(badge);
  }
  card.onclick = () => {
    expanded = !expanded;
    const details = card.querySelector(".resource-details");
    details.classList.toggle("collapsed", !expanded);
    details.classList.toggle("expanded", expanded);
  };
  appView.appendChild(card);
}

function renderCategoryResources(filtered, activeFilters){
  if(!filtered.length){
    const empty = document.createElement("p");
    empty.textContent = activeFilters.length ? "No matching resources" : "No resources in this category.";
    appView.appendChild(empty);
    return;
  }

  filtered.forEach(renderCategoryResourceCard);
}

function renderCategoryView(){
  // Public category detail screen. Category filters and For buttons are OR'd
  // together by filterResourcesBySelectedCategoryFilters().
  renderCategoryBackButton();
  renderCategoryTitle();
  const categoryFilterOptions = getCategoryFilterOptions(currentCategory);
  const activeFilters = getActiveCategoryFilters(categoryFilterOptions);
  const categoryResources = getCategoryResources(currentCategory);
  const filtered = filterResourcesBySelectedCategoryFilters(categoryResources, currentCategory, activeFilters);

  renderCategoryFilterControls(categoryFilterOptions, activeFilters);
  renderCategoryPrintInstruction();
  renderCategoryResources(filtered, activeFilters);
}

function renderUpdateInfo(packageInfo, packageChanges){
  const resourcePackageVersion = packageInfo ? packageInfo.packageVersion : normalizePackageVersionValue(data && data.packageVersion);
  appView.innerHTML += `<div class="category-card"><div>App version: ${escapeHTML(data.appVersion || APP_VERSION)}</div><div>Last modified: ${escapeHTML(formatDateOnly(data.lastModified))}</div></div>`;
  appView.innerHTML += `<div class="category-card"><strong>Resource Package ${escapeHTML(String(resourcePackageVersion))}:</strong>${packageChanges.length ? `<ul>${packageChanges.map(change => `<li>${escapeHTML(change)}</li>`).join("")}</ul>` : `<div>No resource package updates loaded.</div>`}</div>`;
  const backToCategories = document.createElement("button");
  backToCategories.type = "button";
  backToCategories.className = "button primary";
  backToCategories.textContent = "View Categories";
  backToCategories.onclick = () => {
    showUpdateInfo = false;
    showRecentChangeLog = false;
    recentUpdateDetail = null;
    pendingRecentUpdates = [];
    view = "categories";
    safeRender();
  };
  appView.appendChild(backToCategories);
}

function renderRecentChangeLog(entries){
  if(showRecentChangeLog && !entries.length){
    appView.innerHTML += `<p>No recent updates.</p>`;
    return;
  }
  if(!showRecentChangeLog) return;
  entries.forEach(entry => {
    const card = document.createElement("div");
    card.className = "resource-card";
    card.innerHTML = formatChangeEntryHTML(entry);
    appView.appendChild(card);
  });
}

function renderRecentUpdatesView(){
  // Recent updates can be a full package-summary screen or a small detail list
  // opened from an update badge. Both modes share the same view state.
  const entries = Array.isArray(recentUpdateDetail) ? recentUpdateDetail : getRecentChanges();
  const packageInfo = (data && data.lastLoadedPackageInfo && typeof data.lastLoadedPackageInfo === "object")
    ? data.lastLoadedPackageInfo
    : null;
  const packageChanges = packageInfo && Array.isArray(packageInfo.changes) ? packageInfo.changes : [];
  appView.innerHTML = "";
  if(showUpdateInfo) renderUpdateInfo(packageInfo, packageChanges);
  renderRecentChangeLog(entries);
  recentUpdateDetail = null;
  pendingRecentUpdates = [];
}

function renderPrintSelectionView(){
  // This is only the review screen. The actual printable packet is owned by
  // PrintWorkflow so list-style resources can render differently.
  const { normalSelections, listSelections } = PrintWorkflow.getPrintSelectionGroups();
  const selections = [...normalSelections, ...listSelections];
  if(!selections.length){
    appView.innerHTML = "<p>No resources selected for printing.</p>";
    return;
  }

  const btn = document.createElement("button");
  btn.textContent = "Print Preview";
  btn.className = "button primary";
  btn.onclick = startPrintSelectionPreview;
  appView.appendChild(btn);

  selections.forEach(res => appView.appendChild(buildResourceCard(res, { expanded:true })));
}

function render(){
  // Main view router. Each branch delegates to the helper that owns that screen.
  // Admin mode is special because adminView has its own shell.
  prepareRenderShell();

  if(view==="admin"){
    appView.innerHTML = "";
    safeRenderAdmin();
    return;
  }

  appView.innerHTML="";

  if(view==="categories"){
    renderCategoriesView();
  }

  if(view==="category"){
    renderCategoryView();
  }

  if(view==="search-results"){
    renderSearchResultsView();
  }

  if(view==="recent-updates"){
    renderRecentUpdatesView();
  }

  if(view==="print-selection"){
    renderPrintSelectionView();
  }
}

/* ---------- Print Selection ---------- */
// Print selection replaced the older Favorites concept. The legacy key is still
// read once so existing browsers keep their selected resources after upgrading.

function loadPrintSelection(){
  let raw = localStorage.getItem(PRINT_SELECTION_STORAGE_KEY);
  if(raw === null){
    raw = localStorage.getItem(LEGACY_FAVORITES_STORAGE_KEY);
    if(raw !== null){
      localStorage.setItem(PRINT_SELECTION_STORAGE_KEY, raw);
      localStorage.removeItem(LEGACY_FAVORITES_STORAGE_KEY);
    }
  }
  let parsed = [];
  try{
    parsed = JSON.parse(raw || "[]");
  }catch(e){
    parsed = [];
  }
  return Array.isArray(parsed) ? parsed.map(id => String(id || "")).filter(Boolean) : [];
}

function savePrintSelection(){
  localStorage.setItem(PRINT_SELECTION_STORAGE_KEY, JSON.stringify(printSelection));
  localStorage.removeItem(LEGACY_FAVORITES_STORAGE_KEY);
}

function sanitizePrintSelection(){
  const resourceIds = new Set((data.resources || []).map(resource => String(resource && resource.id || "")));
  const filtered = printSelection.filter(id => resourceIds.has(String(id || "")));
  if(filtered.length !== printSelection.length){
    printSelection = filtered;
    savePrintSelection();
  }
}

function isSelectedForPrinting(id){
  return printSelection.includes(String(id || ""));
}

function getPrintSelectionIcon(id){
  return isSelectedForPrinting(id) ? "🖨️" : "⬜";
}

function getPrintSelectionResources(){
  const selectedIds = new Set(printSelection.map(id => String(id || "")));
  return data.resources.filter(resource => selectedIds.has(String(resource.id || "")));
}

function updatePrintSelectionIndicator(){
  if(tabPrintSelection) tabPrintSelection.textContent = `🖨️ (${printSelection.length})`;
}

function getCategoryPrintInstructionText(){
  const count = printSelection.length;
  return count
    ? `Click 🖨️ (${count}) in the top bar to review and print selected resources.`
    : "Click ⬜ next to a resource to select it for printing.";
}

function togglePrintSelection(id, { rerender = true } = {}){
  const cleanId = String(id || "");
  if(!cleanId) return;
  if(!data.resources.some(resource => String(resource && resource.id || "") === cleanId)) return;
  const set=new Set(printSelection);
  set.has(cleanId)?set.delete(cleanId):set.add(cleanId);
  printSelection=[...set];
  savePrintSelection();
  updatePrintSelectionIndicator();
  if(rerender) safeRender();
}

/* ---------- Print ---------- */

// PrintWorkflow is a small queue-based state machine for print preview/packet flow.
// Each queue entry has a label and render function so print steps stay data-driven.
// The queue currently has one visible step, but keeping this as a queue preserves
// the separation between normal resource cards and list-style flyer output.
const PrintWorkflow = {
  queue: [],
  currentIndex: -1,
  initiatedByButton: false,

  isListResource(res){
    return resourceMatchesListsHeuristic(res);
  },

  getPrintSelectionGroups(){
    // "List" resources are separated so print selection packet output can render flyers.
    const normalSelections = [];
    const listSelections = [];

    getPrintSelectionResources().forEach(res => {
      if(this.isListResource(res)){
        listSelections.push(res);
      }else{
        normalSelections.push(res);
      }
    });

    return { normalSelections, listSelections };
  },

  buildQueue(){
    const { normalSelections, listSelections } = this.getPrintSelectionGroups();
    if(!normalSelections.length && !listSelections.length) return [];
    if(!listSelections.length){
      return [{
        label:"Print Selection",
        render: () => this.renderPrintSelection(normalSelections)
      }];
    }
    return [{
      label:"Print Selection",
      render: () => this.renderPrintSelectionPacket(normalSelections, listSelections)
    }];
  },

  updateUI(){
    const active = this.queue.length > 0 && this.currentIndex >= 0 && this.currentIndex < this.queue.length;
    const isLastStep = active && this.currentIndex === this.queue.length - 1;
    printCloseBtn.classList.toggle("hidden", active && !isLastStep);
    printActionBtn.classList.toggle("hidden", !active);
    printNextBtn.classList.toggle("hidden", !active || isLastStep);
    if(!active){
      printProgress.textContent = "";
      return;
    }
    printProgress.textContent = "";
  },

  showStep(){
    const step = this.queue[this.currentIndex];
    if(!step || typeof step.render !== "function") return;
    step.render();
  },

  openPreviewContent(render){
    this.updateUI();
    printContent.innerHTML="";
    if(typeof render === "function") render(printContent);
    printModal.classList.remove("hidden");
  },

  openPreview(resources){
    this.openPreviewContent(container => {
      this.renderPrintableResourceCards(container, resources);
    });
  },

  renderPrintableResourceCards(container, resources){
    (Array.isArray(resources) ? resources : []).forEach((res, index)=>{
      if(index > 0){
        const separator = document.createElement("hr");
        separator.className = "print-resource-separator";
        separator.classList.toggle("print-disabled", !isSelectedForPrinting(res.id));
        container.appendChild(separator);
      }
      const card=buildResourceCard(res,{expanded:true});
      card.classList.toggle("print-disabled", !isSelectedForPrinting(res.id));
      const toggle = card.querySelector(".print-selection-toggle");
      if(toggle){
        toggle.onclick = e => {
          e.stopPropagation();
          togglePrintSelection(res.id, { rerender:false });
          this.showStep();
          safeRender();
        };
      }
      container.appendChild(card);
    });
  },

  renderPrintSelection(normalSelections){
    this.openPreview(normalSelections);
  },

  buildListFlyer(resource, shouldPageBreak){
    const flyer = document.createElement("section");
    flyer.className = "print-list-flyer" + (shouldPageBreak ? " print-list-flyer-page-break" : "");
    flyer.classList.toggle("print-disabled", !isSelectedForPrinting(resource.id));

    let html = `<button type="button" class="print-selection-toggle" style="position:static; margin-right:8px;">${getPrintSelectionIcon(resource.id)}</button><h2 style="display:inline;">${escapeHTML(resource.name || "")}</h2>`;
    if(resource.phone) html += `<div class="print-list-field"><strong>Phone:</strong> ${escapeHTML(resource.phone)}</div>`;
    if(resource.address) html += `<div class="print-list-field"><strong>Address:</strong> ${escapeHTML(resource.address)}</div>`;
    if(resource.website) html += `<div class="print-list-field"><strong>Website:</strong> ${escapeHTML(resource.website)}</div>`;
    if(resource.informationText){
      html += `<div class="print-list-field"><strong>Information:</strong><div class="information-rendered resource-info-rendered">${renderInformationHTML(resource.informationText)}</div></div>`;
    }
    flyer.innerHTML = html;
    const toggle = flyer.querySelector(".print-selection-toggle");
    if(toggle){
      toggle.onclick = e => {
        e.stopPropagation();
        togglePrintSelection(resource.id, { rerender:false });
        this.showStep();
        safeRender();
      };
    }
    return flyer;
  },

  renderPrintSelectionPacket(normalSelections, listSelections){
    this.openPreviewContent(container => {
      if(normalSelections.length){
        this.renderPrintableResourceCards(container, normalSelections);
      }

      listSelections.forEach((resource, index) => {
        container.appendChild(this.buildListFlyer(resource, normalSelections.length > 0 || index > 0));
      });
    });
  },

  renderSingleListResource(resourceId){
    const { listSelections } = this.getPrintSelectionGroups();
    const resource = listSelections.find(res => res.id === resourceId);
    if(!resource) return;
    this.openPreview([resource]);
  },

  startPrintSelection(){
    this.queue = this.buildQueue();
    if(!this.queue.length){
      this.openPreviewContent(container => {
        container.innerHTML = "<p>No resources are selected for printing.</p><p class=\"print-empty-instruction\">Click ⬜ next to a resource to include it in the printed handout.</p>";
      });
      return;
    }
    this.currentIndex = 0;
    this.showStep();
  },

  next(){
    if(this.currentIndex >= this.queue.length - 1) return this.close();
    this.currentIndex += 1;
    this.showStep();
  },

  close(){
    this.queue = [];
    this.currentIndex = -1;
    this.updateUI();
    printModal.classList.add("hidden");
  },

  doPrint(){
    this.initiatedByButton = true;
    const disabled = Array.from(printContent.querySelectorAll(".print-disabled"));
    disabled.forEach(el => el.setAttribute("data-print-hidden", "true"));
    window.print();
    clearAllCategoryFilters(false);
  },

  handleAfterPrint(){
    if(!this.initiatedByButton) return;
    this.initiatedByButton = false;
  }
};

function startPrintSelectionPreview(){ PrintWorkflow.startPrintSelection(); }
function nextPrintStep(){ PrintWorkflow.next(); }
function closePrintPreview(){ PrintWorkflow.close(); }
function doPrint(){ PrintWorkflow.doPrint(); }
