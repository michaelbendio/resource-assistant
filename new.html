<script>
/* ============================================================
ALBQ RESOURCE ASSISTANT — SECTION INDEX
This file is intentionally organized into stable sections.
Agents must modify only the relevant section.

SECTION ORDER

UTILITIES
DATA NORMALIZATION
STATE
SAFETY HARNESS
SELF TESTS
RENDERING — GENERAL
RENDERING — RESOURCES
RENDERING — CATEGORIES
UNDO SYSTEM
PRINT SELECTION
PRINT WORKFLOW
EVENT HANDLERS
ADMIN MODE
PERSISTENCE AND RESOURCE PACKAGES
SEARCH AND REFERENCE LOOKUPS
ADMIN EDITORS

SUBSYSTEMS

PrintWorkflow
  Guided printing system.
  Responsible for building the print queue, rendering steps,
  and handling Print / Next / Close actions.

AGENT EDITING RULES

1. Locate the correct section before editing.
2. Do not move section banners.
3. Do not duplicate rendering logic across sections.
4. Prefer minimal diffs rather than rewriting blocks.
============================================================ */

// ============================================================
// UTILITIES
// ============================================================

function nowISO(){ return new Date().toISOString(); }
function escapeHTML(str){ return (str||"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[m])); }
function normalizeWebsiteURL(url){
  const trimmed = typeof url === "string" ? url.trim() : "";
  if(!trimmed) return "";
  if(/^https?:\/\//i.test(trimmed)) return trimmed;
  return `https://${trimmed}`;
}
function generateResourceId(){
  const bytes = new Uint8Array(16);
  crypto.getRandomValues(bytes);
  return Array.from(bytes)
    .map(b => b.toString(16).padStart(2,"0"))
    .join("");
}
function slugifyId(value){
  return String(value || "")
    .trim()
    .toLowerCase()
    .normalize("NFKD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "") || generateResourceId();
}

function showToast(message, options = {}){
  let toast = document.getElementById("appToast");
  if(!toast){
    toast = document.createElement("div");
    toast.id = "appToast";
    toast.className = "app-toast hidden";
    toast.setAttribute("role", "status");
    toast.setAttribute("aria-live", "polite");
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.classList.toggle("important", !!options.important);
  toast.classList.remove("hidden");
  if(showToast.timer) clearTimeout(showToast.timer);
  if(options.sticky){
    showToast.timer = null;
  }else{
    showToast.timer = setTimeout(() => {
      toast.classList.add("hidden");

// ============================================================
// DATA NORMALIZATION
// ============================================================
// Data can come from three places: embedded seed JSON, localStorage, and imported
// albq-resources.json files. These helpers convert older or partial records into
// the canonical shapes expected by rendering, admin editing, persistence, and
// package merging.

function normalizeResourceInformation(r){
  if(!r || typeof r !== "object") return false;
  if(typeof r.informationText !== "string") r.informationText = "";
  return false;
}

function normalizeResourceVerifiedOn(r){
  // Canonical: verifiedOn in MM/YY (or null). Legacy aliases are consumed then removed.
  if(!r || typeof r !== "object") return;
  const preferred = coerceVerifiedOnToMMYY(r.verifiedOn);
  if(preferred){
    r.verifiedOn = preferred;
  }else{
    const legacyReviewed = coerceVerifiedOnToMMYY(r.reviewedOn);
    const legacyVerifiedDate = coerceVerifiedOnToMMYY(r.verifiedDate);
    r.verifiedOn = legacyReviewed || legacyVerifiedDate || null;
  }
  if("reviewedOn" in r) delete r.reviewedOn;
  if("verifiedDate" in r) delete r.verifiedDate;
}

function normalizeDataInformationShape(data){
  if(!data.resources) return;
  data.resources.forEach(normalizeResourceInformation);
}

function normalizeDataVerifiedOnShape(nextData){
  if(!nextData || !Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(normalizeResourceVerifiedOn);
}

function applyDefaultCategoryPreset(nextData){
  if(!nextData || typeof nextData !== "object") return false;
  if(nextData.categoryPresetVersion === 1) return false;
  nextData.categoryPresetVersion = 1;
  return true;
}

function formatMMYYFromDate(d){
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${yy}`;
}

function formatDateOnly(isoString){
  if(!isoString) return "(none)";
  const date = new Date(isoString);
  if(Number.isNaN(date.getTime())) return String(isoString);
  return date.toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" });
}

function formatDateTimeUTC(isoString){
  if(!isoString) return "(none)";
  const date = new Date(isoString);
  if(Number.isNaN(date.getTime())) return String(isoString);
  const month = date.toLocaleString(undefined, { month:"long", timeZone:"UTC" });
  const day = date.getUTCDate();
  const year = date.getUTCFullYear();
  const hour = date.getUTCHours();
  const minute = String(date.getUTCMinutes()).padStart(2, "0");
  return `${month} ${day}, ${year}, ${hour}:${minute} UTC`;
}

function parseMMYYToMonthIndex(mmyy){
  const match = String(mmyy || "").trim().match(/^(0[1-9]|1[0-2])\/(\d{2})$/);
  if(!match) return null;
  const month = Number(match[1]);
  const yy = Number(match[2]);
  const year = 2000 + yy;
  return year * 12 + (month - 1);
}

function isValidMMYY(value){
  return parseMMYYToMonthIndex(value) !== null;
}

function formatVerifiedOnForDisplay(verifiedOn){
  return isValidMMYY(verifiedOn) ? String(verifiedOn).trim() : "----";
}

function parseLegacyVerifiedOnToMMYY(raw){
  const text = String(raw || "").trim();
  if(!text) return null;

  const mmyy = text.match(/^(\d{1,2})[\/\-](\d{2})$/);
  if(mmyy){
    const month = Number(mmyy[1]);
    const yy = Number(mmyy[2]);
    if(month >= 1 && month <= 12) return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
  }

  const withYear = text.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2}|\d{4})$/);
  if(withYear){
    const month = Number(withYear[1]);
    const yearRaw = withYear[3];
    if(month >= 1 && month <= 12){
      const yy = yearRaw.length === 4 ? Number(yearRaw.slice(-2)) : Number(yearRaw);
      return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
    }
  }

  const compact = text.match(/^(\d{2})(\d{2})(\d{2})$/);
  if(compact){
    const month = Number(compact[1]);
    const yy = Number(compact[3]);
    if(month >= 1 && month <= 12) return `${compact[1]}/${String(yy).padStart(2,"0")}`;
  }

  if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
    const isoDate = new Date(`${text}T00:00:00`);
    if(!Number.isNaN(isoDate.getTime())) return formatMMYYFromDate(isoDate);
  }

  const parsed = new Date(text);
  if(!Number.isNaN(parsed.getTime())) return formatMMYYFromDate(parsed);
  return null;
}

function coerceVerifiedOnToMMYY(value){
  if(value == null) return null;
  const text = String(value).trim();
  if(!text) return null;
  if(isValidMMYY(text)) return text;
  const parsed = parseLegacyVerifiedOnToMMYY(text);
  return parsed && isValidMMYY(parsed) ? parsed : null;
}

function validateVerifiedOnInput(value){
  const text = String(value || "").trim();
  if(!text) return { valid:true, normalized:null, message:"" };
  if(!isValidMMYY(text)){
    return { valid:false, normalized:null, message:"Use MM/YY (MM 01-12)." };
  }
  return { valid:true, normalized:text, message:"" };
}

function compareResourcesByName(a, b){
  return String((a && a.name) || "").localeCompare(String((b && b.name) || ""), undefined, { sensitivity:"base" });
}

function getAdminResourceBrowseList(){
  const resources = data.resources.slice();
  if(!adminShowVerifiedDates){
    return resources.sort(compareResourcesByName);
  }
  return resources.sort((a, b) => {
    const aMonth = parseMMYYToMonthIndex(a.verifiedOn);
    const bMonth = parseMMYYToMonthIndex(b.verifiedOn);
    const aVerified = aMonth !== null;
    const bVerified = bMonth !== null;
    if(aVerified !== bVerified) return aVerified ? -1 : 1;
    if(aVerified && bVerified && aMonth !== bMonth) return aMonth - bMonth;
    return compareResourcesByName(a, b);
  });
}

function canonicalizeResourceTag(tag){
  return String(tag || "").trim();
}

function normalizeResourceTags(tags){
  const normalized = [];
  const seen = new Set();
  const source = Array.isArray(tags)
    ? tags
    : (typeof tags === "string" ? tags.split(/[,\n]/) : []);

  source.forEach(rawTag => {
    if(typeof rawTag !== "string" && typeof rawTag !== "number") return;
    const tag = canonicalizeResourceTag(rawTag);
    if(!tag) return;
    const key = tag.toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    normalized.push(tag);
  });
  return normalized;
}

function parseResourceTagsInput(value){
  return normalizeResourceTags(String(value || "").split(/[,\n]/));
}

function formatResourceTagsInput(tags){
  return normalizeResourceTags(tags).join("\n");
}

function toggleResourceTag(tags, tag){
  const currentTags = normalizeResourceTags(tags);
  const normalizedTag = normalizeResourceTags([tag])[0];
  if(!normalizedTag) return currentTags;
  const key = normalizedTag.toLowerCase();
  if(currentTags.some(current => current.toLowerCase() === key)){
    return currentTags.filter(current => current.toLowerCase() !== key);
  }
  return normalizeResourceTags([...currentTags, normalizedTag]);
}

function normalizeDataTagsShape(nextData){
  if(!nextData || typeof nextData !== "object") return;
  if(!Array.isArray(nextData.tags)) nextData.tags = [];
  nextData.tags = [];

  if(!Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(r => {
    r.tags = normalizeResourceTags(r.tags);
  });
}

function getAllTags(excludeResourceId = ""){
  const tags = [];
  const seen = new Set();
  (Array.isArray(data.resources) ? data.resources : []).forEach(resource => {
    if(excludeResourceId && String(resource && resource.id || "") === String(excludeResourceId)) return;
    normalizeResourceTags(resource && resource.tags).forEach(tag => {
      const key = tag.toLowerCase();
      if(seen.has(key)) return;
      seen.add(key);
      tags.push(tag);
    });
  });
  return tags.sort((a,b)=>a.localeCompare(b, undefined, { sensitivity:"base" }));
}

// Tags are stored on resources. These hints warn admins when tags imply a

function getSuggestedCategoriesFromTags(tags){
  const tagKeys = new Set(normalizeResourceTags(tags).map(tag => tag.toLowerCase()));
  return TAG_CATEGORY_HINTS
    .filter(hint => hint.tags.some(tag => tagKeys.has(canonicalizeResourceTag(tag).toLowerCase())))

function findCategoryByLabelOrId(label){
  const key = String(label || "").trim().toLowerCase();
  return (Array.isArray(data.categories) ? data.categories : [])

}

function getMissingSuggestedCategories(draft){
  const selected = new Set(Array.isArray(draft && draft.categories) ? draft.categories.map(String) : []);
  return getSuggestedCategoriesFromTags(draft && draft.tags)
    .filter(label => {
      const category = findCategoryByLabelOrId(label);
      return category && !selected.has(String(category.id || ""));
    });
}

function formatCategoryList(labels){

  if(labels.length === 2) return `${labels[0]} and ${labels[1]}`;

}

function confirmCategoryAssignmentHint(draft){

  if(!missing.length) return true;
  const categoryList = formatCategoryList(missing);
  const categoryPhrase = missing.length === 1 ? "that category is" : "those categories are";
  return confirm(`This resource has tags suggesting ${categoryList}, but ${categoryPhrase} not selected. Continue?`);

const INFORMATION_SECTIONS = [
  { key:"offered", label:"What is offered" },
  { key:"eligibility", label:"Eligibility" },
  { key:"expect", label:"What to expect" },
  { key:"connect", label:"How to connect" }
];
const INFORMATION_ADDITIONAL_LABEL = "Additional text:";

// Resource "Information" is stored as plain text with simple markdown-like
// section headings. The admin editor splits that text into fields, then composes
// it back into the same storage format before saving.
function trimOuterBlankLines(lines){
  const next = lines.slice();
  while(next.length && next[0].trim() === "") next.shift();
  while(next.length && next[next.length - 1].trim() === "") next.pop();
  return next;
}

function emptyInformationDraft(){
  return INFORMATION_SECTIONS.reduce((draft, section) => {
    draft[section.key] = "";
    return draft;
  }, { additional:"" });
}

function parseInformationText(text){
  const normalized = String(text || "").replace(/\r\n?/g, "\n");
  const draft = emptyInformationDraft();
  const buckets = INFORMATION_SECTIONS.reduce((acc, section) => {
    acc[section.key] = [];
    return acc;
  }, { additional:[] });
  let currentKey = "additional";

  normalized.split("\n").forEach(line => {
    const trimmed = line.trim();
    if(trimmed === INFORMATION_ADDITIONAL_LABEL){
      currentKey = "additional";
      return;
    }

    const section = INFORMATION_SECTIONS.find(item => {
      const escapedLabel = item.label.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return new RegExp(`^\\*\\*${escapedLabel}:\\*\\*(?:\\s*(.*))?$`).test(trimmed);
    });

    if(section){
      currentKey = section.key;
      const escapedLabel = section.label.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const match = trimmed.match(new RegExp(`^\\*\\*${escapedLabel}:\\*\\*(?:\\s*(.*))?$`));
      if(match && match[1]) buckets[currentKey].push(match[1]);
      return;
    }

    buckets[currentKey].push(line);
  });

  Object.keys(draft).forEach(key => {
    draft[key] = trimOuterBlankLines(buckets[key] || []).join("\n");
  });
  return draft;
}

function composeInformationText(draft){
  const parts = [];
  INFORMATION_SECTIONS.forEach(section => {
    const body = String(draft && draft[section.key] || "").trim();
    if(!body) return;
    parts.push(`**${section.label}:**`);
    parts.push(body);
  });
  const additional = String(draft && draft.additional || "").trim();
  if(additional){
    parts.push(INFORMATION_ADDITIONAL_LABEL);
    parts.push(additional);
  }
  return parts.join("\n");
}

function applyInformationMarkup(escapedText){
  return escapedText
    .replace(/__\*\*([^_\n][\s\S]*?)\*\*__/g, "<strong><u>$1</u></strong>")
    .replace(/\*\*__([^*\n][\s\S]*?)__\*\*/g, "<strong><u>$1</u></strong>")
    .replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>")
    .replace(/__([^_\n]+?)__/g, "<u>$1</u>");
}

function renderInformationMarkupHTML(text){
  const normalized = String(text || "").replace(/\r\n?/g, "\n");
  const lines = normalized.split("\n");
  const out = [];
  let listItems = [];

  function flushList(){
    if(!listItems.length) return;
    out.push(`<ul>${listItems.join("")}</ul>`);
    listItems = [];
  }

  lines.forEach(line => {
    const trimmed = line.trim();
    const isDivider = trimmed === "---";
    const bulletMatch = line.match(/^\s*(?:\*|-|•)\s+(.*)$/);

    if(isDivider){
      flushList();
      out.push("<hr>");
      return;
    }

    if(bulletMatch){
      const bulletText = applyInformationMarkup(escapeHTML(bulletMatch[1]));
      listItems.push(`<li>${bulletText}</li>`);
      return;
    }

    flushList();
    if(line === ""){
      out.push('<div class="services-line services-blank">&nbsp;</div>');
      return;
    }
    out.push(`<div class="services-line">${applyInformationMarkup(escapeHTML(line))}</div>`);
  });

  flushList();
  return out.join("");
}

function renderInformationHTML(text){
  const draft = parseInformationText(text);
  const out = [];

  INFORMATION_SECTIONS.forEach(section => {
    const body = String(draft[section.key] || "").trim();
    if(!body) return;
    out.push(
      `<div class="resource-info-section">` +
      `<strong>${escapeHTML(section.label)}:</strong>` +
      `<div class="resource-info-body">${renderInformationMarkupHTML(body)}</div>` +
      `</div>`
    );
  });

  const additional = String(draft.additional || "").trim();
  if(additional){
    out.push(`<div class="resource-info-additional-rendered">${renderInformationMarkupHTML(additional)}</div>`);
  }

  if(out.length) return out.join("");
  return renderInformationMarkupHTML(text);
}

}

// Catch runtime errors and (when debug is enabled) enforce invariants to prevent

function showAppError(context, err){
  const banner = document.getElementById("appErrorBanner");
  const details = document.getElementById("appErrorDetails");
  if(!banner || !details) return;

  const message = err && err.message ? String(err.message) : String(err || "Unknown error");
  const stack = err && err.stack ? String(err.stack) : "";
  const timestamp = new Date().toISOString();
  details.textContent = [
    `Context: ${context}`,
    `Message: ${message}`,
    `Timestamp: ${timestamp}`,
    stack ? `Stack:\n${stack}` : ""
  ].filter(Boolean).join("\n");
  banner.style.display = "block";
}

function safeCall(label, fn){
  try{
    return fn();
  }catch(err){
    showAppError(label, err);
    return undefined;
  }
}

function assertInvariants(context = "invariant check"){
  if(!data || !Array.isArray(data.resources)) throw new Error(`${context}: data.resources must be an array`);
  if(!Array.isArray(data.categories)) throw new Error(`${context}: data.categories must be an array`);
  if(!Array.isArray(printSelection)) throw new Error(`${context}: printSelection must be an array`);

  const ids = new Set();
  data.resources.forEach((resource, idx) => {
    const id = String(resource && resource.id || "");
    if(!id) throw new Error(`${context}: resource at index ${idx} is missing id`);
    if(ids.has(id)) throw new Error(`${context}: duplicate resource id '${id}'`);
    ids.add(id);

    if(!Array.isArray(resource.tags)) throw new Error(`${context}: resource '${id}' tags must be an array`);
    const resourceTagKeys = new Set();
    resource.tags.forEach(tag => {
      if(typeof tag !== "string" || tag !== tag.trim() || !tag){
        throw new Error(`${context}: resource '${id}' has invalid tag '${tag}'`);
      }
      const key = tag.toLowerCase();
      if(resourceTagKeys.has(key)){
        throw new Error(`${context}: resource '${id}' has duplicate tag '${tag}'`);
      }
      resourceTagKeys.add(key);
    });

    if(resource.verifiedOn != null && !isValidMMYY(resource.verifiedOn)){
      throw new Error(`${context}: resource '${id}' verifiedOn must be MM/YY or null`);
    }
  });

  const resourceIds = new Set(data.resources.map(r => String(r && r.id || "")));
  const badPrintSelection = printSelection.find(id => !resourceIds.has(String(id || "")));
  if(badPrintSelection) throw new Error(`${context}: print selection '${badPrintSelection}' does not reference a valid resource`);
}

function safeRender(label = "render"){
  return safeCall(label, () => {
    if(DEBUG) assertInvariants(`${label} pre`);
    const result = render();
    if(DEBUG) assertInvariants(`${label} post`);
    return result;
  });
}

function safeRenderAdmin(label = "renderAdmin"){
  return safeCall(label, () => {
    if(DEBUG) assertInvariants(`${label} pre`);
    const result = renderAdmin();
    if(DEBUG) assertInvariants(`${label} post`);
    return result;
  });
}

        if(rentResults.mode !== "none") throw new Error("rent should not match parent or rental");
        const emergencyResults = buildSearchResults("emergency");
        if(emergencyResults.mode !== "information") throw new Error(`expected information mode, got ${emergencyResults.mode}`);
        if(emergencyResults.groups[0].items[0].resourceId !== "uca") throw new Error("information result resource was incorrect");
        if(!emergencyResults.groups[0].items[0].snippet) throw new Error("information result snippet was missing");

        data.resources.push({ id:"emergency-name", name:"Emergency Center", categories:["housing"], tags:[], informationText:"" });
        const nameResults = buildSearchResults("emergency");
        if(nameResults.mode !== "name") throw new Error("name matches should suppress information fallback");
        if(nameResults.groups[0].items.some(item => item.resourceId === "uca")) throw new Error("information fallback appeared when name matches existed");
      }finally{
        data = previousData;
      }
    }
  });

  tests.push({
    name: "SEARCH RESULT NAVIGATION",
    fn: () => {
      const previousData = data;
      const previousView = view;
      const previousCategory = currentCategory;
      const previousExpanded = expandedSearchResourceId;
      const previousFilters = categoryTagFilters;
      const previousSearchOpen = isSearchOpen;
      try{
        data = {
          categories:[{ id:"housing", label:"Housing", displayOrder:1 }],
          resources:[{ id:"uca", name:"Utah Community Action", categories:["housing"], tags:[], informationText:"" }]
        };
        categoryTagFilters = { housing:["Shelter"] };
        openSearchResult("housing", "uca");
        if(view !== "category") throw new Error("search result did not switch to category view");
        if(currentCategory !== "housing") throw new Error("search result did not set category");
        if(expandedSearchResourceId !== "uca") throw new Error("search result did not mark resource for expansion");
        if(getCategoryFilterTags("housing").length) throw new Error("category filters were not cleared");
      }finally{
        data = previousData;
        view = previousView;
        currentCategory = previousCategory;
        expandedSearchResourceId = previousExpanded;
        categoryTagFilters = previousFilters;
        isSearchOpen = previousSearchOpen;
      }
    }
  });

  tests.push({
    name: "CATEGORY TAGS ARE RESOURCE OWNED",
    fn: () => {
      const previousData = data;
      try{
        data = {
          categories:[
            { id:"employment", label:"Employment" },
            { id:"education", label:"Education" }
          ],
          resources:[
            { id:"shared", name:"Shared Training", categories:["employment","education"], tags:["Career/Vocational Training", "Apprenticeship"] },
            { id:"ged", name:"GED", categories:["education"], tags:["GED"] }
          ]
        };
        const employmentTags = getTagsForCategory("employment");
        const educationTags = getTagsForCategory("education");
        if(!employmentTags.includes("Apprenticeship") || !educationTags.includes("Apprenticeship")){
          throw new Error("shared resource tags did not appear in both categories");
        }
        const matching = filterResourcesBySelectedTags(getCategoryResources("education"), ["Apprenticeship", "GED"]).map(r => r.id);
        if(!matching.includes("shared") || !matching.includes("ged")){
          throw new Error("OR tag filtering missed expected education resources");
        }
      }finally{
        data = previousData;
      }
    }
  });

  tests.push({
    name: "CATEGORY ASSIGNMENT TAG HINT",
    fn: () => {
      const previousData = data;
      try{
        data = {
          categories:[
            { id:"housing", label:"Housing" },
            { id:"employment", label:"Employment" },
            { id:"education", label:"Education" }
          ],
          resources:[]
        };
        const suggested = getSuggestedCategoriesFromTags(["Shelter", "Apprenticeship"]);
        if(JSON.stringify(suggested) !== JSON.stringify(["Housing", "Employment", "Education"])){
          throw new Error(`unexpected suggestions ${JSON.stringify(suggested)}`);
        }
        const missing = getMissingSuggestedCategories({
          tags:["Shelter", "Apprenticeship"],
          categories:["housing"]
        });
        if(JSON.stringify(missing) !== JSON.stringify(["Employment", "Education"])){
          throw new Error(`unexpected missing categories ${JSON.stringify(missing)}`);
        }
      }finally{
        data = previousData;
      }
    }
  });

  tests.push({
    name: "VERIFIED DATE VALIDATION",
    fn: () => {
      data.resources.forEach(resource => {
        const value = resource.verifiedOn;
        if(value != null && !isValidMMYY(value)){
          throw new Error(`invalid verifiedOn '${value}' on resource '${resource.id}'`);
        }
      });
    }
  });

  tests.push({
    name: "RESOURCE SORTING",
    fn: () => {
      const sorted = data.resources.slice().sort((a, b) => {
        const aMonth = parseMMYYToMonthIndex(a.verifiedOn);
        const bMonth = parseMMYYToMonthIndex(b.verifiedOn);
        const aVerified = aMonth !== null;
        const bVerified = bMonth !== null;
        if(aVerified !== bVerified) return aVerified ? -1 : 1;
        if(aVerified && bVerified && aMonth !== bMonth) return aMonth - bMonth;
        return compareResourcesByName(a, b);
      });
      for(let i = 1; i < sorted.length; i += 1){
        const prev = sorted[i - 1];
        const curr = sorted[i];
        const prevMonth = parseMMYYToMonthIndex(prev.verifiedOn);
        const currMonth = parseMMYYToMonthIndex(curr.verifiedOn);
        if(prevMonth === null && currMonth !== null){
          throw new Error("unverified resource appears before verified resource");
        }
      }
    }
  });

  tests.push({
    name: "INFORMATION RENDERER",
    fn: () => {
      const html = renderInformationHTML("One\n\n* bullet\n---\n**bold**");
      if(typeof html !== "string" || !html.length) throw new Error("renderer returned empty output");
      const host = document.createElement("div");
      try{
        host.className = "services-rendered";
        host.innerHTML = html;
        document.body.appendChild(host);
        const ul = host.querySelector("ul");
        if(!ul) throw new Error("renderer did not create a list");
        const style = getComputedStyle(ul);
        if(style.marginLeft !== "0px") throw new Error(`list margin should be flush, got ${style.marginLeft}`);
      }finally{
        host.remove();
      }
    }
  });

  tests.push({
    name: "INFORMATION TEXT PRESERVATION",
    fn: () => {
      const resource = { informationText:"**bold**\n* bullet\n---" };
      normalizeResourceInformation(resource);
      if(resource.informationText !== "**bold**\n* bullet\n---"){
        throw new Error("informationText was not preserved");
      }
    }
  });

  tests.push({
    name: "INFORMATION TEXTAREA AUTO FIT",
    fn: () => {
      const textarea = document.createElement("textarea");
      try{
        textarea.className = "big resource-info-input";
        textarea.style.width = "240px";
        textarea.value = Array(12).fill("Line of resource information").join("\n");
        document.body.appendChild(textarea);
        fitTextareaToText(textarea);
        if(textarea.clientHeight < textarea.scrollHeight){
          throw new Error("textarea did not expand to fit content");
        }
      }finally{
        textarea.remove();
      }
    }
  });

  tests.push({
    name: "MISSING INFORMATION TEXT IS CANONICAL",
    fn: () => {
      const resource = {};
      normalizeResourceInformation(resource);
      if(resource.informationText !== ""){
        throw new Error("missing informationText was not normalized to empty string");
      }
    }
  });

  tests.push({
    name: "LEGACY VERIFIED DATE MIGRATION",
    fn: () => {
      const resource = { reviewedOn:"03/25", verifiedDate:"2025-02-14" };
      normalizeResourceVerifiedOn(resource);
      if(resource.verifiedOn !== "03/25"){
        throw new Error(`expected 03/25 from reviewedOn, got '${resource.verifiedOn}'`);
      }
      if("reviewedOn" in resource){
        throw new Error("legacy reviewedOn key was not removed after migration");
      }
      if("verifiedDate" in resource){
        throw new Error("legacy verifiedDate key was not removed after migration");
      }
      const legacyDateResource = { verifiedOn:null, verifiedDate:"2025-02-14" };
      normalizeResourceVerifiedOn(legacyDateResource);
      if(legacyDateResource.verifiedOn !== "02/25"){
        throw new Error(`expected 02/25 from verifiedDate, got '${legacyDateResource.verifiedOn}'`);
      }
      const canonicalResource = { verifiedOn:"04/25", reviewedOn:"03/25" };
      normalizeResourceVerifiedOn(canonicalResource);
      if(canonicalResource.verifiedOn !== "04/25"){
        throw new Error(`expected canonical verifiedOn to win, got '${canonicalResource.verifiedOn}'`);
      }
    }
  });

  const results = tests.map(test => {
    try{
      test.fn();
      return { ok:true, name:test.name, message:"" };
    }catch(err){
      return { ok:false, name:test.name, message:(err && err.message) ? err.message : String(err) };
    }
  });

  const panel = document.getElementById("selfTestPanel");
  const resultsEl = document.getElementById("selfTestResults");
  if(panel && resultsEl){
    resultsEl.innerHTML = "";
    results.forEach(result => {
      const row = document.createElement("div");
      row.textContent = result.ok
        ? `✔ PASS ${result.name}`
        : `✖ FAIL ${result.name}: ${result.message}`;
      resultsEl.appendChild(row);
    });
    panel.style.display = "block";
  }

  return results;
}

if(selfTestCloseBtn){
  selfTestCloseBtn.onclick = () => {
    const panel = document.getElementById("selfTestPanel");
    if(panel) panel.style.display = "none";
  };
}

// ============================================================
// RENDERING — GENERAL
// ============================================================
// Rendering is state-driven. Event handlers mutate the small set of runtime
// state variables above, then call safeRender() or safeRenderAdmin(). The main
// render() function below clears and rebuilds the active view from scratch.

function setView(nextView){
  if(nextView === "admin" && !isAdminVisible) return;
  if(view === "admin" && nextView !== "admin"){
    if(!commitPendingEditsIfChanged()) return;
  }
  if(nextView !== "category") expandedSearchResourceId = "";
  view = nextView;
  safeRender();
}

function setAdminVisibility(visible){
  const nextVisible = !!visible;
  if(!nextVisible && view === "admin"){
    setView("categories");
    if(view === "admin") return;
  }
  isAdminVisible = nextVisible;
  if(isAdminVisible && adminGuideMode && !adminGuideDismissed){
    adminGuideMode = true;
    if(adminGuidePhase === "createResource"){
      adminGuideStep = "resources";
    }else if(adminGuidePhase === "renameFile"){
      adminGuideStep = "renameFile";
    }else if(adminGuidePhase === "setupName"){
      adminGuideStep = "setupName";
    }
  }
  tabAdmin.style.display = isAdminVisible ? "" : "none";
  if(!isAdminVisible){
    const adminSection = document.getElementById("adminView");
    if(adminSection) adminSection.classList.add("hidden");
  }
}

const tabPrintSelection = document.getElementById("tabPrintSelection");
const helpButton = document.getElementById("helpButton");
const tabSearch = document.getElementById("tabSearch");
const freshStartButton = document.getElementById("freshStartButton");
tabCategories.onclick = ()=>{ setView("categories"); };
if(tabPrintSelection) tabPrintSelection.onclick = ()=>{ startPrintSelectionPreview(); };
if(helpButton) helpButton.onclick = ()=>{ showUserHelp(); };
if(freshStartButton){
  freshStartButton.onclick = () => {
    if(!confirm("Clear saved app data and reload from a fresh start?")) return;
    const nextParams = new URLSearchParams(location.search);
    nextParams.set("fresh", Date.now().toString());
    location.replace(buildUrlWithParams(nextParams));
  };
}
tabAdmin.onclick = ()=>{ setView("admin"); };

function syncSearchPanel(){
  const panel = document.getElementById("searchPanel");
  const input = document.getElementById("searchInput");
  if(!panel) return;
  panel.classList.toggle("hidden", !isSearchOpen);
  if(input && isSearchOpen && document.activeElement !== input){
    input.value = searchQuery;
  }
}

function closeSearchPanel(){
  isSearchOpen = false;
  syncSearchPanel();
}

function toggleSearchPanel(){
  isSearchOpen = !isSearchOpen;
  syncSearchPanel();
  if(isSearchOpen){
    window.setTimeout(() => {
      const input = document.getElementById("searchInput");
      if(input){
        input.focus();
        input.select();
      }
    }, 0);
  }
}

function performSearch(query){
  if(view === "admin" && !commitPendingEditsIfChanged()) return;
  searchQuery = String(query || "").trim();
  searchResults = buildSearchResults(searchQuery);
  expandedSearchResourceId = "";
  view = "search-results";
  safeRender();
}

const appTitle = document.getElementById("appTitle");
function getTsoName(){
  return String(localStorage.getItem(TSO_NAME_STORAGE_KEY) || "").trim();
}

function getTsoFileName(){
  const fallback = "new-name";
  const name = getTsoName() || fallback;
  const cleaned = name.toLowerCase()
    .replace(/&/g, " and ")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
  return `${cleaned || fallback}.html`;
}

function getAppTitleText(){
  const tsoName = getTsoName();
  return `${tsoName || "<New>"} TSO Resources`;
}

function refreshAppTitle(){
  const titleText = getAppTitleText();
  document.title = titleText;
  if(appTitle) appTitle.textContent = titleText;
}

refreshAppTitle();

function hasSeenTip(tipId){
  if(tipId === "newAdminWelcome" && adminGuideMode) return false;
  const storageKey = TIP_STORAGE_KEYS[tipId];
  return !storageKey || localStorage.getItem(storageKey) === "1";
}

function markTipSeen(tipId){
  const storageKey = TIP_STORAGE_KEYS[tipId];
  if(!storageKey) return;
  localStorage.setItem(storageKey, "1");
  if(tipId === "user") showOneTimeTip = false;
}

function isNewAdminSetupState(){
  return !getTsoName()
    && !(Array.isArray(data.resources) && data.resources.length);
}

function createOneTimeTip(tipId){
  const tipText = TIP_TEXT[tipId];
  if(!tipText || hasSeenTip(tipId)) return null;
  const tip = document.createElement("div");
  tip.className = "one-time-tip";
  tip.textContent = tipText;
  tip.onclick = () => {
    markTipSeen(tipId);
    safeRender();
  };
  return tip;
}

function createGuideTip(tipText){
  if(!tipText) return null;
  const tip = document.createElement("div");
  tip.className = "one-time-tip";
  tip.textContent = tipText;
  return tip;
}

function getFirstAdminGuideStep(){
  if(adminGuidePhase === "createResource") return "reopenAdmin";
  if(adminGuidePhase === "renameFile") return "renameFile";
  return "setupName";
}

function setAdminGuidePhase(phase){
  adminGuidePhase = normalizeAdminGuidePhase(phase);
  localStorage.setItem(ADMIN_GUIDE_PHASE_STORAGE_KEY, adminGuidePhase);
}

function setAdminGuideStep(step){
  adminGuideStep = step;
  if(view === "admin") safeRenderAdmin();
}

function advanceAdminGuideToResourceCreation(){
  setAdminGuidePhase("createResource");
  setAdminGuideStep("reopenAdmin");
}

function formatGuideTipText(tipText){
  return String(tipText || "").replace(/\[new TSO name\]\.html/g, getTsoFileName());
}

function getCategoryTipId(){
  if(isNewAdminSetupState() && adminGuideMode) return "newAdminWelcome";
  if(showOneTimeTip) return "user";
  return "";
}

function getCategoryGuideTipText(){
  if(adminGuideMode && adminGuidePhase === "createResource" && view === "categories" && (!isNewTemplateFile() || adminGuideStep === "reopenAdmin")){
    return formatGuideTipText(TIP_TEXT.renamedFileWelcome);
  }
  return "";
}

function startAdminGuide(step = "resources"){
  adminGuideMode = true;
  adminGuideStep = step;
  adminGuideDismissed = false;
  localStorage.removeItem(ADMIN_GUIDE_DISABLED_STORAGE_KEY);
  if(step === "resourceFields") adminGuideResourceSection = "basics";
}

function stopAdminGuide(){
  adminGuideMode = false;
  adminGuideStep = getFirstAdminGuideStep();
  adminGuideResourceSection = "basics";
  adminGuideDismissed = true;
  localStorage.setItem(ADMIN_GUIDE_DISABLED_STORAGE_KEY, "1");
}

function toggleAdminGuide(){
  if(adminGuideMode){
    stopAdminGuide();
  }else{
    const firstStep = getFirstAdminGuideStep();
    const nextStep = view === "admin" && firstStep === "reopenAdmin" ? "resources" : firstStep;
    if(nextStep === "resources"){
      adminResourceEditMode = false;
      adminTab = "categories";
    }
    startAdminGuide(nextStep);
  }
  if(view === "admin") safeRenderAdmin();
}

function requestToggleAdminGuide(source = "toolbar"){
  if(!adminGuideMode){
    const firstStep = getFirstAdminGuideStep();
    const nextStep = view === "admin" && firstStep === "reopenAdmin" ? "resources" : firstStep;
    if(nextStep === "resources"){
      adminResourceEditMode = false;
      adminTab = "categories";
    }
    startAdminGuide(nextStep);
    if(view === "admin") safeRenderAdmin();
    return;
  }
  showQuitAdminGuidePrompt(source);
}

function showQuitAdminGuidePrompt(source = "toolbar"){
  const modal = getReferenceModal();
  modal.innerHTML = `
    <div class="reference-modal-panel" role="dialog" aria-modal="true" aria-labelledby="quitGuideTitle">
      <div class="reference-modal-header">
        <div id="quitGuideTitle" class="reference-modal-title">Do you want to quit the guided quick start?</div>
        <div class="reference-modal-actions">
          <button class="button danger" type="button" id="quitGuideYesButton">Yes</button>
          <button class="button" type="button" id="quitGuideNoButton">No</button>
        </div>
      </div>
    </div>
  `;
  const yesBtn = document.getElementById("quitGuideYesButton");
  const noBtn = document.getElementById("quitGuideNoButton");
  if(yesBtn){
    yesBtn.addEventListener("click", () => {
      stopAdminGuide();
      closeReferenceModal();
      if(view === "admin") safeRenderAdmin("quit guide");
    });
  }
  if(noBtn){
    noBtn.addEventListener("click", () => {
      closeReferenceModal();
      if(source === "adminHelp") showAdminHelp();
    });
  }
  modal.classList.remove("hidden");
  if(noBtn) noBtn.focus();
}

function quitForRename(){
  setAdminGuidePhase("renameFile");
  localStorage.setItem(ADMIN_GUIDE_PHASE_STORAGE_KEY, "renameFile");
  window.close();
  window.setTimeout(() => {
    const modal = getReferenceModal();
    modal.innerHTML = `
      <div class="reference-modal-panel" role="dialog" aria-modal="true" aria-labelledby="quitFallbackTitle">
        <div class="reference-modal-header">
          <div id="quitFallbackTitle" class="reference-modal-title">Close this tab</div>
          <div class="reference-modal-actions">
            <button class="button reference-modal-close" type="button">OK</button>
          </div>
        </div>
        <div class="reference-modal-body">
          <p>Your browser did not allow this page to close itself. Close this tab or window, rename <code>new.html</code> to <code>${escapeHTML(getTsoFileName())}</code>, then open <code>${escapeHTML(getTsoFileName())}</code>.</p>
        </div>
      </div>
    `;
    const closeBtn = modal.querySelector(".reference-modal-close");
    if(closeBtn) closeBtn.addEventListener("click", closeReferenceModal);
    modal.classList.remove("hidden");
    if(closeBtn) closeBtn.focus();
  }, 150);
}

function getAdminGuideTipText(){
  if(!adminGuideMode) return "";
  if(adminGuideStep === "setupName") return TIP_TEXT.adminGuideSetupName;
  if(adminGuideStep === "verifyName") return TIP_TEXT.adminGuideVerifyName;
  if(adminGuideStep === "renameFile") return TIP_TEXT.adminGuideRenameFile;
  if(adminGuideStep === "reopenAdmin") return "";
  if(adminGuideStep === "resourceFields" || adminResourceEditMode){
    if(adminGuideResourceSection === "tags") return TIP_TEXT.adminGuideTags;
    if(adminGuideResourceSection === "categories") return TIP_TEXT.adminGuideCategories;
    if(adminGuideResourceSection === "information") return TIP_TEXT.adminGuideInformation;
    if(adminGuideResourceSection === "update") return TIP_TEXT.adminGuideUpdate;
    return TIP_TEXT.adminGuideResourceFields;
  }
  if(adminGuideStep === "newResource" || adminTab === "resources") return TIP_TEXT.adminGuideNewResource;
  return TIP_TEXT.adminGuideResources;
}

function getAdminGuideResourceSections(){
  return ["basics", "tags", "categories", "information", "update"];
}

function advanceAdminGuideResourceSection(){
  const sections = getAdminGuideResourceSections();
  const index = sections.indexOf(adminGuideResourceSection);
  if(index === -1 || index >= sections.length - 1) return;
  adminGuideResourceSection = sections[index + 1];
  safeRenderAdmin();
}

function retreatAdminGuideResourceSection(){
  const sections = getAdminGuideResourceSections();
  const index = sections.indexOf(adminGuideResourceSection);
  if(index <= 0) return;
  adminGuideResourceSection = sections[index - 1];
  safeRenderAdmin();
}

function isAdminGuideResourceFirstSection(){
  const sections = getAdminGuideResourceSections();
  return adminGuideResourceSection === sections[0];
}

function isAdminGuideResourceLastSection(){
  const sections = getAdminGuideResourceSections();
  return adminGuideResourceSection === sections[sections.length - 1];
}

function shouldDisableResourceEditorExit(){
  return adminGuideMode
    && adminGuideStep === "resourceFields"
    && adminResourceEditMode
    && adminGuideResourceSection !== "update";
}

function renderAdminGuideTip(container){
  const tipText = formatGuideTipText(getAdminGuideTipText());
  if(!tipText) return;
  const tip = document.createElement("div");
  tip.className = "one-time-tip admin-guide-tip";
  const tipMessage = document.createElement("div");
  tipMessage.className = "admin-guide-tip-message";
  tipMessage.textContent = tipText;
  tip.appendChild(tipMessage);
  if(adminGuideStep === "renameFile"){
    const actions = document.createElement("div");
    actions.className = "admin-guide-tip-actions";
    const backBtn = document.createElement("button");
    backBtn.className = "button";
    backBtn.type = "button";
    backBtn.textContent = "Back";
    backBtn.onclick = () => {
      setAdminGuidePhase("setupName");
      setAdminGuideStep("verifyName");
    };
    actions.appendChild(backBtn);
    const quitBtn = document.createElement("button");
    quitBtn.className = "button primary";
    quitBtn.type = "button";
    quitBtn.textContent = "Quit";
    quitBtn.onclick = quitForRename;
    actions.appendChild(quitBtn);
    tip.appendChild(actions);
  }else if(adminResourceEditMode && (!isAdminGuideResourceFirstSection() || !isAdminGuideResourceLastSection())){
    const actions = document.createElement("div");
    actions.className = "admin-guide-tip-actions";
    if(!isAdminGuideResourceFirstSection()){
      const backBtn = document.createElement("button");
      backBtn.className = "button";
      backBtn.type = "button";
      backBtn.textContent = "Back";
      backBtn.onclick = retreatAdminGuideResourceSection;
      actions.appendChild(backBtn);
    }
    if(!isAdminGuideResourceLastSection()){
      const nextBtn = document.createElement("button");
      nextBtn.className = "button";
      nextBtn.type = "button";
      nextBtn.textContent = "Next";
      nextBtn.onclick = advanceAdminGuideResourceSection;
      actions.appendChild(nextBtn);
    }
    tip.appendChild(actions);
  }
  const firstPanel = container.querySelector(".admin-panel");
  if(firstPanel){
    container.insertBefore(tip, firstPanel);
  }else{
    container.appendChild(tip);
  }
}

function printAdminHelp(){
  const modal = document.getElementById("referenceModal");
  if(!modal || modal.classList.contains("hidden")) return;
  const details = Array.from(modal.querySelectorAll(".admin-help-content details"));
  adminHelpPrintRestoreState = details.map(detail => detail.open);
  details.forEach(detail => { detail.open = true; });
  window.setTimeout(() => window.print(), 0);
}

function restoreAdminHelpPrintState(){
  if(!adminHelpPrintRestoreState) return;
  const modal = document.getElementById("referenceModal");
  const details = modal ? Array.from(modal.querySelectorAll(".admin-help-content details")) : [];
  details.forEach((detail, index) => {
    detail.open = !!adminHelpPrintRestoreState[index];
  });
  adminHelpPrintRestoreState = null;
}

function syncAdminHelpGuideVisibility(){
  const setupSection = document.querySelector("#referenceModal .admin-help-setup");
  if(setupSection) setupSection.classList.toggle("hidden", !adminGuideMode);
  const guideBtn = document.getElementById("adminHelpGuideButton");
  if(guideBtn){
    guideBtn.setAttribute("aria-pressed", adminGuideMode ? "true" : "false");
    guideBtn.classList.toggle("primary", adminGuideMode);
  }
}

function toggleUpdateInfoView(){
  if(view === "recent-updates" && showUpdateInfo){
    showUpdateInfo = false;
    showRecentChangeLog = false;
    recentUpdateDetail = null;
    pendingRecentUpdates = [];
    view = "categories";

function getUnseenUpdates(){
  const seen = getSeenUpdateIds();
  return getRecentChanges().filter(entry => !seen.has(String(entry.id)));
}

function getCategoryUpdateMap(){
  const map = new Map();
  getUnseenUpdates().forEach(entry => {
    getCategoryIdsForChange(entry).forEach(catId => {
      if(!map.has(catId)) map.set(catId, []);
      map.get(catId).push(entry);
    });
  });
  return map;
}

// Category view helpers handle tag-based filtering within the selected category.
// Filters are transient UI state; they are not saved into the resource package.

function getCategoryFilterTags(categoryId){
  return Array.isArray(categoryTagFilters[categoryId]) ? categoryTagFilters[categoryId] : [];
}

function setCategoryFilterTags(categoryId, tags){
  const cleaned = normalizeResourceTags(tags);
  if(cleaned.length){
    categoryTagFilters[categoryId] = cleaned;
  }else{
    delete categoryTagFilters[categoryId];
  }
}

function clearAllCategoryFilters(shouldRender = true){
  categoryTagFilters = {};
  if(shouldRender && view === "category") safeRender();
}

function getResourceTagKeys(resource){
  return new Set(normalizeResourceTags(resource && resource.tags).map(tag => tag.toLowerCase()));
}

function countSelectedTagMatches(resource, activeTagKeys){
  if(!activeTagKeys.size) return 0;
  const resourceKeys = getResourceTagKeys(resource);
  let count = 0;
  activeTagKeys.forEach(key => {
    if(resourceKeys.has(key)) count += 1;
  });
  return count;
}

function resourceMatchesSelectedTags(resource, selectedTags){
  const activeTags = normalizeResourceTags(selectedTags);
  const activeTagKeys = new Set(activeTags.map(tag => tag.toLowerCase()));
  return !activeTagKeys.size || countSelectedTagMatches(resource, activeTagKeys) > 0;
}

function filterResourcesBySelectedTags(resources, selectedTags){
  const activeTags = normalizeResourceTags(selectedTags);
  const activeTagKeys = new Set(activeTags.map(tag => tag.toLowerCase()));
  return (Array.isArray(resources) ? resources : [])
    .filter(resource => resourceMatchesSelectedTags(resource, activeTags))
    .sort((a, b) => {
      if(activeTagKeys.size){
        const matchDiff = countSelectedTagMatches(b, activeTagKeys) - countSelectedTagMatches(a, activeTagKeys);
        if(matchDiff) return matchDiff;
      }
      return compareResourcesByName(a, b);
    });
}

function getCategoryResources(categoryId){
  return (Array.isArray(data.resources) ? data.resources : [])
    .filter(r => Array.isArray(r.categories) && r.categories.includes(categoryId));
}

function getTagsForCategory(categoryId){
  const tags = [];
  const seen = new Set();
  getCategoryResources(categoryId).forEach(resource => {
    normalizeResourceTags(resource.tags).forEach(tag => {
      const key = tag.toLowerCase();
      if(seen.has(key)) return;
      seen.add(key);
      tags.push(tag);
    });
  });
  return tags.sort((a,b)=>a.localeCompare(b, undefined, { sensitivity:"base" }));
}

function getCategoryTagOptions(categoryId){
  return getTagsForCategory(categoryId);
}

// ============================================================
// UNDO SYSTEM
// ============================================================
// Undo is intentionally narrow: destructive admin deletes save one complete data
// snapshot in localStorage. Restoring that snapshot is simpler and safer than
// trying to reverse individual category/resource/tag mutations.

function getUndoSnapshot(){
  try{
    const raw = localStorage.getItem(UNDO_STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || typeof parsed !== "object") return null;
    if(!parsed.dataSnapshot || typeof parsed.message !== "string") return null;
    return parsed;
  }catch(_err){
    return null;
  }
}

function clearUndoSnapshot(){
  localStorage.removeItem(UNDO_STORAGE_KEY);
}

function setUndoSnapshot(message){
  localStorage.setItem(UNDO_STORAGE_KEY, JSON.stringify({
    dataSnapshot: JSON.parse(JSON.stringify(data)),
    message: String(message || "")
  }));
}

function undoLastDeletion(){
  const snapshot = getUndoSnapshot();
  if(!snapshot || !snapshot.dataSnapshot) return;
      data = snapshot.dataSnapshot;
      normalizeDataInformationShape(data);
      normalizeDataTagsShape(data);
      normalizeDataVerifiedOnShape(data);
      normalizeChanges(data);
  clearUndoSnapshot();
  persist();
  safeRender();
}

        clearFilterBtn.textContent = "Clear";
        clearFilterBtn.onclick = () => {
          setCategoryFilterTags(currentCategory, []);
          safeRender();
        };
        filterArea.appendChild(clearFilterBtn);
      }

      const count = document.createElement("span");
      count.style.fontSize = "13px";
      count.style.whiteSpace = "nowrap";
      count.textContent = filtered.length
        ? `${filtered.length} ${filtered.length === 1 ? "result" : "results"}`
        : "No matching resources";
      filterArea.appendChild(count);
      appView.appendChild(filterArea);
    }

    const printInstruction = document.createElement("div");
    printInstruction.className = "category-print-banner";
    printInstruction.textContent = getCategoryPrintInstructionText();
    appView.appendChild(printInstruction);

    if(!filtered.length){
      const empty = document.createElement("p");
      empty.textContent = activeTags.length ? "No matching resources" : "No resources in this category.";
      appView.appendChild(empty);
    }

    filtered.forEach(res=>{
      let expanded=String(res && res.id || "") === String(expandedSearchResourceId || "");
      const card=buildResourceCard(res,{expanded,showDescription:true});
      const resourceUpdates = getChangesForResource(res.id, { unseenOnly:true });
      if(resourceUpdates.length){
        const badge = document.createElement("button");
        badge.className = "button secondary";
        badge.textContent = resourceUpdates.some(u => u.action === "added") ? "New" : "Updated";
        badge.onclick = e => {
          e.stopPropagation();
          recentUpdateDetail = resourceUpdates;
          markChangesViewed(resourceUpdates.map(entry => entry.id));
          view = "recent-updates";
          safeRender();
        };
        card.prepend(badge);
      }
      card.onclick=()=>{
        expanded=!expanded;
        const d=card.querySelector(".resource-details");
        d.classList.toggle("collapsed",!expanded);
        d.classList.toggle("expanded",expanded);
      };
      appView.appendChild(card);
    });
    }

  if(view==="search-results"){
    renderSearchResultsView();
  }

  if(view==="recent-updates"){
    const entries = Array.isArray(recentUpdateDetail) ? recentUpdateDetail : getRecentChanges();
    const packageInfo = (data && data.lastLoadedPackageInfo && typeof data.lastLoadedPackageInfo === "object")
      ? data.lastLoadedPackageInfo
      : null;
    const packageChanges = packageInfo && Array.isArray(packageInfo.changes) ? packageInfo.changes : [];
    appView.innerHTML = "";
    const resourcePackageVersion = packageInfo ? packageInfo.packageVersion : normalizePackageVersionValue(data && data.packageVersion);
    if(showUpdateInfo){
      appView.innerHTML += `<div class="category-card"><div>App version: ${escapeHTML(data.appVersion || APP_VERSION)}</div><div>Last modified: ${escapeHTML(formatDateOnly(data.lastModified))}</div></div>`;
      appView.innerHTML += `<div class="category-card"><strong>Resource Package ${escapeHTML(String(resourcePackageVersion))}:</strong>${packageChanges.length ? `<ul>${packageChanges.map(change => `<li>${escapeHTML(change)}</li>`).join("")}</ul>` : `<div>No resource package updates loaded.</div>`}</div>`;
      const backToCategories = document.createElement("button");
      backToCategories.type = "button";
      backToCategories.className = "button primary";
      backToCategories.textContent = "View Categories";
      backToCategories.onclick = () => {
        showUpdateInfo = false;
        showRecentChangeLog = false;
        recentUpdateDetail = null;
        pendingRecentUpdates = [];
        view = "categories";
        safeRender();
      };
      appView.appendChild(backToCategories);
    }
    if(showRecentChangeLog && !entries.length){
      appView.innerHTML += `<p>No recent updates.</p>`;
    }else if(showRecentChangeLog){
      entries.forEach(entry => {
        const card = document.createElement("div");
        card.className = "resource-card";
        card.innerHTML = formatChangeEntryHTML(entry);
        appView.appendChild(card);
      });
    }
    recentUpdateDetail = null;
    pendingRecentUpdates = [];
  }

  if(view==="print-selection"){
    const { normalSelections, listSelections } = PrintWorkflow.getPrintSelectionGroups();
    const selections=[...normalSelections, ...listSelections];
    if(!selections.length){ appView.innerHTML="<p>No resources selected for printing.</p>"; return; }

    const btn=document.createElement("button");
    btn.textContent="Print Preview";
    btn.className="button primary";
    btn.onclick=startPrintSelectionPreview;
    appView.appendChild(btn);

    selections.forEach(res=> appView.appendChild(buildResourceCard(res,{expanded:true})));
  }
}

/* ---------- Print Selection ---------- */
// Print selection replaced the older Favorites concept. The legacy key is still
// read once so existing browsers keep their selected resources after upgrading.

function loadPrintSelection(){
  let raw = localStorage.getItem(PRINT_SELECTION_STORAGE_KEY);
  if(raw === null){
    raw = localStorage.getItem(LEGACY_FAVORITES_STORAGE_KEY);
    if(raw !== null){
      localStorage.setItem(PRINT_SELECTION_STORAGE_KEY, raw);
      localStorage.removeItem(LEGACY_FAVORITES_STORAGE_KEY);
    }
  }
  let parsed = [];
  try{
    parsed = JSON.parse(raw || "[]");
  }catch(e){
    parsed = [];
  }
  return Array.isArray(parsed) ? parsed.map(id => String(id || "")).filter(Boolean) : [];
}

function savePrintSelection(){
  localStorage.setItem(PRINT_SELECTION_STORAGE_KEY, JSON.stringify(printSelection));
  localStorage.removeItem(LEGACY_FAVORITES_STORAGE_KEY);
}

function sanitizePrintSelection(){
  const resourceIds = new Set((data.resources || []).map(resource => String(resource && resource.id || "")));
  const filtered = printSelection.filter(id => resourceIds.has(String(id || "")));
  if(filtered.length !== printSelection.length){
    printSelection = filtered;
    savePrintSelection();
  }
}

function isSelectedForPrinting(id){
  return printSelection.includes(String(id || ""));
}

function getPrintSelectionIcon(id){
  return isSelectedForPrinting(id) ? "🖨️" : "⬜";
}

function getPrintSelectionResources(){
  const selectedIds = new Set(printSelection.map(id => String(id || "")));
  return data.resources.filter(resource => selectedIds.has(String(resource.id || "")));
}

function updatePrintSelectionIndicator(){
  if(tabPrintSelection) tabPrintSelection.textContent = `🖨️ (${printSelection.length})`;
}

function getCategoryPrintInstructionText(){
  const count = printSelection.length;
  return count
    ? `Click 🖨️ (${count}) in the top bar to review and print selected resources.`
    : "Click ⬜ next to a resource to select it for printing.";
}

function togglePrintSelection(id, { rerender = true } = {}){
  const cleanId = String(id || "");
  if(!cleanId) return;
  if(!data.resources.some(resource => String(resource && resource.id || "") === cleanId)) return;
  const set=new Set(printSelection);
  set.has(cleanId)?set.delete(cleanId):set.add(cleanId);
  printSelection=[...set];
  savePrintSelection();
  updatePrintSelectionIndicator();
  if(rerender) safeRender();
}

/* ---------- Print ---------- */

// PrintWorkflow is a small queue-based state machine for print preview/packet flow.
// Each queue entry has a label and render function so print steps stay data-driven.
// The queue currently has one visible step, but keeping this as a queue preserves
// the separation between normal resource cards and list-style flyer output.
const PrintWorkflow = {
  queue: [],
  currentIndex: -1,
  initiatedByButton: false,

  isListResource(res){
    if(!Array.isArray(res?.tags)) return false;
    return res.tags.some(tag => {
      return String(tag || "").trim().toLowerCase() === "list";
    });
  },

  getPrintSelectionGroups(){
    // "List" resources are separated so print selection packet output can render flyers.
    const normalSelections = [];
    const listSelections = [];

    getPrintSelectionResources().forEach(res => {
      if(this.isListResource(res)){
        listSelections.push(res);
      }else{
        normalSelections.push(res);
      }
    });

    return { normalSelections, listSelections };
  },

  buildQueue(){
    const { normalSelections, listSelections } = this.getPrintSelectionGroups();
    if(!normalSelections.length && !listSelections.length) return [];
    if(!listSelections.length){
      return [{
        label:"Print Selection",
        render: () => this.renderPrintSelection(normalSelections)
      }];
    }
    return [{
      label:"Print Selection",
      render: () => this.renderPrintSelectionPacket(normalSelections, listSelections)
    }];
  },

  updateUI(){
    const active = this.queue.length > 0 && this.currentIndex >= 0 && this.currentIndex < this.queue.length;
    const isLastStep = active && this.currentIndex === this.queue.length - 1;
    printCloseBtn.classList.toggle("hidden", active && !isLastStep);
    printActionBtn.classList.toggle("hidden", !active);
    printNextBtn.classList.toggle("hidden", !active || isLastStep);
    if(!active){
      printProgress.textContent = "";
      return;
    }
    printProgress.textContent = "";
  },

  showStep(){
    const step = this.queue[this.currentIndex];
    if(!step || typeof step.render !== "function") return;
    step.render();
  },

  openPreviewContent(render){
    this.updateUI();
    printContent.innerHTML="";
    if(typeof render === "function") render(printContent);
    printModal.classList.remove("hidden");
  },

  openPreview(resources){
    this.openPreviewContent(container => {
      this.renderPrintableResourceCards(container, resources);
    });
  },

  renderPrintableResourceCards(container, resources){
    (Array.isArray(resources) ? resources : []).forEach((res, index)=>{
      if(index > 0){
        const separator = document.createElement("hr");
        separator.className = "print-resource-separator";
        separator.classList.toggle("print-disabled", !isSelectedForPrinting(res.id));
        container.appendChild(separator);
      }
      const card=buildResourceCard(res,{expanded:true});
      card.classList.toggle("print-disabled", !isSelectedForPrinting(res.id));
      const toggle = card.querySelector(".print-selection-toggle");
      if(toggle){
        toggle.onclick = e => {
          e.stopPropagation();
          togglePrintSelection(res.id, { rerender:false });
          this.showStep();
          safeRender();
        };
      }
      container.appendChild(card);
    });
  },

  renderPrintSelection(normalSelections){
    this.openPreview(normalSelections);
  },

  buildListFlyer(resource, shouldPageBreak){
    const flyer = document.createElement("section");
    flyer.className = "print-list-flyer" + (shouldPageBreak ? " print-list-flyer-page-break" : "");
    flyer.classList.toggle("print-disabled", !isSelectedForPrinting(resource.id));

    let html = `<button type="button" class="print-selection-toggle" style="position:static; margin-right:8px;">${getPrintSelectionIcon(resource.id)}</button><h2 style="display:inline;">${escapeHTML(resource.name || "")}</h2>`;
    if(resource.phone) html += `<div class="print-list-field"><strong>Phone:</strong> ${escapeHTML(resource.phone)}</div>`;
    if(resource.address) html += `<div class="print-list-field"><strong>Address:</strong> ${escapeHTML(resource.address)}</div>`;
    if(resource.website) html += `<div class="print-list-field"><strong>Website:</strong> ${escapeHTML(resource.website)}</div>`;
    if(resource.informationText){
      html += `<div class="print-list-field"><strong>Information:</strong><div class="services-rendered resource-info-rendered">${renderInformationHTML(resource.informationText)}</div></div>`;
    }
    flyer.innerHTML = html;
    const toggle = flyer.querySelector(".print-selection-toggle");
    if(toggle){
      toggle.onclick = e => {
        e.stopPropagation();
        togglePrintSelection(resource.id, { rerender:false });
        this.showStep();
        safeRender();
      };
    }
    return flyer;
  },

  renderPrintSelectionPacket(normalSelections, listSelections){
    this.openPreviewContent(container => {
      if(normalSelections.length){
        this.renderPrintableResourceCards(container, normalSelections);
      }

      listSelections.forEach((resource, index) => {
        container.appendChild(this.buildListFlyer(resource, normalSelections.length > 0 || index > 0));
      });
    });
  },

  renderSingleListResource(resourceId){
    const { listSelections } = this.getPrintSelectionGroups();
    const resource = listSelections.find(res => res.id === resourceId);
    if(!resource) return;
    this.openPreview([resource]);
  },

  startPrintSelection(){
    this.queue = this.buildQueue();
    if(!this.queue.length){
      this.openPreviewContent(container => {
        container.innerHTML = "<p>No resources are selected for printing.</p><p class=\"print-empty-instruction\">Click ⬜ next to a resource to include it in the printed handout.</p>";
      });
      return;
    }
    this.currentIndex = 0;
    this.showStep();
  },

  next(){
    if(this.currentIndex >= this.queue.length - 1) return this.close();
    this.currentIndex += 1;
    this.showStep();
  },

  close(){
    this.queue = [];
    this.currentIndex = -1;
    this.updateUI();
    printModal.classList.add("hidden");
  },

  doPrint(){
    this.initiatedByButton = true;
    const disabled = Array.from(printContent.querySelectorAll(".print-disabled"));
    disabled.forEach(el => el.setAttribute("data-print-hidden", "true"));
    window.print();
    clearAllCategoryFilters(false);
  },

  handleAfterPrint(){
    if(!this.initiatedByButton) return;
    this.initiatedByButton = false;
  }
};

function startPrintSelectionPreview(){ PrintWorkflow.startPrintSelection(); }
function nextPrintStep(){ PrintWorkflow.next(); }
function closePrintPreview(){ PrintWorkflow.close(); }
function doPrint(){ PrintWorkflow.doPrint(); }
