<!DOCTYPE html>
<!-- Generated by python3 build-tso-resources. Edit files under src/, tests/, or vendor/. -->
<html>
<head>
<meta charset="UTF-8">
<meta name="tso-storage-id" content="">
<title>&lt;New&gt; TSO Resources</title>

<!-- ===== APP CSS START ===== -->
<style>
{{APP_CSS}}
</style>
<!-- ===== APP CSS END ===== -->
</head>

<body>
<!--
  File orientation:
  1) HTML containers for the app shell, modal panels, and main view roots.
  2) Seed JSON data for first-load fallback.
  3) JavaScript assembled from ordered source modules.
-->

<div id="appErrorBanner" style="display:none; position:fixed; top:0; left:0; right:0; background:#ffd9d9; border-bottom:2px solid #c00; z-index:9999; padding:10px; font-size:16px;">
  <strong>&lt;New&gt; TSO Resources error</strong>
  <pre id="appErrorDetails" style="white-space:pre-wrap;"></pre>
  <button class="button" id="appErrorCopy">Copy</button>
  <button class="button" id="appErrorDismiss">Dismiss</button>
</div>

<div class="topbar">
  <div class="title" id="appTitle">&lt;New&gt; TSO Resources</div>
  <button id="tabCategories" class="categories-button" type="button">Categories</button>
  <div class="tabs">
    <span id="tabPrintSelection" role="button" aria-label="Print Preview">🖨️ (0)</span>
    <button id="helpButton" class="help-button" type="button">Help</button>
    <span id="tabAdmin">Admin</span>
  </div>
</div>

<div id="searchPanel" class="search-panel hidden">
  <input id="searchInput" type="search" placeholder="Search resources">
  <button class="button primary" id="searchButton" type="button">Search</button>
  <button class="button" id="searchCancelButton" type="button">Cancel</button>
</div>

<div id="appView"></div>
<div id="adminView" class="hidden"></div>

{{TEST_UI}}

<div id="printModal" class="hidden">
  <div id="printContentWrapper">
    <button class="button" id="printCloseBtn" onclick="closePrintPreview()">Close</button>
    <button class="button primary" id="printActionBtn" onclick="doPrint()">Print</button>
    <button class="button" id="printNextBtn" onclick="nextPrintStep()">Next</button>
    <div id="printProgress" style="margin:10px 0 12px; font-size:14px; color:#555;"></div>
    <div id="printContent"></div>
  </div>
</div>

<!-- ===== PASTE YOUR SEED DATA BLOCK HERE ===== -->
<script id="seed-data" type="application/json">
{{SEED_DATA}}
</script>

<script id="app-release-data" type="application/json">
{{APP_RELEASE_DATA}}
</script>

<script>
{{VENDOR_JS}}
</script>

<!-- ===== APP JS START ===== -->
<script>
{{APP_JS}}
{{TEST_JS}}
</script>
<!-- ===== APP JS END ===== -->
</body>
</html>
