<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>&lt;New&gt; TSO Resources</title>

<!-- ===== APP CSS START ===== -->
<style>
:root { --page-gutter: clamp(28px, 4vw, 44px); }
body { font-family: -apple-system, sans-serif; margin:0; padding:0; font-size:18px; line-height:1.45; }
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px var(--page-gutter);
  background:#003366;
  color:white;
  position:sticky;
  top:0;
  z-index:50;
}

.topbar .title {
  font-size:20px;
  font-weight:600;
}

.topbar .tabs {
  display:flex;
  gap:24px;
}

.topbar .tabs span,
.topbar .tabs button {
  cursor:pointer;
  opacity:.9;
}

.topbar .tabs span:hover,
.topbar .tabs button:hover {
  opacity:1;
}

.hidden { display:none; }
.search-panel {
  padding:10px var(--page-gutter);
  background:white;
  border-bottom:1px solid #ddd;
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.search-panel.hidden { display:none; }
#appView, #adminView {
  padding-left:var(--page-gutter);
  padding-right:var(--page-gutter);
}
.search-panel input { flex:1; min-width:220px; max-width:520px; box-sizing:border-box; }
.search-results-title { font-weight:bold; margin:0 0 12px; }
.search-result-group { margin:0 0 16px; }
.search-result-group-title { font-weight:bold; margin-bottom:4px; }
.search-result-list { margin:0; padding-left:22px; }
.search-result-item { margin:0 0 6px; }
.search-result-button {

  padding:0;

  color:#003366;
  font:inherit;
  text-align:left;
  cursor:pointer;
}
.search-result-button:hover { text-decoration:underline; }
.search-result-snippet { color:#555; font-size:14px; margin-top:2px; }
.grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); }
.category-card, .resource-card { border:1px solid #ddd; padding:12px; border-radius:6px; background:white; }
.resource-card { position:relative; }
.print-selection-toggle { position:absolute; left:8px; top:8px; cursor:pointer; font-size:18px; border:0; background:transparent; padding:0; line-height:1; }
.resource-main { margin-left:24px; }
.resource-details.collapsed { display:none; }
.button { padding:10px 14px; margin:4px 0; cursor:pointer; }
button,
input,
select,

}
.button.primary { background:#003366; color:white; }
.button.secondary { background:#f7f7f7; color:#333; border:1px solid #bbb; }

.topbar .help-button { color:white; border:0; outline:0; border-radius:4px; background:transparent; padding:2px 8px; font:inherit; }
.topbar .tabs span.admin-flash {

.red-tip { margin:0 0 12px; padding:10px 12px; border:2px solid #aa0000; border-radius:6px; background:#fff5f5; color:#aa0000; font-size:11px; font-weight:bold; }
.category-print-banner { margin:0 0 12px; padding:9px 12px; border:1px solid #c8d6e6; border-left:4px solid #003366; border-radius:6px; background:#f7fbff; color:#1f2d3d; font-size:16px; line-height:1.35; }
.print-empty-instruction { color:#aa0000; }
textarea.big { width:100%; min-height:80px; }
textarea.information-editor { min-height:320px; resize:vertical; }
.information-control-block { margin:10px 0 12px; }
.information-control-header {

}
.information-hint { font-size:16px; color:#555; margin-top:6px; }
.information-preview-toggle { margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.information-control-header .information-preview-toggle { margin-top:0; }
.information-control-header .information-hint { margin-bottom:0; }
.information-preview-toggle .button.primary { box-shadow:0 0 0 2px rgba(0,51,102,0.18); }
.information-preview-box {
  margin-top:8px;
  border:1px solid #ddd;
  border-radius:6px;
  padding:10px;
  background:#fff;
}
.information-rendered ul { margin:6px 0; padding-left:1.15em; }
.information-rendered .information-line { margin:0; }
.information-rendered .information-blank { min-height:1.1em; }
.information-rendered hr { border:0; border-top:1px solid #ccc; margin:10px 0; }
.print-list-flyer {
  border:1px solid #ddd;
  border-radius:6px;
  padding:16px;
  margin:18px 0 0;
  background:#fff;
}
.print-list-flyer h2 { margin:0 0 12px; }
.print-list-field { margin:0 0 10px; }
.print-resource-separator { border:0; border-top:1px solid #aaa; margin:14px 0; }
.admin-panel { display:flex; gap:20px; }
.admin-box { flex:1; border:1px solid #ddd; padding:12px; }
.category-grid { display:grid; gap:6px; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
.verified-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.verified-value { font-weight:600; }
.verified-edit { display:none; margin-top:6px; }
.verified-edit.active { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.resource-browse-wrap { width:min(860px,100%); }
.resource-listbox { width:100%; box-sizing:border-box; }
.resource-button-listbox {
  width:100%;
  height:25em;
  box-sizing:border-box;
  margin-top:8px;
  overflow:auto;
  border:1px solid #999;
  background:#fff;
}
.resource-listbox-option {
  display:block;
  width:100%;
  box-sizing:border-box;
  border:0;
  border-radius:0;
  margin:0;
  padding:1px 4px;
  background:#fff;
  color:#000;
  font:inherit;
  line-height:1.25;
  text-align:left;
}
.resource-listbox-option:hover,
.resource-listbox-option[aria-selected="true"] {
  background:#d0d0d0;
}
.resource-listbox-option:focus {
  outline:2px solid #003366;
  outline-offset:-2px;
}
.resource-browse-actions { margin-top:8px; display:flex; gap:8px; align-items:center; width:100%; }
.resource-browse-actions .spacer { flex:1; }
.admin-panel-title { margin:0 0 4px; }
.admin-toolbar {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:20px;
}
.admin-toolbar-actions {
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.admin-toolbar-help {
  flex:0 0 auto;
}
.admin-toolbar-reference-actions {
  margin-left:auto;
  display:flex;
  gap:8px;
  align-items:center;
  flex:0 0 auto;
}
.admin-mode-bar {
  position:sticky;
  top:49px;
  z-index:19;
  background:#fff;
  border-bottom:1px solid #ddd;
  display:flex;
  gap:8px;
  align-items:center;
  overflow-x:auto;
  white-space:nowrap;
  padding:4px 0;
  margin-bottom:10px;
}
.admin-nav-tabs {
  display:flex;
  gap:8px;
  align-items:center;
  flex:0 0 auto;
}
.admin-mode-bar .button { flex:0 0 auto; }
.admin-sticky-bar {
  position:sticky;
  top:0;
  z-index:20;
  background:#fff;
  border-bottom:1px solid #ddd;
  padding:8px 0;
  margin-bottom:12px;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  overflow-x:auto;
  white-space:nowrap;
}
.admin-sticky-package-actions,
.admin-sticky-reference-actions,
.admin-sticky-editor-actions {
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:nowrap;
}
.admin-sticky-reference-actions { margin-left:auto; justify-content:flex-end; }
.admin-sticky-editor-actions { margin-left:auto; justify-content:flex-end; }
.admin-action-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.admin-option-row { margin:0; }
.admin-option-row + .admin-action-row { margin-top:12px; }
.admin-note { margin:0 0 10px; line-height:1.4; }
.admin-detail-list { margin:8px 0 0 18px; padding:0; }
.admin-detail-list li { margin:4px 0; }
.resource-editor-grid {
  display:grid;
  gap:10px;
  grid-template-columns:repeat(3, minmax(0, 1fr));
}
.resource-editor-grid .span-2 { grid-column:span 2; }
.resource-editor-grid label input,
.resource-editor-grid label textarea { width:100%; box-sizing:border-box; }
.resource-info-guidance { margin:6px 0 10px; }
.resource-info-section { margin-top:8px; }
.resource-info-section-label { display:block; font-weight:bold; margin-bottom:3px; }
.resource-info-section textarea,
.resource-info-additional textarea { width:100%; box-sizing:border-box; overflow:hidden; resize:none; }
.resource-info-additional { margin-top:10px; }
.resource-info-rendered .resource-info-section { margin-top:0; }
.resource-info-rendered .resource-info-section + .resource-info-section,
.resource-info-rendered .resource-info-additional-rendered { margin-top:6px; }
#res_name { text-align:left; width:100%; box-sizing:border-box; }
.admin-guide-active .resource-editor-guide-section { display:none; }
.admin-guide-active .resource-editor-guide-section.admin-guide-current-section { display:block; }
.admin-guide-active .admin-guide-defer-verified { display:none; }
.admin-guide-tip-actions { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.verified-warning { color:#aa0000; font-size:13px; margin-top:4px; min-height:1.1em; }
.reload-resources-wrap { margin-top:16px; text-align:right; }
.reload-resources-wrap .button { font-size:14px; padding:7px 10px; }
.app-toast {
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:10001;
  max-width:360px;
  padding:12px 14px;
  border:1px solid #c8d6e5;
  border-radius:6px;
  background:#f7fbff;
  color:#1f2d3d;
  box-shadow:0 2px 10px rgba(0,0,0,.14);
  font-size:14px;
  line-height:1.35;
  white-space:pre-line;
}
.app-toast.hidden { display:none; }
.app-toast.important {
  max-width:460px;
  border:2px solid #b45309;
  background:#fff7ed;
  color:#7c2d12;
  font-weight:bold;
}
.category-admin-panel { display:block; }
.category-admin-layout { display:grid; grid-template-columns:minmax(260px, 360px) minmax(0, 1fr); gap:20px; align-items:start; }
.category-editor-layout { display:grid; grid-template-columns:minmax(0, 1fr) minmax(0, 1fr); gap:20px; align-items:start; }
.category-filter-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.category-filter-row input[type="text"] { flex:1; min-width:0; }
.resource-category-option { margin:0 0 8px; }
.resource-category-filter-list { margin:4px 0 8px 28px; }
.resource-category-filter-list label { display:block; margin:2px 0; }
.editor-sticky-bar { position:sticky; bottom:0; background:#fff; border-top:1px solid #ddd; padding:10px 0 0; margin-top:12px; display:flex; gap:8px; justify-content:flex-end; z-index:5; }
.for-group-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.for-group-row.selected { background:#eef4ff; outline:2px solid #99b8e8; outline-offset:2px; }
.for-group-row input[type="text"] { flex:1; min-width:0; }

.reference-modal {
  position:fixed;
  inset:0;
  z-index:10002;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
  box-sizing:border-box;
  background:rgba(0,0,0,.45);
}
.reference-modal.hidden { display:none; }
.reference-modal-panel {
  width:min(720px,100%);
  max-height:min(82vh,720px);
  display:flex;
  flex-direction:column;
  background:white;
  border:1px solid #c8d6e5;
  border-radius:6px;
  box-shadow:0 8px 28px rgba(0,0,0,.22);
}
.reference-modal-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  padding:16px 18px;
  border-bottom:1px solid #dde6ef;
}
.reference-modal-title { font-size:20px; font-weight:bold; }
.reference-modal-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
.reference-modal-subtitle { margin-top:2px; color:#555; }
.reference-modal-body {
  padding:16px 18px 18px;
  overflow:auto;
}
.reference-group { margin-top:14px; }
.reference-group:first-child { margin-top:0; }
.reference-group-title { font-weight:bold; margin-bottom:6px; }
.reference-list { margin:0; padding-left:22px; }
.reference-match { margin-bottom:10px; }
.reference-match:last-child { margin-bottom:0; }
.reference-match-name { font-weight:bold; }
.reference-match-categories { color:#555; font-size:14px; }
.reference-match-snippet { margin-top:3px; color:#333; font-size:14px; }
.reference-empty { margin:0; color:#555; }
.admin-help-content .admin-help-setup {
  margin:0 0 14px;
  padding:12px 14px;
  border:1px solid #c8d6e5;
  border-left:4px solid #003366;
  border-radius:6px;
  background:#f7fbff;
}
.admin-help-content h3 { margin:0 0 8px; }
.admin-help-content details {
  border:1px solid #dde6ef;
  border-radius:6px;
  margin-top:8px;
  background:#fff;
}
.admin-help-content summary {
  cursor:pointer;
  font-weight:bold;
  padding:10px 12px;
}
.admin-help-content .admin-help-section-body {
  border-top:1px solid #dde6ef;
  padding:10px 12px 12px;
}
.admin-help-content p { margin:0 0 10px; }
.admin-help-content p:last-child { margin-bottom:0; }
.admin-help-content ol,
.admin-help-content ul { margin:8px 0 0 22px; padding:0; }
.admin-help-content li { margin:4px 0; }
.admin-setup-panel label { display:block; font-weight:bold; margin-bottom:10px; }
.admin-setup-panel input { width:100%; box-sizing:border-box; margin-top:4px; }
.admin-setup-note { color:#555; font-size:16px; margin:6px 0 12px; }
.admin-setup-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:12px; }
.setup-mockup {
  border:1px solid #dde6ef;
  border-radius:6px;
  padding:12px;
  margin-top:10px;
  background:#fafcff;
}
.setup-mockup-grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin-bottom:10px;
}
.setup-mockup-category,
.setup-mockup-resource {
  border:1px solid #c8d6e5;
  border-radius:6px;
  background:white;
  padding:8px 10px;
}
.setup-mockup-category { font-weight:bold; color:#003366; text-align:center; }
.setup-mockup-resource strong { display:block; margin-bottom:4px; }

/* Print modal */
#printModal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  justify-content:center;
  align-items:center;
}
#printModal.hidden { display:none; }
#printContentWrapper {
  background:white;
  padding:20px;
  max-height:90%;
  overflow:auto;
  width:800px;
}
@media print {
  @page {
    margin: 0.75in;
  }

  body {
    background: white;
  }

  body > *:not(#printModal):not(#referenceModal) {
    display: none !important;
  }

  #printModal {
    position: static;
    inset: auto;
    background: transparent;
    display: block;
  }

  #printContentWrapper {
    position: static;
    left: auto;
    top: auto;
    width: auto;
    max-height: none;
    overflow: visible;
    padding: 0;
    margin: 0;
    background: transparent;
    font-size: 11pt;
    line-height: 1.3;
  }

  #printContentWrapper button {
    display: none !important;
  }

  #referenceModal {
    position: static;
    inset: auto;
    display: block;
    padding: 0;
    background: transparent;
  }

  #referenceModal.hidden {
    display: none !important;
  }

  .reference-modal-panel {
    width: auto;
    max-height: none;
    display: block;
    border: none;
    border-radius: 0;
    box-shadow: none;
    background: transparent;
  }

  .reference-modal-header {
    padding: 0 0 12pt;
    margin-bottom: 12pt;
    border-bottom: 1px solid #aaa;
  }

  .reference-modal-title {
    font-size: 16pt;
  }

  .reference-modal-body {
    padding: 0;
    overflow: visible;
    font-size: 11pt;
    line-height: 1.35;
  }

  .reference-modal-close {
    display: none !important;
  }

  .reference-modal-actions {
    display: none !important;
  }

  .admin-help-setup {
    display: none !important;
  }

  .resource-card {
    border: none;
    padding: 0;
    margin-bottom: 11pt;
    break-inside: avoid;
    page-break-inside: avoid;
    background: transparent;
  }

  .resource-card ul {
    margin-top: 4pt;
    margin-bottom: 4pt;
    padding-left: 14pt;
  }

  .print-resource-separator {
    border: 0;
    border-top: 1px solid #999;
    margin: 10pt 0;
  }

  .print-list-flyer {
    border: none;
    border-radius: 0;
    padding: 0;
    margin: 0;
    background: transparent;
  }

  .print-list-flyer-page-break {
    break-before: page;
    page-break-before: always;
  }

  .print-disabled {
    display: none !important;
  }
}
</style>
<!-- ===== APP CSS END ===== -->
</head>

<body>
<!--
  File orientation:
  1) HTML containers for the app shell, modal panels, and main view roots.
  2) Embedded seed JSON data for first-load fallback.
  3) JavaScript logic organized by section banners.
-->

<div id="appErrorBanner" style="display:none; position:fixed; top:0; left:0; right:0; background:#ffd9d9; border-bottom:2px solid #c00; z-index:9999; padding:10px; font-size:16px;">
  <strong>&lt;New&gt; TSO Resources error</strong>
  <pre id="appErrorDetails" style="white-space:pre-wrap;"></pre>
  <button class="button" id="appErrorCopy">Copy</button>
  <button class="button" id="appErrorDismiss">Dismiss</button>
</div>

<div class="topbar">
  <div class="title" id="appTitle">&lt;New&gt; TSO Resources</div>
  <div class="tabs">
    <span id="tabSearch" role="button" aria-label="Search" title="Search">&#128269;</span>
    <span id="tabCategories">Categories</span>
    <span id="tabPrintSelection" role="button" aria-label="Print Preview">🖨️ (0)</span>
    <button id="helpButton" class="help-button" type="button">Help</button>
    <span id="tabAdmin">Admin</span>
  </div>
</div>

<div id="searchPanel" class="search-panel hidden">
  <input id="searchInput" type="search" placeholder="Search resources">
  <button class="button primary" id="searchButton" type="button">Search</button>
  <button class="button" id="searchCancelButton" type="button">Cancel</button>
</div>

<div id="appView"></div>
<div id="adminView" class="hidden"></div>

<div id="selfTestPanel" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#f5f5f5; border-top:2px solid #888; padding:10px; font-size:14px; max-height:250px; overflow:auto;">
  <strong>TSO Self Tests</strong>
  <div id="selfTestResults"></div>
  <button class="button" id="selfTestClose">Close</button>
</div>

<div id="printModal" class="hidden">
  <div id="printContentWrapper">
    <button class="button" id="printCloseBtn" onclick="closePrintPreview()">Close</button>
    <button class="button primary" id="printActionBtn" onclick="doPrint()">Print</button>
    <button class="button" id="printNextBtn" onclick="nextPrintStep()">Next</button>
    <div id="printProgress" style="margin:10px 0 12px; font-size:14px; color:#555;"></div>
    <div id="printContent"></div>
  </div>
</div>

// ============================================================
// DATA NORMALIZATION

function normalizeResourceInformation(r){
  if(!r || typeof r !== "object") return false;
  if(typeof r.informationText !== "string") r.informationText = "";
  return false;
}

function normalizeResourceVerifiedOn(r){
  // Canonical: verifiedOn in MM/YY (or null). Legacy aliases are consumed then removed.
  if(!r || typeof r !== "object") return;
  const preferred = coerceVerifiedOnToMMYY(r.verifiedOn);
  if(preferred){
    r.verifiedOn = preferred;
  }else{
    const legacyReviewed = coerceVerifiedOnToMMYY(r.reviewedOn);
    const legacyVerifiedDate = coerceVerifiedOnToMMYY(r.verifiedDate);
    r.verifiedOn = legacyReviewed || legacyVerifiedDate || null;
  }
  if("reviewedOn" in r) delete r.reviewedOn;
  if("verifiedDate" in r) delete r.verifiedDate;
}

function normalizeDataInformationShape(data){
  if(!data.resources) return;
  data.resources.forEach(normalizeResourceInformation);
}

function normalizeDataVerifiedOnShape(nextData){
  if(!nextData || !Array.isArray(nextData.resources)) return;
  nextData.resources.forEach(normalizeResourceVerifiedOn);
}

function applyDefaultCategoryPreset(nextData){
  if(!nextData || typeof nextData !== "object") return false;
  if(nextData.categoryPresetVersion === 1) return false;
  nextData.categoryPresetVersion = 1;
  return true;
}

function formatMMYYFromDate(d){
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${yy}`;
}

function formatDateOnly(isoString){
  if(!isoString) return "(none)";
  const date = new Date(isoString);
  if(Number.isNaN(date.getTime())) return String(isoString);
  return date.toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" });
}

function formatDateTimeUTC(isoString){
  if(!isoString) return "(none)";
  const date = new Date(isoString);
  if(Number.isNaN(date.getTime())) return String(isoString);
  const month = date.toLocaleString(undefined, { month:"long", timeZone:"UTC" });
  const day = date.getUTCDate();
  const year = date.getUTCFullYear();
  const hour = date.getUTCHours();
  const minute = String(date.getUTCMinutes()).padStart(2, "0");
  return `${month} ${day}, ${year}, ${hour}:${minute} UTC`;
}

function parseMMYYToMonthIndex(mmyy){
  const match = String(mmyy || "").trim().match(/^(0[1-9]|1[0-2])\/(\d{2})$/);
  if(!match) return null;
  const month = Number(match[1]);
  const yy = Number(match[2]);
  const year = 2000 + yy;
  return year * 12 + (month - 1);
}

function isValidMMYY(value){
  return parseMMYYToMonthIndex(value) !== null;
}

function formatVerifiedOnForDisplay(verifiedOn){
  return isValidMMYY(verifiedOn) ? String(verifiedOn).trim() : "----";
}

function parseLegacyVerifiedOnToMMYY(raw){
  const text = String(raw || "").trim();
  if(!text) return null;

  const mmyy = text.match(/^(\d{1,2})[\/\-](\d{2})$/);
  if(mmyy){
    const month = Number(mmyy[1]);
    const yy = Number(mmyy[2]);
    if(month >= 1 && month <= 12) return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
  }

  const withYear = text.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2}|\d{4})$/);
  if(withYear){
    const month = Number(withYear[1]);
    const yearRaw = withYear[3];
    if(month >= 1 && month <= 12){
      const yy = yearRaw.length === 4 ? Number(yearRaw.slice(-2)) : Number(yearRaw);
      return `${String(month).padStart(2,"0")}/${String(yy).padStart(2,"0")}`;
    }
  }

  const compact = text.match(/^(\d{2})(\d{2})(\d{2})$/);
  if(compact){
    const month = Number(compact[1]);
    const yy = Number(compact[3]);
    if(month >= 1 && month <= 12) return `${compact[1]}/${String(yy).padStart(2,"0")}`;
  }

  if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
    const isoDate = new Date(`${text}T00:00:00`);
    if(!Number.isNaN(isoDate.getTime())) return formatMMYYFromDate(isoDate);
  }

  const parsed = new Date(text);
  if(!Number.isNaN(parsed.getTime())) return formatMMYYFromDate(parsed);
  return null;
}

function coerceVerifiedOnToMMYY(value){
  if(value == null) return null;
  const text = String(value).trim();
  if(!text) return null;
  if(isValidMMYY(text)) return text;
  const parsed = parseLegacyVerifiedOnToMMYY(text);
  return parsed && isValidMMYY(parsed) ? parsed : null;
}

function validateVerifiedOnInput(value){
  const text = String(value || "").trim();
  if(!text) return { valid:true, normalized:null, message:"" };
  if(!isValidMMYY(text)){
    return { valid:false, normalized:null, message:"Use MM/YY (MM 01-12)." };
  }
  return { valid:true, normalized:text, message:"" };
}

function compareResourcesByName(a, b){
  return String((a && a.name) || "").localeCompare(String((b && b.name) || ""), undefined, { sensitivity:"base" });
}

function getAdminResourceBrowseList(){
  const resources = data.resources.slice();
  if(!adminShowVerifiedDates){
    return resources.sort(compareResourcesByName);
  }
  return resources.sort((a, b) => {
    const aMonth = parseMMYYToMonthIndex(a.verifiedOn);
    const bMonth = parseMMYYToMonthIndex(b.verifiedOn);
    const aVerified = aMonth !== null;
    const bVerified = bMonth !== null;
    if(aVerified !== bVerified) return aVerified ? -1 : 1;
    if(aVerified && bVerified && aMonth !== bMonth) return aMonth - bMonth;
    return compareResourcesByName(a, b);
  });
}

function canonicalizeTaxonomyLabel(label){

}

function normalizeTaxonomyLabels(labels){
  const normalized = [];
  const seen = new Set();
  const source = Array.isArray(labels)
    ? labels
    : (typeof labels === "string" ? labels.split(/[,\n]/) : []);

  source.forEach(rawLabel => {
    if(typeof rawLabel !== "string" && typeof rawLabel !== "number") return;
    const label = canonicalizeTaxonomyLabel(rawLabel);
    if(!label) return;
    const key = label.toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    normalized.push(label);
  });
  return normalized;
}

function normalizeLegacyTagsShape(nextData){

const INFORMATION_ADDITIONAL_LABEL = "Additional text:";

// Resource Information is stored as plain text. Strip the old editor heading
// when a resource still has it so the saved text remains plain.
function trimOuterBlankLines(lines){
  const next = lines.slice();
  while(next.length && next[0].trim() === "") next.shift();
  while(next.length && next[next.length - 1].trim() === "") next.pop();
  return next;
}

function parseInformationText(text){
  const lines = String(text || "").replace(/\r\n?/g, "\n").split("\n");
  const stripped = lines.filter(line => line.trim() !== INFORMATION_ADDITIONAL_LABEL);
  return { additional:trimOuterBlankLines(stripped).join("\n") };
}

function composeInformationText(draft){
  return String(draft && draft.additional || "").trim();
}

function applyInformationMarkup(escapedText){
  return escapedText
    .replace(/__\*\*([^_\n][\s\S]*?)\*\*__/g, "<strong><u>$1</u></strong>")
    .replace(/\*\*__([^*\n][\s\S]*?)__\*\*/g, "<strong><u>$1</u></strong>")
    .replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>")
    .replace(/__([^_\n]+?)__/g, "<u>$1</u>");
}

function renderInformationMarkupHTML(text){
  const normalized = String(text || "").replace(/\r\n?/g, "\n");
  const lines = normalized.split("\n");
  const out = [];
  let listItems = [];

  function flushList(){
    if(!listItems.length) return;
    out.push(`<ul>${listItems.join("")}</ul>`);
    listItems = [];
  }

  lines.forEach(line => {
    const trimmed = line.trim();
    const isDivider = trimmed === "---";
    const bulletMatch = line.match(/^\s*(?:\*|-|•)\s+(.*)$/);

    if(isDivider){
      flushList();
      out.push("<hr>");
      return;
    }

    if(bulletMatch){
      const bulletText = applyInformationMarkup(escapeHTML(bulletMatch[1]));
      listItems.push(`<li>${bulletText}</li>`);
      return;
    }

    flushList();
    if(line === ""){
      out.push('<div class="information-line information-blank">&nbsp;</div>');
      return;
    }
    out.push(`<div class="information-line">${applyInformationMarkup(escapeHTML(line))}</div>`);
  });

  flushList();
  return out.join("");
}

function renderInformationHTML(text){
  return renderInformationMarkupHTML(composeInformationText(parseInformationText(text)));
}

function assertInvariants(context = "invariant check"){

    const id = String(resource && resource.id || "");

    if(ids.has(id)) throw new Error(`${context}: duplicate resource id '${id}'`);
    ids.add(id);

    if(!Array.isArray(resource.forGroups)) throw new Error(`${context}: resource '${id}' forGroups must be an array`);

      const key = group.toLowerCase();
      if(resourceForGroupKeys.has(key)){
        throw new Error(`${context}: resource '${id}' has duplicate For group '${group}'`);
      }
      resourceForGroupKeys.add(key);
    });

    if(resource.verifiedOn != null && !isValidMMYY(resource.verifiedOn)){
      throw new Error(`${context}: resource '${id}' verifiedOn must be MM/YY or null`);
    }
  });

  const resourceIds = new Set(data.resources.map(r => String(r && r.id || "")));
  const badPrintSelection = printSelection.find(id => !resourceIds.has(String(id || "")));
  if(badPrintSelection) throw new Error(`${context}: print selection '${badPrintSelection}' does not reference a valid resource`);
}

function safeRender(label = "render"){
  return safeCall(label, () => {
    if(DEBUG) assertInvariants(`${label} pre`);
    const result = render();
    if(DEBUG) assertInvariants(`${label} post`);
    return result;
  });
}

function safeRenderAdmin(label = "renderAdmin"){
  return safeCall(label, () => {
    if(DEBUG) assertInvariants(`${label} pre`);
    const result = renderAdmin();
    if(DEBUG) assertInvariants(`${label} post`);
    return result;
  });
}

// SELF TESTS
// ============================================================
// In-browser smoke tests for high-risk flows (create/delete/undo/For groups/
// information/import/export/sorting). Run with Ctrl+Shift+T while the page is
// open; use ?debug when you also want invariant checks before/after rendering.
// Tests temporarily replace global state and then restore it, so each test must
// save every global it mutates in a finally block.

function runSelfTests(){
  const tests = [];

  tests.push({
    name: "CHANGE LOG NORMALIZATION",
    fn: () => {
      const sample = {};
      normalizeChanges(sample);
      if(!Array.isArray(sample.changes)) throw new Error("changes should normalize to array");
    }
  });

  tests.push({
    name: "PACKAGE VERSION FALLBACK",
    fn: () => {
      if(normalizePackageVersionValue(undefined) !== "Unknown") throw new Error("missing packageVersion should fallback");
      if(normalizePackageVersionValue("") !== "Unknown") throw new Error("blank packageVersion should fallback");
      if(normalizePackageVersionValue(12) !== 12) throw new Error("numeric packageVersion should be preserved");
      if(normalizePackageVersionValue("13") !== 13) throw new Error("string numeric packageVersion should normalize to number");
    }
  });

  tests.push({
    name: "FRESH START CLEARS SAVED APP STATE",
    fn: () => {
      if(document.getElementById("freshStartButton")){
        throw new Error("Fresh Start should be a keyboard shortcut, not a button");
      }
      if(typeof requestFreshStart !== "function"){
        throw new Error("Fresh Start shortcut handler is missing");
      }
      requestFreshStart();
      const prompt = document.getElementById("referenceModal");
      if(!prompt || prompt.classList.contains("hidden")){
        throw new Error("Fresh Start should use an in-app confirmation prompt");
      }
      if(!/Clear localStorage data and reload from a fresh start\?/.test(prompt.textContent || "")){
        throw new Error("Fresh Start prompt wording changed");
      }
      if(!document.getElementById("freshStartYesButton") || !document.getElementById("freshStartNoButton")){
        throw new Error("Fresh Start prompt should include Yes and No buttons");
      }
      document.getElementById("freshStartNoButton").click();
      const previousValues = FRESH_START_STORAGE_KEYS.map(key => [key, localStorage.getItem(key)]);
      const previousSessionValue = sessionStorage.getItem("newSelfTestSessionValue");
      try{
        FRESH_START_STORAGE_KEYS.forEach(key => localStorage.setItem(key, "self-test"));
        sessionStorage.setItem("newSelfTestSessionValue", "self-test");
        runFreshStart();
        const unclearedKey = FRESH_START_STORAGE_KEYS.find(key => localStorage.getItem(key) !== null);
        if(unclearedKey) throw new Error(`fresh start did not clear ${unclearedKey}`);
        if(sessionStorage.getItem("newSelfTestSessionValue") !== null){
          throw new Error("fresh start did not clear sessionStorage");
        }
      }finally{
        previousValues.forEach(([key, value]) => {
          if(value === null) localStorage.removeItem(key);
          else localStorage.setItem(key, value);
        });
        if(previousSessionValue === null) sessionStorage.removeItem("newSelfTestSessionValue");
        else sessionStorage.setItem("newSelfTestSessionValue", previousSessionValue);

  });

// ============================================================
// RENDERING — GENERAL
// ============================================================
// Rendering is state-driven. Event handlers mutate the small set of runtime
// state variables above, then call safeRender() or safeRenderAdmin(). The main
// render() function below clears and rebuilds the active view from scratch.

function setView(nextView){
  if(nextView === "admin" && !isAdminVisible) return;
  if(view === "admin" && nextView !== "admin"){
    if(!commitPendingEditsIfChanged()) return;
  }
  if(nextView !== "category") expandedSearchResourceId = "";
  view = nextView;
  safeRender();
}

function setAdminVisibility(visible){
  const nextVisible = !!visible;
  if(!nextVisible && view === "admin"){
    setView("categories");
    if(view === "admin") return;
  }
  isAdminVisible = nextVisible;
  if(isAdminVisible && adminGuideMode && !adminGuideDismissed){
    adminGuideMode = true;
    if(adminGuidePhase === "createResource"){
      adminGuideStep = "categoryFilters";
    }else if(adminGuidePhase === "renameFile"){
      adminGuideStep = "renameFile";
    }else if(adminGuidePhase === "setupName"){
      adminGuideStep = "setupName";
    }
  }
  tabAdmin.style.display = isAdminVisible ? "" : "none";
  if(!isAdminVisible){
    const adminSection = document.getElementById("adminView");
    if(adminSection) adminSection.classList.add("hidden");
  }
}

function flashAdminButton(){
  if(!tabAdmin) return;
  tabAdmin.classList.remove("admin-flash");
  void tabAdmin.offsetWidth;
  tabAdmin.classList.add("admin-flash");
  setTimeout(() => {
    tabAdmin.classList.remove("admin-flash");
  }, 900);
}

function requestFreshStart(){
  showFreshStartPrompt();
}

function reloadFromFreshStart(){
  const nextParams = new URLSearchParams(location.search);
  nextParams.set("fresh", Date.now().toString());
  location.replace(buildUrlWithParams(nextParams));
}

function showFreshStartPrompt(){
  const modal = getReferenceModal();
  modal.innerHTML = `
    <div class="reference-modal-panel" role="dialog" aria-modal="true" aria-labelledby="freshStartTitle">
      <div class="reference-modal-header">
        <div id="freshStartTitle" class="reference-modal-title">Clear localStorage data and reload from a fresh start?</div>
        <div class="reference-modal-actions">
          <button class="button danger" type="button" id="freshStartYesButton">Yes</button>
          <button class="button" type="button" id="freshStartNoButton">No</button>
        </div>
      </div>
    </div>
  `;
  const yesBtn = document.getElementById("freshStartYesButton");
  const noBtn = document.getElementById("freshStartNoButton");
  if(yesBtn) yesBtn.addEventListener("click", reloadFromFreshStart);
  if(noBtn) noBtn.addEventListener("click", closeReferenceModal);
  modal.classList.remove("hidden");
  if(noBtn) noBtn.focus();
}

function syncSearchPanel(){
  const panel = document.getElementById("searchPanel");
  const input = document.getElementById("searchInput");
  if(!panel) return;
  panel.classList.toggle("hidden", !isSearchOpen);
  if(input && isSearchOpen && document.activeElement !== input){
    input.value = searchQuery;
  }
}

function closeSearchPanel(){
  isSearchOpen = false;
  syncSearchPanel();
}

function toggleSearchPanel(){
  isSearchOpen = !isSearchOpen;
  syncSearchPanel();
  if(isSearchOpen){
    window.setTimeout(() => {
      const input = document.getElementById("searchInput");
      if(input){
        input.focus();
        input.select();
      }
    }, 0);
  }
}

function performSearch(query){
  if(view === "admin" && !commitPendingEditsIfChanged()) return;
  searchQuery = String(query || "").trim();
  searchResults = buildSearchResults(searchQuery);
  expandedSearchResourceId = "";
  view = "search-results";
  safeRender();
}

if(searchButton){

    const input = document.getElementById("searchInput");

function getTsoNameFromHtmlFileName(fileName){
  return String(fileName || "")
    .replace(/\.html?$/i, "")
    .split(/[-_\s]+/)
    .filter(Boolean)
    .map(part => part.charAt(0).toUpperCase() + part.slice(1))
    .join(" ");
}

function getTsoName(){
  const storedName = String(localStorage.getItem(TSO_NAME_STORAGE_KEY) || "").trim();
  if(storedName) return storedName;
  if(isNewTemplateFile()) return "";
  return getTsoNameFromHtmlFileName(getCurrentHtmlFileName());
}

function slugifyFileStem(value, fallback){
  const cleaned = String(value || "")
    .toLowerCase()
    .replace(/&/g, " and ")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
  return cleaned || fallback;
}

function getTsoFileName(){
  const fallback = "new-name";
  const name = getTsoName() || fallback;
  return `${slugifyFileStem(name, fallback)}.html`;
}

function getResourcePackageFilename(){
  const baseName = getTsoName() || (isNewTemplateFile() ? "tso" : getTsoNameFromHtmlFileName(getCurrentHtmlFileName()));
  const stem = slugifyFileStem(baseName, "tso");
  return stem === "tso" ? DEFAULT_RESOURCE_PACKAGE_FILENAME : `${stem}-resources.json`;
}

function getAppTitleText(){
  const tsoName = getTsoName();
  return `${tsoName || "<New>"} TSO Resources`;
}

function refreshAppTitle(){
  const titleText = getAppTitleText();
  document.title = titleText;
  if(appTitle) appTitle.textContent = titleText;
}

function startAdminGuide(step = "resources"){

  adminGuideStep = step;
  adminGuideDismissed = false;
  localStorage.removeItem(ADMIN_GUIDE_DISABLED_STORAGE_KEY);
  if(step === "resourceFields") adminGuideResourceSection = "basics";
}

function completeAdminGuide(){
  adminGuideMode = false;
  adminGuideStep = getFirstAdminGuideStep();
  adminGuideResourceSection = "basics";
  adminGuideDismissed = true;
  adminGuideCompleted = true;
  adminGuidePracticeResourceId = "";
  localStorage.setItem(ADMIN_GUIDE_DISABLED_STORAGE_KEY, "1");

function stopAdminGuide(){
  adminGuideMode = false;
  adminGuideStep = getFirstAdminGuideStep();
  adminGuideResourceSection = "basics";

function getContextualAdminGuideStep(){
  if(view === "admin"){

    if(adminTab === "resources"){
      return adminResourceEditMode ? "resourceFields" : "newResource";
    }

  return getFirstAdminGuideStep();
}

function prepareAdminGuideForStep(step){
  if(step === "categoryFilters"){
    adminTab = "categories";
    adminResourceEditMode = false;
  }else if(step === "newResource" || step === "deleteResource"){
    adminTab = "resources";
    adminResourceEditMode = false;
  }else if(step === "forGroupsAdmin"){
    adminTab = "forGroups";
    adminResourceEditMode = false;

function getAdminGuideTipText(){
  if(!adminGuideMode) return "";
  if(adminGuideStep === "setupName") return TIP_TEXT.adminGuideSetupName;
  if(adminGuideStep === "verifyName") return TIP_TEXT.adminGuideVerifyName;
  if(adminGuideStep === "renameFile") return TIP_TEXT.adminGuideRenameFile;
  if(adminGuideStep === "categoryFilters") return TIP_TEXT.adminGuideCategoryFilters;
  if(adminGuideStep === "deleteResource") return TIP_TEXT.adminGuideDeleteResource;
  if(adminGuideStep === "forGroupsAdmin") return TIP_TEXT.adminGuideForAdmin;
  if(adminGuideStep === "resourceFields" || adminResourceEditMode){
    if(adminGuideResourceSection === "forGroups") return TIP_TEXT.adminGuideForGroups;
    if(adminGuideResourceSection === "categories") return TIP_TEXT.adminGuideCategories;
    if(adminGuideResourceSection === "information") return TIP_TEXT.adminGuideInformation;
    if(adminGuideResourceSection === "save") return TIP_TEXT.adminGuideSaveResource;
    if(adminGuideResourceSection === "update") return TIP_TEXT.adminGuideUpdate;
    return TIP_TEXT.adminGuideResourceFields;
  }
  if(adminGuideStep === "newResource" || adminTab === "resources") return TIP_TEXT.adminGuideNewResource;
  return TIP_TEXT.adminGuideResources;
}

function getAdminGuideResourceSections(){
  return ["basics", "forGroups", "categories", "information", "update"];
}

function saveGuidedResourceEditorProgress(){
  // The guide advances through the Resource editor one section at a time, but the
  // editor itself is one form. Save each section into the resource draft before
  // moving forward so going Back/Next never loses typed practice data.
  if(!(editing && editing.kind === "resource")) return true;
  const draft = resourceEditorDraft();
  if(!draft) return true;
  const validation = validateResourceName(draft, editing.idx);
  showResourceNameWarning(validation.message);
  if(!validation.valid){
    const nameInput = document.getElementById("res_name");
    if(nameInput) nameInput.focus();
    return false;
  }
  applyResourceDraft(editing.idx, draft);
  editorSnapshot = snapshotResourceEditor();
  return true;
}

function advanceAdminGuideResourceSection(){
  const sections = getAdminGuideResourceSections();
  const index = sections.indexOf(adminGuideResourceSection);
  if(index === -1 || index >= sections.length - 1) return;
  if(!saveGuidedResourceEditorProgress()) return;
  adminGuideResourceSection = sections[index + 1];
  safeRenderAdmin();
}

function retreatAdminGuideResourceSection(){
  const sections = getAdminGuideResourceSections();
  const index = sections.indexOf(adminGuideResourceSection);
  if(index <= 0) return;
  if(!saveGuidedResourceEditorProgress()) return;
  adminGuideResourceSection = sections[index - 1];
  safeRenderAdmin();
}

function isAdminGuideResourceFirstSection(){
  const sections = getAdminGuideResourceSections();
  return adminGuideResourceSection === sections[0];
}

function isAdminGuideResourceLastSection(){
  const sections = getAdminGuideResourceSections();
  return adminGuideResourceSection === sections[sections.length - 1];
}

function shouldDisableResourceEditorExit(){
  return adminGuideMode
    && adminGuideStep === "resourceFields"
    && adminResourceEditMode
    && adminGuideResourceSection !== "update";
}

function shouldForceEnableResourceEditorExit(){
  return adminGuideMode
    && adminGuideStep === "resourceFields"
    && adminResourceEditMode
    && (adminGuideResourceSection === "update" || adminGuideResourceSection === "save");
}

function renderAdminGuideTip(container){
  const tipText = formatGuideTipText(getAdminGuideTipText());
  if(!tipText) return;
  const tip = document.createElement("div");
  tip.className = "red-tip admin-guide-tip";
  const tipMessage = document.createElement("div");
  tipMessage.className = "admin-guide-tip-message";
  tipMessage.textContent = tipText;
  tip.appendChild(tipMessage);
  if(adminGuideStep === "renameFile"){
    const actions = document.createElement("div");
    actions.className = "admin-guide-tip-actions";
    const backBtn = document.createElement("button");
    backBtn.className = "button";
    backBtn.type = "button";
    backBtn.textContent = "Back";
    backBtn.onclick = () => {
      setAdminGuidePhase("setupName");
      setAdminGuideStep("verifyName");
    };
    actions.appendChild(backBtn);
    const quitBtn = document.createElement("button");
    quitBtn.className = "button primary";
    quitBtn.type = "button";
    quitBtn.textContent = "Quit";
    quitBtn.onclick = quitForRename;
    actions.appendChild(quitBtn);
    tip.appendChild(actions);
  }else if(adminResourceEditMode && adminGuideResourceSection !== "save" && (!isAdminGuideResourceFirstSection() || !isAdminGuideResourceLastSection())){
    const actions = document.createElement("div");
    actions.className = "admin-guide-tip-actions";
    if(!isAdminGuideResourceFirstSection()){
      const backBtn = document.createElement("button");
      backBtn.className = "button";
      backBtn.type = "button";
      backBtn.textContent = "Back";
      backBtn.onclick = retreatAdminGuideResourceSection;
      actions.appendChild(backBtn);
    }
    if(!isAdminGuideResourceLastSection()){
      const nextBtn = document.createElement("button");
      nextBtn.className = "button";
      nextBtn.type = "button";
      nextBtn.textContent = "Next";
      nextBtn.onclick = advanceAdminGuideResourceSection;
      actions.appendChild(nextBtn);
    }
    tip.appendChild(actions);
  }
  const firstPanel = container.querySelector(".admin-panel");
  if(firstPanel){
    container.insertBefore(tip, firstPanel);
  }else{
    container.appendChild(tip);
  }
}

  const details = Array.from(modal.querySelectorAll(".admin-help-content details"));

  details.forEach(detail => { detail.open = true; });
  window.setTimeout(() => window.print(), 0);

  if(!adminHelpPrintRestoreState) return;
  const modal = document.getElementById("referenceModal");
  const details = modal ? Array.from(modal.querySelectorAll(".admin-help-content details")) : [];
  details.forEach((detail, index) => {
    detail.open = !!adminHelpPrintRestoreState[index];

  adminHelpPrintRestoreState = null;

function getUnseenUpdates(){
  const seen = getSeenUpdateIds();
  return getRecentChanges().filter(entry => !seen.has(String(entry.id)));
}

function getCategoryUpdateMap(){
  const map = new Map();
  getUnseenUpdates().forEach(entry => {
    getCategoryIdsForChange(entry).forEach(catId => {
      if(!map.has(catId)) map.set(catId, []);
      map.get(catId).push(entry);
    });
  });
  return map;
}

function buildResourceCard(res,{expanded=false,showDescription=false,showPrintToggle=true}={}){

  normalizeResourceInformation(res);

  const card=document.createElement("div");

    toggle.type = "button";
    toggle.className="print-selection-toggle";
    toggle.setAttribute("aria-label", isSelectedForPrinting(res.id) ? "Disable printing for this resource" : "Enable printing for this resource");
    toggle.textContent=getPrintSelectionIcon(res.id);
    toggle.onclick=e=>{e.stopPropagation(); togglePrintSelection(res.id);};
    card.appendChild(toggle);
  }

  const main=document.createElement("div");
  main.className="resource-main";
  main.innerHTML=`<strong>${res.name}</strong>`;
  if(showDescription && res.description) main.innerHTML+=`<div>${escapeHTML(res.description)}</div>`;

  const details=document.createElement("div");
  details.className="resource-details "+(expanded?"expanded":"collapsed");

  let html="";
  const websiteURL = normalizeWebsiteURL(res.website);
  if(res.phone) html+=`<div><strong>Phone:</strong> <a href="tel:${res.phone}">${res.phone}</a></div>`;
  if(res.address) html+=`<div><strong>Address:</strong> ${escapeHTML(res.address)}</div>`;
  if(websiteURL) html+=`<div><strong>Website:</strong> <a href="${websiteURL}" target="_blank">${res.website}</a></div>`;
  if(res.informationText) html+=`<div><strong>Information:</strong><div class="information-rendered resource-info-rendered">${renderInformationHTML(res.informationText)}</div></div>`;

  details.innerHTML=html;
  main.appendChild(details);
  card.appendChild(main);
  return card;
}

// Category view helpers handle category filters and For-group filters within the selected category.
// Filters are transient UI state; they are not saved into the resource package.

function getSelectedCategoryFilters(categoryId){
  return Array.isArray(selectedCategoryFilters[categoryId]) ? selectedCategoryFilters[categoryId] : [];
}

function setSelectedCategoryFilters(categoryId, filterKeys){
  const cleaned = normalizeTaxonomyLabels(filterKeys);
  if(cleaned.length){
    selectedCategoryFilters[categoryId] = cleaned;
  }else{
    delete selectedCategoryFilters[categoryId];
  }
}

function clearAllCategoryFilters(shouldRender = true){
  selectedCategoryFilters = {};
  if(shouldRender && view === "category") safeRender();
}

function makeCategorySpecificFilterKey(filter){
  return `filter:${canonicalizeTaxonomyLabel(filter).toLowerCase()}`;
}

function makeForGroupFilterKey(group){
  return `for:${canonicalizeTaxonomyLabel(group).toLowerCase()}`;
}

function getCategoryFilterOptions(categoryId){
  const cat = (Array.isArray(data.categories) ? data.categories : []).find(category => category && category.id === categoryId);
  const options = [];
  const resources = getCategoryResources(categoryId);
  const usedCategoryFilterKeys = new Set();
  const usedForGroupKeys = new Set();

  resources.forEach(resource => {
    getResourceCategoryFilterKeys(resource, categoryId).forEach(key => usedCategoryFilterKeys.add(key));
    getResourceForGroupFilterKeys(resource).forEach(key => usedForGroupKeys.add(key));
  });

  normalizeCategoryFilters(cat && cat.filters).forEach(filter => {
    const key = makeCategorySpecificFilterKey(filter);
    if(usedCategoryFilterKeys.has(key)){
      options.push({ key, label:filter, kind:"filter" });
    }
  });
  normalizeTaxonomyLabels(data.forGroups).forEach(group => {
    const key = makeForGroupFilterKey(group);
    if(usedForGroupKeys.has(key)){
      options.push({ key, label:group, kind:"for" });
    }
  });
  return options;
}

function getResourceCategoryFilterKeys(resource, categoryId){
  return new Set(normalizeCategoryFilters(resource && resource.categoryFilters && resource.categoryFilters[categoryId])
    .map(makeCategorySpecificFilterKey));
}

function getResourceForGroupFilterKeys(resource){
  return new Set(normalizeTaxonomyLabels(resource && resource.forGroups).map(makeForGroupFilterKey));
}

function countSelectedCategoryFilterMatches(resource, categoryId, activeFilterKeys){
  if(!activeFilterKeys.size) return 0;
  const resourceKeys = new Set([
    ...getResourceCategoryFilterKeys(resource, categoryId),
    ...getResourceForGroupFilterKeys(resource)
  ]);
  let count = 0;
  activeFilterKeys.forEach(key => {
    if(resourceKeys.has(key)) count += 1;
  });
  return count;
}

function resourceMatchesSelectedCategoryFilters(resource, categoryId, selectedFilterKeys){
  const activeFilterKeys = new Set(normalizeTaxonomyLabels(selectedFilterKeys));
  return !activeFilterKeys.size || countSelectedCategoryFilterMatches(resource, categoryId, activeFilterKeys) > 0;
}

function filterResourcesBySelectedCategoryFilters(resources, categoryId, selectedFilterKeys){
  const activeFilterKeys = new Set(normalizeTaxonomyLabels(selectedFilterKeys));
  return (Array.isArray(resources) ? resources : [])
    .filter(resource => resourceMatchesSelectedCategoryFilters(resource, categoryId, selectedFilterKeys))
    .sort((a, b) => {
      if(activeFilterKeys.size){
        const matchDiff = countSelectedCategoryFilterMatches(b, categoryId, activeFilterKeys) - countSelectedCategoryFilterMatches(a, categoryId, activeFilterKeys);
        if(matchDiff) return matchDiff;
      }
      return compareResourcesByName(a, b);
    });
}

function resourceMatchesListsHeuristic(resource){
  return !String(resource && resource.phone || "").trim()
    && !String(resource && resource.website || "").trim()
    && !String(resource && resource.hours || "").trim();
}

function getListsResources(){
  return (Array.isArray(data.resources) ? data.resources : [])
    .filter(resourceMatchesListsHeuristic);
}

function isListsCategory(categoryId){
  return String(categoryId || "") === LISTS_CATEGORY_ID;
}

function getCategoryResources(categoryId){
  if(isListsCategory(categoryId)) return getListsResources();
  return (Array.isArray(data.resources) ? data.resources : [])
    .filter(r => Array.isArray(r.categories) && r.categories.includes(categoryId));
}

// ============================================================
// UNDO SYSTEM
// ============================================================
// Undo is intentionally narrow: destructive admin deletes save one complete data
// snapshot in localStorage. Restoring that snapshot is simpler and safer than
// trying to reverse individual category, resource, or For-group mutations.

function getUndoSnapshot(){
  try{
    const raw = localStorage.getItem(UNDO_STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || typeof parsed !== "object") return null;
    if(!parsed.dataSnapshot || typeof parsed.message !== "string") return null;
    return parsed;
  }catch(_err){
    return null;
  }
}

function clearUndoSnapshot(){
  localStorage.removeItem(UNDO_STORAGE_KEY);
}

function setUndoSnapshot(message){
  localStorage.setItem(UNDO_STORAGE_KEY, JSON.stringify({
    dataSnapshot: JSON.parse(JSON.stringify(data)),
    message: String(message || "")
  }));
}

function undoLastDeletion(){
  const snapshot = getUndoSnapshot();
  if(!snapshot || !snapshot.dataSnapshot) return;
      data = snapshot.dataSnapshot;
      normalizeDataInformationShape(data);
      normalizeLegacyTagsShape(data);
      normalizeDataVerifiedOnShape(data);
      normalizeChanges(data);
  clearUndoSnapshot();
  persist();
  safeRender();
}

/* ---------- Print Selection ---------- */
// Print selection replaced the older Favorites concept. The legacy key is still
// read once so existing browsers keep their selected resources after upgrading.

function loadPrintSelection(){
  let raw = localStorage.getItem(PRINT_SELECTION_STORAGE_KEY);
  if(raw === null){
    raw = localStorage.getItem(LEGACY_FAVORITES_STORAGE_KEY);
    if(raw !== null){
      localStorage.setItem(PRINT_SELECTION_STORAGE_KEY, raw);
      localStorage.removeItem(LEGACY_FAVORITES_STORAGE_KEY);
    }
  }
  let parsed = [];
  try{
    parsed = JSON.parse(raw || "[]");
  }catch(e){
    parsed = [];
  }
  return Array.isArray(parsed) ? parsed.map(id => String(id || "")).filter(Boolean) : [];
}

function savePrintSelection(){
  localStorage.setItem(PRINT_SELECTION_STORAGE_KEY, JSON.stringify(printSelection));
  localStorage.removeItem(LEGACY_FAVORITES_STORAGE_KEY);
}

function sanitizePrintSelection(){
  const resourceIds = new Set((data.resources || []).map(resource => String(resource && resource.id || "")));
  const filtered = printSelection.filter(id => resourceIds.has(String(id || "")));
  if(filtered.length !== printSelection.length){
    printSelection = filtered;
    savePrintSelection();
  }
}

function isSelectedForPrinting(id){
  return printSelection.includes(String(id || ""));
}

function getPrintSelectionIcon(id){
  return isSelectedForPrinting(id) ? "🖨️" : "⬜";
}

function getPrintSelectionResources(){
  const selectedIds = new Set(printSelection.map(id => String(id || "")));
  return data.resources.filter(resource => selectedIds.has(String(resource.id || "")));
}

function updatePrintSelectionIndicator(){
  if(tabPrintSelection) tabPrintSelection.textContent = `🖨️ (${printSelection.length})`;
}

function getCategoryPrintInstructionText(){
  const count = printSelection.length;
  return count
    ? `Click 🖨️ (${count}) in the top bar to review and print selected resources.`
    : "Click ⬜ next to a resource to select it for printing.";
}

function togglePrintSelection(id, { rerender = true } = {}){
  const cleanId = String(id || "");
  if(!cleanId) return;
  if(!data.resources.some(resource => String(resource && resource.id || "") === cleanId)) return;
  const set=new Set(printSelection);
  set.has(cleanId)?set.delete(cleanId):set.add(cleanId);
  printSelection=[...set];
  savePrintSelection();
  updatePrintSelectionIndicator();
  if(rerender) safeRender();
}

/* ---------- Print ---------- */

// PrintWorkflow is a small queue-based state machine for print preview/packet flow.
// Each queue entry has a label and render function so print steps stay data-driven.
// The queue currently has one visible step, but keeping this as a queue preserves
// the separation between normal resource cards and list-style flyer output.
const PrintWorkflow = {
  queue: [],
  currentIndex: -1,
  initiatedByButton: false,

  isListResource(res){
    return resourceMatchesListsHeuristic(res);
  },

  getPrintSelectionGroups(){
    // "List" resources are separated so print selection packet output can render flyers.
    const normalSelections = [];
    const listSelections = [];

    getPrintSelectionResources().forEach(res => {
      if(this.isListResource(res)){
        listSelections.push(res);
      }else{
        normalSelections.push(res);
      }
    });

    return { normalSelections, listSelections };
  },

  buildQueue(){
    const { normalSelections, listSelections } = this.getPrintSelectionGroups();
    if(!normalSelections.length && !listSelections.length) return [];
    if(!listSelections.length){
      return [{
        label:"Print Selection",
        render: () => this.renderPrintSelection(normalSelections)
      }];
    }
    return [{
      label:"Print Selection",
      render: () => this.renderPrintSelectionPacket(normalSelections, listSelections)
    }];
  },

  updateUI(){
    const active = this.queue.length > 0 && this.currentIndex >= 0 && this.currentIndex < this.queue.length;
    const isLastStep = active && this.currentIndex === this.queue.length - 1;
    printCloseBtn.classList.toggle("hidden", active && !isLastStep);
    printActionBtn.classList.toggle("hidden", !active);
    printNextBtn.classList.toggle("hidden", !active || isLastStep);
    if(!active){
      printProgress.textContent = "";
      return;
    }
    printProgress.textContent = "";
  },

  showStep(){
    const step = this.queue[this.currentIndex];
    if(!step || typeof step.render !== "function") return;
    step.render();
  },

  openPreviewContent(render){
    this.updateUI();
    printContent.innerHTML="";
    if(typeof render === "function") render(printContent);
    printModal.classList.remove("hidden");
  },

  openPreview(resources){
    this.openPreviewContent(container => {
      this.renderPrintableResourceCards(container, resources);
    });
  },

  renderPrintableResourceCards(container, resources){
    (Array.isArray(resources) ? resources : []).forEach((res, index)=>{
      if(index > 0){
        const separator = document.createElement("hr");
        separator.className = "print-resource-separator";
        separator.classList.toggle("print-disabled", !isSelectedForPrinting(res.id));
        container.appendChild(separator);
      }
      const card=buildResourceCard(res,{expanded:true});
      card.classList.toggle("print-disabled", !isSelectedForPrinting(res.id));
      const toggle = card.querySelector(".print-selection-toggle");
      if(toggle){
        toggle.onclick = e => {
          e.stopPropagation();
          togglePrintSelection(res.id, { rerender:false });
          this.showStep();
          safeRender();
        };
      }
      container.appendChild(card);
    });
  },

  renderPrintSelection(normalSelections){
    this.openPreview(normalSelections);
  },

  buildListFlyer(resource, shouldPageBreak){
    const flyer = document.createElement("section");
    flyer.className = "print-list-flyer" + (shouldPageBreak ? " print-list-flyer-page-break" : "");
    flyer.classList.toggle("print-disabled", !isSelectedForPrinting(resource.id));

    let html = `<button type="button" class="print-selection-toggle" style="position:static; margin-right:8px;">${getPrintSelectionIcon(resource.id)}</button><h2 style="display:inline;">${escapeHTML(resource.name || "")}</h2>`;
    if(resource.phone) html += `<div class="print-list-field"><strong>Phone:</strong> ${escapeHTML(resource.phone)}</div>`;
    if(resource.address) html += `<div class="print-list-field"><strong>Address:</strong> ${escapeHTML(resource.address)}</div>`;
    if(resource.website) html += `<div class="print-list-field"><strong>Website:</strong> ${escapeHTML(resource.website)}</div>`;
    if(resource.informationText){
      html += `<div class="print-list-field"><strong>Information:</strong><div class="information-rendered resource-info-rendered">${renderInformationHTML(resource.informationText)}</div></div>`;
    }
    flyer.innerHTML = html;
    const toggle = flyer.querySelector(".print-selection-toggle");
    if(toggle){
      toggle.onclick = e => {
        e.stopPropagation();
        togglePrintSelection(resource.id, { rerender:false });
        this.showStep();
        safeRender();
      };
    }
    return flyer;
  },

  renderPrintSelectionPacket(normalSelections, listSelections){
    this.openPreviewContent(container => {
      if(normalSelections.length){
        this.renderPrintableResourceCards(container, normalSelections);
      }

      listSelections.forEach((resource, index) => {
        container.appendChild(this.buildListFlyer(resource, normalSelections.length > 0 || index > 0));
      });
    });
  },

  renderSingleListResource(resourceId){
    const { listSelections } = this.getPrintSelectionGroups();
    const resource = listSelections.find(res => res.id === resourceId);
    if(!resource) return;
    this.openPreview([resource]);
  },

  startPrintSelection(){
    this.queue = this.buildQueue();
    if(!this.queue.length){
      this.openPreviewContent(container => {
        container.innerHTML = "<p>No resources are selected for printing.</p><p class=\"print-empty-instruction\">Click ⬜ next to a resource to include it in the printed handout.</p>";
      });
      return;
    }
    this.currentIndex = 0;
    this.showStep();
  },

  next(){
    if(this.currentIndex >= this.queue.length - 1) return this.close();
    this.currentIndex += 1;
    this.showStep();
  },

  close(){
    this.queue = [];
    this.currentIndex = -1;
    this.updateUI();
    printModal.classList.add("hidden");
  },

  doPrint(){
    this.initiatedByButton = true;
    const disabled = Array.from(printContent.querySelectorAll(".print-disabled"));
    disabled.forEach(el => el.setAttribute("data-print-hidden", "true"));
    window.print();
    clearAllCategoryFilters(false);
  },

  handleAfterPrint(){
    if(!this.initiatedByButton) return;
    this.initiatedByButton = false;
  }
};

function startPrintSelectionPreview(){ PrintWorkflow.startPrintSelection(); }
function nextPrintStep(){ PrintWorkflow.next(); }
function closePrintPreview(){ PrintWorkflow.close(); }
function doPrint(){ PrintWorkflow.doPrint(); }
